meta:
  title: "Erstgespräch Unternehmensberatung – Lukas Ebner"
  description: "Kostenfreies Erstgespräch zur Unternehmensberatung. In 30 Minuten klären wir, ob eine Zusammenarbeit Sinn macht."
  og_image: /images/og/erstgespraech.jpg

slides:
  # ── 1. HERO: Framing umkehren ─────────────────────────
  - template: hero-dark
    headline: "Passt eine Zusammenarbeit? Finden wir's raus."
    subtext: "30 Minuten. Kein Pitch, kein Verkaufsgespräch. Wir klären, wo bei dir gerade der größte Hebel liegt – und ob eine Zusammenarbeit Sinn macht. Danach weißt du, ob es passt. Und ich auch."
    cta:
      text: "Direkt zum Formular"
      url: "#bewerbung"
    image:
      src: /images/lukas-meetingraum.jpg
      alt: ""
      opacity: 0.5

  # ── 2. QUALIFICATION: Grün/Rot-Checks ─────────────────
  - template: qualification
    headline: "Ist das richtig für dich?"
    body: "Ich arbeite nicht mit jedem. Nicht aus Arroganz – sondern weil gute Ergebnisse nur entstehen, wenn die Ausgangslage stimmt."
    qualifiesLabel: "Passt gut"
    disqualifiesLabel: "Passt nicht"
    qualifies:
      - text: "Du führst ein Unternehmen mit 5–100 Mitarbeitern in Regensburg oder deutschlandweit."
      - text: "Du bist bereit, Dinge zu verändern – auch wenn es unbequem wird – und suchst einen Sparring Partner Geschäftsführer."
      - text: "Du kannst 2.000–4.000 € monatlich in Unternehmensberatung und Coaching investieren."
    disqualifies:
      - text: "Du suchst jemanden, der dir sagt, was du hören willst."
      - text: "Du erwartest Ergebnisse ohne eigenes Engagement."
      - text: "Du brauchst erst in 6 Monaten Hilfe – dann melde dich in 5."

  # ── 3. APPLICATION FORM ────────────────────────────────
  - template: application-form
    id: bewerbung
    bg: "#F44900"
    headline: "Erzähl mir von deinem Unternehmen."
    body: "Keine langen Formulare. Sieben kurze Fragen, damit ich mich vorbereiten kann – und unser Gespräch von Anfang an Substanz hat."
    submitLabel: "Erstgespräch anfragen"
    showActionCode: true
    actionCodeLabel: "Aktionscode"
    actionCodePlaceholder: "Aus deinem Strategiepapier – falls vorhanden"
    successHeadline: "Danke. Ich melde mich."
    successBody: "Innerhalb von 24 Stunden bekommst du von mir einen Terminvorschlag für unser Erstgespräch. Kein Pitch – ein echtes Gespräch."
    fields:
      - name: name
        label: "Dein Name"
        type: text
        required: true
        placeholder: "Vor- und Nachname"
      - name: email
        label: "Deine E-Mail"
        type: email
        required: true
        placeholder: "name@unternehmen.de"
      - name: company
        label: "Unternehmen & Website"
        type: text
        required: true
        placeholder: "Firmenname – domain.de"
      - name: employees
        label: "Wie viele Mitarbeiter habt ihr?"
        type: select
        required: true
        options:
          - "Unter 5"
          - "5–15"
          - "15–40"
          - "40–100"
          - "Über 100"
      - name: challenge
        label: "Was ist gerade deine größte Herausforderung?"
        type: textarea
        required: true
        placeholder: "In 2–3 Sätzen. Was hält dich nachts wach?"
      - name: tried
        label: "Was hast du bisher versucht?"
        type: textarea
        required: false
        placeholder: "Berater, Coachings, Eigenversuche – was hat (nicht) funktioniert?"
      - name: timeline
        label: "Wann willst du starten?"
        type: select
        required: true
        options:
          - "So schnell wie möglich"
          - "In den nächsten 4 Wochen"
          - "In 1–3 Monaten"
          - "Erst mal orientieren"
      - name: source
        label: "Wie bist du auf mich aufmerksam geworden?"
        type: text
        required: false
        placeholder: "Empfehlung, LinkedIn, Google …"

  # ── 4. FAQ ─────────────────────────────────────────────
  - template: faq
    headline: "Häufige Fragen."
    variant: light
    bg: "#E6EEEF"
    items:
      - question: "Was passiert im kostenlosen Erstgespräch?"
        answer: "30 Minuten, in denen wir uns gegenseitig abchecken. Du erzählst mir, wie es in deinem Unternehmen aussieht – wo du gerade stehst, was dich unter Druck setzt. Ich stelle dir die Fragen, auf die es ankommt. Am Ende: Ich gebe dir eine ehrliche erste Diagnose mit einer Priorisierung, wo tatsächlich der größte Hebel liegt für dein Business. Du weißt dann, ob ich jemand bin, mit dem du arbeiten willst – und ich weiß, ob ich dir helfen kann."

      - question: "Muss ich mich auf das Erstgespräch vorbereiten?"
        answer: "Nö. Deine Formulardaten sind meine Vorbereitung."

      - question: "Warum muss ich ein Formular ausfüllen?"
        answer: "Damit wir nicht mit Basics anfangen. Die sieben Fragen machen den Unterschied zwischen einem oberflächlichen Schwatz und einem Gespräch, das dir tatsächlich weiterbringt. 5 Minuten Aufwand für etwas, das echte Substanz schafft – das ist ein faires Tauschverhältnis."

      - question: "Was kostet die Unternehmensberatung?"
        answer: "125 € netto die Stunde. Das klassische Einstiegsprojekt: 3 Monate, strukturierte Begleitung, je nach Firmengröße zwischen 4.750 und 9.500 €. Danach optional monatlich kündbar. Zu den Details und zur BAFA-Förderung schau auf die Preise-Seite – da ist alles aufgeschlüsselt."

      - question: "Für wen ist die Beratung geeignet?"
        answer: "Geschäftsführer und Inhaber von Unternehmen zwischen 5 und 100 Leuten. Branche egal, aber Schwerpunkt: Tech, SaaS, Dienstleistung, Mittelstand. Du brauchst Wachstum mit Struktur, oder Struktur vor dem nächsten Wachstum. Oder beides. Und du musst bereit sein, echte Dinge zu verändern – nicht nur zu reden."

      - question: "Muss ich mich langfristig binden?"
        answer: "Das Setup-Projekt ist zeitlich definiert: 3 Monate, dann vorbei. Danach kannst du jeden Monat kündigen. Wenn du danach merkst, dass du es alleine schaffst – großartig. Ich behalte gerne niemanden, der mich nicht braucht."

      - question: "Findet die Beratung vor Ort in Regensburg oder remote statt?"
        answer: "Diagnose, Workshops und intensive Kickoffs gerne vor Ort – das macht oft mehr Sinn als eine Videoschleife. Das laufende Sparring funktioniert perfekt remote. Zwischen den Terminen bin ich asynchron da: Slack, E-Mail, kurze Videoschnipsel wenn nötig. Im Erstgespräch klären wir, was für deine Situation das beste Setup ist."

      - question: "Gibt es eine BAFA-Förderung für die Beratung?"
        answer: "Ja. Bis zu 50 % alte Bundesländer, bis zu 80 % neue. Ich bin gelistet und kümmere mich um den Antrag."

      - question: "Wie schnell bekomme ich einen Termin?"
        answer: "Kurze Antwort: meistens in 24 Stunden. Ich bekomme deine Bewerbung, lese sie mir durch, checke meinen Kalender und schreib dir einen konkreten Vorschlag. Manchmal dauert's ein, zwei Tage länger – aber ich prioritäre Erstgespräche, weil der Moment, in dem Menschen Hilfe suchen, meistens der richtige ist."

      - question: "Was, wenn die Zusammenarbeit nicht passt?"
        answer: "Dann sage ich dir das klar. Das Ganze ist keine Verkaufsveranstaltung. Es geht darum zu sehen: Passen wir zusammen, oder passt jemand anders besser? Wenn ich glaube, dass ich dir nicht helfen kann – oder dass jemand anders deutlich besser fit ist – sag ich's. Lieber kein Projekt als ein falsches."

      - question: "Was unterscheidet dich von anderen Unternehmensberatern?"
        answer: "Ich rede nicht über Theorie. Vier gegründete Unternehmen, alles selbst gebaut und durchgestanden – die meisten Rückschläge, die ich erzähle, sind meine eigenen. Du arbeitest mit mir, nicht mit einem Junior. Und mein Fokus ist klein bis mittelständisch, nicht Konzerne – ich kenne deine Probleme aus erster Hand."

      - question: "Kann ich auch nur eine einzelne Beratungsstunde buchen?"
        answer: "Ja. Aber probier erst das Erstgespräch. Kostenlos, unverbindlich, 30 Minuten – und wir klären dann zusammen: Reicht eine Stunde oder brauchst du Kontinuität? Für Ad-hoc-Fragen funktioniert Einzelstunden. Für echte Veränderung nicht."
