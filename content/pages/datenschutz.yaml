meta:
  title: "Datenschutz – Lukas Ebner"
  description: "Datenschutzerklärung und Informationen zum Schutz Ihrer Daten auf lukasebner.de"
  noSnap: true

slides:
  - template: legal
    headline: "Datenschutzerklärung"
    sections:
      - heading: "1. Datenschutz auf einen Blick"
        body: |
          Die Betreiber dieser Seiten nehmen den Schutz Ihrer persönlichen Daten sehr ernst. Wir behandeln Ihre personenbezogenen Daten vertraulich und entsprechend der gesetzlichen Datenschutzvorschriften sowie dieser Datenschutzerklärung.

      - heading: "2. Allgemeine Hinweise"
        body: |
          Diese Website nutzt HTTPS. Dies bedeutet, dass die Daten, die Sie an uns übermitteln, verschlüsselt sind und nicht von Dritten eingesehen werden können.

      - heading: "3. Verantwortlicher"
        body: |
          Wachstumscoach GmbH
          Yorckstraße 22
          93049 Regensburg
          Deutschland

          Telefon: +49 941 463 909 80
          E-Mail: hi@lukasebner.de

      - heading: "4. Ihre Rechte"
        body: |
          Sie haben das Recht, jederzeit Auskunft über die zu Ihrer Person gespeicherten personenbezogenen Daten zu erhalten. Ebenso haben Sie das Recht auf Berichtigung oder Löschung dieser Daten sowie das Recht auf Einschränkung der Verarbeitung.

          Sie können diese Rechte jederzeit unter den o.g. Kontaktdaten ausüben.

      - heading: "5. Kontaktformular"
        body: |
          Wenn Sie uns über das Kontaktformular Mitteilungen zukommen lassen, werden Ihre Angaben aus dem Anfrageformular inklusive der von Ihnen dort angegebenen Kontaktdaten zwecks Bearbeitung der Anfrage und für den Fall von Anschlussfragen bei uns gespeichert. Diese Daten geben wir nicht ohne Ihre Einwilligung weiter.

      - heading: "6. Cookies"
        body: |
          Diese Website verwendet Cookies. Dabei handelt es sich um kleine Textdateien, die auf Ihrem Endgerät abgelegt werden. Ihr Browser gibt diese an uns zurück, wenn Sie unsere Website besuchen.

          Sie können in Ihren Browser-Einstellungen bestimmen, ob Sie Cookies akzeptieren möchten oder nicht.

      - heading: "7. SSL-Verschlüsselung"
        body: |
          Diese Seite nutzt aus Gründen der Sicherheit und zum Schutz der Übertragung vertraulicher Inhalte, wie zum Beispiel der Anfragen, die Sie an uns als Seitenbetreiber senden, eine SSL-Verschlüsselung. Eine verschlüsselte Verbindung erkennen Sie daran, dass in der Adresszeile des Browsers ein „s" an dem "http" angehängt ist und sich ein Schloss-Symbol in der Browserzeile befindet.

      - heading: "8. Änderung dieser Datenschutzerklärung"
        body: |
          Wir behalten uns das Recht vor, diese Datenschutzerklärung jederzeit unter Beachtung der geltenden Datenschutzgesetze zu ändern. Eine Benachrichtigung über Änderungen erfolgt auf dieser Seite.
