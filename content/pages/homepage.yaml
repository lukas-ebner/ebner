  # ── 6b. EBOOK LEADMAGNET ───────────────────────────
  - template: ebook-leadmagnet
    headline: "Kostenloser Report: The Cost of Chaos"
    subtext: "10 Fehler, die deine Marge auffressen — und wie du sie abstellst. Basierend auf 15 Jahren Erfahrung mit Software-Dienstleistern."
    ebookTitle: "The Cost of Chaos in Professional Services"
