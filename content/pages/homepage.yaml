meta:
  title: "Lukas Ebner – Unternehmer, Berater, Builder"
  description: "15 Jahre als Geschäftsführer, Exit 2022, SaaS-Gründer. Beratung für Geschäftsführer, Agenturen und KMU – KI-Strategie, Skalierung, Führung."
  og_image: /images/og/homepage.jpg

slides:
  # ── 1. HERO + STATS ─────────────────────────────────
  - template: hero-dark
    headline: "Ich habe ein Unternehmen auf 50 Leute aufgebaut und verkauft. Jetzt helfe ich dir, dasselbe zu tun."
    subtext: "Beratung für Geschäftsführer, die nicht mehr alles selbst machen wollen."
    cta:
      text: "Gespräch vereinbaren"
      url: "/kontakt"
    image:
      src: /images/slides/lukas-hero_landscape.jpg
      alt: "Lukas Ebner"
      opacity: 0.95
    align: left
    stats:
      - { value: "15+", label: "Jahre als Geschäftsführer" }
      - { value: "50", label: "Mitarbeiter beim Exit" }
      - { value: "7", label: "stelliger Exit 2022" }
      - { value: "1.000+", label: "Projekte verantwortet" }

  # ── 2. QUIZ (interaktiv) ─────────────────────────────
  - template: freiheitstest
    headline: "Bremst dich dein eigenes Unternehmen?"
    buttonText: "Finde heraus, wo du stehst"

  # ── 4. DAS SYSTEM (Dreieck-Grafik) ─────────────────
  # TODO: Eigene Komponente "TriangleSystemSlide" bauen
  # Platzhalter: Statement mit übergreifender Value Proposition
  - template: statement
    headline: "Führung × Systeme × KI — erst zusammen entsteht ein Unternehmen, das ohne dich funktioniert."
    variant: orange
    size: large

  # ── 5. PFEILER 1: Operations & Führung ─────────────
  - template: statement
    headline: "Bevor du irgendetwas automatisierst — funktioniert dein Laden überhaupt ohne dich?"
    variant: dark
    size: large

  # ── 6. PFEILER 2: Systeme & Automatisierung ────────
  - template: statement
    headline: "Du brauchst kein neues Tool. Du brauchst Überblick."
    variant: dark
    size: large

  # ── 7. PFEILER 3: KI-Readiness & Prototyping ──────
  - template: statement
    headline: "KI ist kein Feature. Es ist ein Kulturwandel."
    variant: dark
    size: large

  # ── 8. BLOG-TEASER ─────────────────────────────────
  - template: blog-teaser
    headline: "Aktuell im Blog"
    post:
      title: "Warum die meisten Geschäftsführer zu lange im Tagesgeschäft bleiben"
      excerpt: "Es gibt einen Punkt, an dem du aufhören musst, in deinem Unternehmen zu arbeiten – und anfangen musst, daran zu arbeiten. Die meisten verpassen diesen Punkt um Jahre. Hier ist, woran du ihn erkennst."
      date: "März 2026"
      category: "Führung & Wachstum"
      image: /images/fotos/DSC00263.jpg
      url: "/blog"

  # ── 9. FAQ ─────────────────────────────────────────
  - template: faq
    headline: "Häufige Fragen"
    bg: "#E6EEEF"
    variant: light
    items:
      - question: "Was genau machst du als Berater?"
        answer: "Ich helfe Geschäftsführern von IT- und Software-Unternehmen, ihre Organisation zu professionalisieren. Das heißt: bessere Prozesse, klarere Strukturen, smartere Tools. Ich komme aus der Praxis – 13 Jahre eigene Firma, 50 Mitarbeiter, über 1.000 Projekte. Ich weiß, wo es klemmt."
      - question: "Für wen ist dein Coaching gedacht?"
        answer: "Für Geschäftsführer und Gründer, die das Gefühl haben, dass ihr Unternehmen schneller wachsen könnte, wenn die internen Abläufe besser funktionieren würden. Typischerweise Unternehmen zwischen 5 und 50 Mitarbeitern."
      - question: "Was ist Leadtime?"
        answer: "Leadtime ist eine Project Delivery Platform für Software-Dienstleister. Projektmanagement, Zeiterfassung, Controlling, CRM und Rechnungsstellung in einem System. Entstanden aus einem internen Tool, das ich über 8 Jahre in meiner eigenen Firma entwickelt habe."
      - question: "Arbeitest du remote oder vor Ort?"
        answer: "Beides. Ich bin in Regensburg ansässig, arbeite aber viel remote. Für Workshops und intensive Phasen komme ich auch gerne vor Ort. Das klären wir im Erstgespräch."
      - question: "Wie kann ich dich am besten erreichen?"
        answer: "Am einfachsten über das Kontaktformular oder direkt per Mail an hi@lukasebner.de. Für ein unverbindliches Erstgespräch kannst du auch direkt einen Termin buchen."
