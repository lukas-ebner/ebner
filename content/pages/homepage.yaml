  # ── 7. PFEILER 3: KI-Readiness & Prototyping (INDIGO)
  - template: pillar-detail
    pill: "Der Beschleuniger"
    headline: "Von der Idee zum Prototyp. In Tagen, nicht Monaten."
    body: "Alle reden über KI. Aber zwischen ChatGPT ausprobieren und KI systematisch einsetzen liegt eine Welt. Deine Entwicklungskosten explodieren? Du hast vibe-gecodet und es muss jetzt halten? Du willst aus der Idee raus, rein in den Prototyp?\n\nIch baue den ersten Wurf, mein Partner Stas macht den Code produktionsreif. Zusammen: KI-Strategie, Rapid Prototyping, Refactoring. Keine Junior-Berater — direkte Zusammenarbeit mit den Leuten die es bauen."
    points:
      - "KI-Beratung: Wo bringt KI bei euch den größten Hebel? Fahrplan statt Buzzwords"
      - "Rapid Prototyping: Funktionierender Build in Tagen, nicht Quartalen"
      - "Refactoring & Hardening: Aus dem Schnellschuss eine tragfähige Codebasis machen"
      - "10× schneller zum Bruchteil klassischer Agenturkosten"
    bg: "#1B1564"
    direction: right
    pipeline:
      - icon: sparkles
        label: "Idee"
      - icon: compass
        label: "Strategie"
      - icon: rocket
        label: "Prototyp"
      - icon: shield
        label: "Production"
    cta:
      text: "Mehr zu KI-Readiness"
      url: "/ki-readiness"

  # ── 9. FAQ ─────────────────────────────────────────
  - template: faq
    headline: "Häufige Fragen"
    bg: "#E6EEEF"
    variant: light
    items:
      - question: "Was genau machst du als Unternehmensberater?"
        answer: "Ich helfe Geschäftsführern und Gründern von Dienstleistungsunternehmen, sich aus dem operativen Tagesgeschäft zu lösen. Das heißt konkret: Prozessoptimierung, Führungsstrukturen aufbauen, Systeme konsolidieren und KI-Strategie entwickeln. Ich komme nicht aus der Theorie – ich habe 15 Jahre lang selbst ein Unternehmen mit 50 Mitarbeitern geführt, über 500 Projekte verantwortet und einen 7-stelligen Exit gemacht. Ich weiß, wo es in wachsenden Dienstleistern klemmt."
      - question: "Für wen ist die Beratung gedacht?"
        answer: "Für Geschäftsführer und Gründer von wissensbasierten Dienstleistern – Agenturen, IT-Unternehmen, Beratungen, Ingenieurbüros, Architekturbüros, Kanzleien oder andere Professional-Services-Firmen. Typischerweise zwischen 5 und 50 Mitarbeitern. Der gemeinsame Nenner: Du verkaufst Kopfarbeit, dein Unternehmen hängt zu stark an dir, und du willst das ändern."
      - question: "Was unterscheidet dich von anderen Unternehmensberatern?"
        answer: "Ich bin kein klassischer Berater, der PowerPoints liefert und dann verschwindet. Ich habe selbst ein Unternehmen skaliert, einen Exit gemacht und baue parallel ein SaaS-Produkt. Mein Ansatz ist umsetzungsorientiert: Diagnose, Systemaufbau und dann laufendes Sparring als Geschäftsführer-Coach. Ich arbeite nur mit Dienstleistern, weil ich genau diese Branche kenne – von Projektmargen über Ressourcenplanung bis zum Controlling."
      - question: "Wie läuft eine Zusammenarbeit ab?"
        answer: "Wir starten mit einem kostenlosen Erstgespräch, in dem wir deine Situation analysieren. Danach folgt eine Diagnosephase, in der ich eure Prozesse, Systeme und Führungsstrukturen unter die Lupe nehme. Daraus entsteht ein konkreter Fahrplan. Die eigentliche Beratung läuft dann als Kombination aus Workshops, Systemaufbau und regelmäßigem Sparring – je nach Bedarf über 3 bis 12 Monate."
      - question: "Arbeitest du remote oder vor Ort?"
        answer: "Beides. Ich bin in Regensburg ansässig und arbeite viel mit Unternehmen aus der Region Regensburg, Ostbayern und ganz Bayern. Für Workshops und intensive Phasen komme ich vor Ort, das laufende Sparring machen wir remote. Grundsätzlich funktioniert die Zusammenarbeit auch komplett remote – ich arbeite genauso mit Kunden in Hamburg oder Wien."
      - question: "Was kostet die Unternehmensberatung?"
        answer: "Mein Stundensatz liegt bei 125 €. Für eine strukturierte Zusammenarbeit biete ich 3-Monats-Pakete zwischen 4.750 € und 9.500 € an – je nach Umfang und Intensität. Wichtig: Über die BAFA-Förderung kannst du dir 50 bis 80 Prozent der Beratungskosten erstatten lassen. Das heißt, eine professionelle Unternehmensberatung kostet dich unter Umständen weniger als ein Freelancer-Tag."
      - question: "Was ist die BAFA-Förderung für Unternehmensberatung?"
        answer: "Das Bundesamt für Wirtschaft und Ausfuhrkontrolle (BAFA) fördert professionelle Unternehmensberatung für KMU mit 50 bis 80 Prozent der Kosten. Ich bin als BAFA-Berater zugelassen, das heißt: du bekommst eine hochwertige Strategieberatung und zahlst nur einen Bruchteil selbst. Den Antrag begleite ich mit – das ist kein bürokratisches Monster."
      - question: "Was genau meinst du mit KI-Beratung?"
        answer: "Ich helfe dir, KI konkret in deinem Unternehmen einzusetzen – nicht als Buzzword, sondern als echten Hebel. Das reicht von der KI-Strategie über die Identifikation konkreter Use Cases bis zum funktionierenden Prototypen. Typische Einsatzfelder: Angebotserstellung automatisieren, Support mit KI beschleunigen, Reporting automatisieren oder interne Wissensdatenbanken aufbauen. Wir bauen Prototypen in Tagen, nicht Monaten."
      - question: "Was ist Leadtime?"
        answer: "Leadtime ist eine Project-Delivery-Plattform, die ich selbst entwickle – entstanden aus 8 Jahren eigener Agenturarbeit. Projektmanagement, Zeiterfassung, Controlling, CRM und Rechnungsstellung in einem System. Speziell gebaut für Dienstleister, die ihr Tool-Chaos durch eine zentrale Plattform ersetzen wollen. Leadtime ist kein Pflichtbestandteil meiner Beratung, aber oft die Antwort auf die Systemfrage."
      - question: "Kann ich auch nur ein Sparring buchen, ohne volles Beratungspaket?"
        answer: "Ja. Viele Geschäftsführer nutzen mich als externen Sparringpartner – regelmäßig oder bei Bedarf. Das funktioniert als monatliches Sparring-Abo oder als einzelne Sessions. Manchmal reicht ein erfahrener Blick von außen, um die richtige Entscheidung zu treffen."
      - question: "Wie kann ich dich am besten erreichen?"
        answer: "Am schnellsten über das Kontaktformular oder direkt per Mail an hi@lukasebner.de. Für ein unverbindliches Erstgespräch kannst du direkt einen Termin buchen – kostenlos, 30 Minuten, kein Pitch."
