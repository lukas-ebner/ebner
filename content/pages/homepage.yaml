  # ── 7. PFEILER 3: KI-Readiness & Prototyping (INDIGO)
  - template: pillar-detail
    pill: "Der Beschleuniger"
    headline: "Von der Idee zum Prototyp. In Tagen, nicht Monaten."
    body: "Alle reden über KI. Aber zwischen ChatGPT ausprobieren und KI systematisch einsetzen liegt eine Welt. Deine Entwicklungskosten explodieren? Du hast vibe-gecodet und es muss jetzt halten? Du willst aus der Idee raus, rein in den Prototyp?\n\nIch baue den ersten Wurf, mein Partner Stas macht den Code produktionsreif. Zusammen: KI-Strategie, Rapid Prototyping, Refactoring. Keine Junior-Berater — direkte Zusammenarbeit mit den Leuten die es bauen."
    points:
      - "KI-Beratung: Wo bringt KI bei euch den größten Hebel? Fahrplan statt Buzzwords"
      - "Rapid Prototyping: Funktionierender Build in Tagen, nicht Quartalen"
      - "Refactoring & Hardening: Aus dem Schnellschuss eine tragfähige Codebasis machen"
      - "10× schneller zum Bruchteil klassischer Agenturkosten"
    bg: "#1B1564"
    direction: right
    pipeline:
      - icon: sparkles
        label: "Idee"
      - icon: compass
        label: "Strategie"
      - icon: rocket
        label: "Prototyp"
      - icon: shield
        label: "Production"
    cta:
      text: "Mehr zu KI-Readiness"
      url: "/ki-readiness"

  # ── 9. FAQ ─────────────────────────────────────────
  - template: faq
    headline: "Häufige Fragen"
    bg: "#E6EEEF"
    variant: light
    items:
      - question: "Was machst du denn konkret?"
        answer: "Ich arbeite mit Gründern und Geschäftsführern, die ihre Unternehmen vom eigenen Nacken bekommen wollen. Drei Dinge: Prozesse, Systeme, KI. Mach ich selbst seit 15 Jahren – hatte eine Agentur mit 50 Leuten, kenne den Schmerz."
      - question: "Für wen passt das?"
        answer: "Dienstleister hauptsächlich. Agenturen, IT-Buden, Beratungen, Rechtsanwälte – alles wo dein Kopf der kostbarste Rohstoff ist. Irgendwo zwischen 5 und 50 Mitarbeitern. Wenn dein Unternehmen mehr an dir klebt als an den Prozessen, dann bin ich richtig."
      - question: "Warum sollte ich ausgerechnet zu dir kommen?"
        answer: "Weil ich nicht mit PowerPoints heimgehe. Ich hab selbst skaliert, bin rausgegangen, baue jetzt Leadtime und helfe dir parallel. Ich weiß, wie Agenturen und IT-Firmen ticken – wo die Marge verloren geht, wo Projekte aus dem Ruder laufen, wie du aus der Tagesarbeit rauskommst. Das ist keine Theorie für mich."
      - question: "Wie funktioniert das konkret?"
        answer: "Gratis Erstgespräch, 30 Minuten, kein Pitch. Du erzählst was läuft oder eben nicht, ich frag wo die Probleme sind. Danach gibts eine richtige Diagnose, dann bauen wir das System auf. Mit Workshops, regelmäßigen Sessions. So 3 bis 12 Monate, je nachdem was gemacht werden muss."
      - question: "Remote oder vor Ort?"
        answer: "Mix. Für große Workshops komm ich nach Regensburg zu dir. Die wöchentlichen Sessionen machen wir online. Aber auch wenn du in Hamburg sitzt – komplett remote geht genauso."
      - question: "Was kostet mich das?"
        answer: "Paket-Modell: zwischen 4.750 und 9.500 Euro für drei Monate, je nachdem ob es intensiv wird. Mit BAFA-Förderung zahlt sich das fast selbst – schau auf die Preise-Seite."
      - question: "BAFA-Förderung – wie läuft das?"
        answer: "Ja, bis zu 50–80 %. Ich bin zugelassen, mache die Anträge nicht kompliziert. Infos auf der Preise-Seite."
      - question: "Du sprichst viel von KI – was heißt das konkret?"
        answer: "Nicht die Standard-ChatGPT-Spielerei. Wo bringt KI euch wirklich was? Angebote schneller schreiben? Support 3x schneller machen? Reporting automatisieren? Das bauen wir dann als Prototyp – in Tagen, nicht Monaten. Keine Junior-Leute, ich mache das selbst oder mit meinem Developer."
      - question: "Was ist Leadtime – brauche ich das?"
        answer: "Mein Tool für Dienstleister. Projekt, Zeit, Controlling, CRM, Rechnung – alles in einem System statt in fünf verschiedenen. Nicht zwingend, aber oft die Antwort auf die Frage wie man Operations-Chaos löst."
      - question: "Kann ich auch nur gelegentlich mit dir sparren?"
        answer: "Ja, machen viele. Dann brauchst nicht ein volles Paket, sondern monatlich zwei Sessions zum Blödsinn von außen absprechen. Für manche reicht das völlig aus."
