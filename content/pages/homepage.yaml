  - template: three-pillars
    headline: "Du weißt jetzt, wo du stehst. So arbeiten wir daran."
    subtext: "Dein Freiheitsgrad hat dir gezeigt, wo dein Unternehmen dich noch bindet. Ich arbeite mit dir an genau diesen Stellschrauben — parallel, weil sie zusammenhängen."

  # ── 5. PFEILER 1: Operations & Führung (ORANGE) ────
  - template: pillar-detail
    pill: "Das Fundament"
    headline: "Diagnose → System → Sparring. In drei Phasen zum Unternehmen, das ohne dich läuft."
    body: "Irgendwann wird der Gründer zum Engpass. Sonntagabend am Laptop, Meetings in denen nur du entscheidest, mehr Mitarbeiter aber trotzdem nicht weniger Arbeit.\n\nWir fangen mit einer ehrlichen Diagnose an: Wie läuft dein Unternehmen wirklich — jenseits vom Organigramm. Dann bauen wir Prozesse, Rollen und Führungsstrukturen, die auch ohne dich funktionieren. Und danach bleibe ich als Sparringspartner — wie ein Beirat, nur ehrlicher."
    points:
      - "Strategie, die dein Team versteht und nach der es handelt"
      - "Prozesse, die laufen wenn du zwei Wochen nicht da bist"
      - "Führungsstruktur, die aus Einzelkämpfern ein Team macht"
      - "Transparenz über EBIT, Projektmargen und Unternehmenswert"
    bg: "#F44900"
    direction: right
    steps:
      - icon: search
        title: "Diagnose"
        body: "Wie läuft dein Unternehmen wirklich? Wo bleiben Dinge hängen, wo verlierst du Marge?"
      - icon: wrench
        title: "System bauen"
        body: "Prozesse, Rollen, Führungsstruktur, Kennzahlen. Pragmatisch, nicht verkopft."
      - icon: message-circle
        title: "Laufendes Sparring"
        body: "Regelmäßige Sessions für strategische Fragen. Wie ein Beirat, nur ehrlicher."
    cta:
      text: "Mehr zu Operations"
      url: "/operations"

  # ── 5b. BLOG-TEASER ────────────────────────────────
  - template: blog-teaser
    headline: "Aktuell im Blog"
    post:
      title: "Raus aus dem Tagesgeschäft — 7 Schritte für Geschäftsführer die endlich führen wollen"
      excerpt: "Der Teufelskreis zwischen Tagesgeschäft und Strategie. 7 konkrete Schritte, die dich aus dem operativen Hamsterrad befreien — von Sofortmaßnahmen bis zur neuen Rolle als Geschäftsführer."
      date: "April 2026"
      category: "Operations & Führung"
      image: /images/fotos/DSC00263.jpg
      url: "/blog/raus-aus-dem-tagesgeschaeft"

  # ── 6. PFEILER 2: Systeme & Automatisierung (TEAL) ─
  - template: pillar-detail
    pill: "Die Infrastruktur"
    headline: "Zwar jede Menge Tools. Trotzdem kein Überblick. Das ändern wir."
    body: "Excel-Sheets die sich widersprechen, Meetings in denen ihr Zahlen diskutiert denen niemand vertraut, Zeiterfassung in einem anderen Tool als die Projekte. Das ist kein Technologie-Problem — das ist ein Architektur-Problem.\n\nWir machen einen Tool-Audit, entwerfen eure Ziel-Architektur und konsolidieren auf ein zentrales System. Drei verbundene Tools schlagen fünfzehn isolierte. Alles was regelbasiert ist, läuft automatisch — dein Team arbeitet, das System rechnet."
    points:
      - "Tool-Audit: Welche Daten werden doppelt gepflegt, wo geht Information verloren?"
      - "Systemarchitektur: Eine zentrale Datenquelle statt 15 Inseln"
      - "Automatisierung: Zeiterfassung → Controlling → Rechnungsstellung in einem Fluss"
      - "Migration & Enablement: Sauber umziehen, Team schulen, Übergangsphase"
    bg: "#0D4F54"
    direction: left
    tools:
      - src: "/images/wolke/Rectangle 4239.svg"
