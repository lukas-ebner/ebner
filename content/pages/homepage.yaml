  # ── 6. PFEILER 2: Systeme & Automatisierung (TEAL) ─
  - template: pillar-detail
    pill: "Die Infrastruktur"
    headline: "Zwar jede Menge Tools. Trotzdem kein Überblick. Das ändern wir."
    body: "Excel-Sheets die sich widersprechen, Meetings in denen ihr Zahlen diskutiert denen niemand vertraut, Zeiterfassung in einem anderen Tool als die Projekte. Das ist kein Technologie-Problem — das ist ein Architektur-Problem.\n\nWir machen einen Tool-Audit, entwerfen eure Ziel-Architektur und konsolidieren auf ein zentrales System. Drei verbundene Tools schlagen fünfzehn isolierte. Alles was regelbasiert ist, läuft automatisch — dein Team arbeitet, das System rechnet."
    points:
      - "Tool-Audit: Welche Daten werden doppelt gepflegt, wo geht Information verloren?"
      - "Systemarchitektur: Eine zentrale Datenquelle statt 15 Inseln"
      - "Automatisierung: Zeiterfassung → Controlling → Rechnungsstellung in einem Fluss"
      - "Migration & Enablement: Sauber umziehen, Team schulen, Übergangsphase"
    bg: "#0D4F54"
