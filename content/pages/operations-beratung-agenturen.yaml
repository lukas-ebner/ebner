"sections":
- "type": "prose"
  "heading": "Woran du erkennst, dass deine Agentur ein Operations-Problem hat"
  "content":
  - "Viele Agenturen suchen nach Skalierung, aber stoßen nicht an Vertriebsgrenzen, sondern an operative Grenzen. Wenn jeder\
    \ neue Auftrag mehr Koordinationsaufwand produziert als Ertrag, liegt das an fehlender Betriebsinfrastruktur."
  "bullets":
  - "Projekte laufen aus dem Ruder, obwohl du alles siehst — Übergaben passieren informell, Scope schleicht sich aus, Nacharbeit\
    \ frisst Marge. Nicht weil das Team schlechter wird, sondern weil Strukturen nicht skalieren."
  - "Du bist gleichzeitig CEO, Projektleiter und Feuerwehr — Auch wenn du nicht mehr operativ sein willst, landet alles trotzdem\
    \ bei dir. Das zeigt, dass Verantwortung und Entscheidungskompetenz nicht sauber verteilt sind."
  - "Gute Leute bleiben nicht oder performen unter ihrem Potenzial — Wenn Führung unstrukturiert ist, frustrieren sich die\
    \ Besten heraus. Klarheit in Rollen, Übergaben und Prioritäten hält gute Mitarbeitende länger als Gehaltserhöhungen."
  - "Mit jedem neuen Kunden steigt der Druck, nicht die Entlastung — Das ist das klarste Signal: Wachstum sollte Kapazität\
    \ freisetzen, nicht verschieben. Wenn es das nicht tut, fehlt operative Infrastruktur."
