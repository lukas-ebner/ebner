  "kicker": "Operations Beratung Agenturen"
  "subtitle": "Viele Agenturinhaber glauben, sie hätten ein Vertriebsproblem. In Wahrheit haben sie oft ein Operations-Problem.\
    \ Mehr Projekte lösen das nicht, sondern verstärken es. Wenn Sales, Delivery, Projektmanagement und Zeiterfassung nicht\
    \ sauber zusammenspielen, verschwindet Wachstum im Alltag. Ich habe eins+null von 2005 bis 2022 selbst geführt, von 2\
    \ auf 50 Mitarbeitende skaliert, 2021 mit 40 Prozent EBITDA gearbeitet und die Agentur 2022 an die Kraftwerk Holding verkauft.\
    \ Genau deshalb ist diese Beratung keine Agenturtheorie, sondern Operations aus echter Führungsverantwortung."
