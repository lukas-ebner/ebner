"sections":
- "type": "prose"
  "heading": "Wann Agentur-Operations zum eigentlichen Engpass werden"
  "content":
  - "Bertram Brossardt, Hauptgeschäftsführer der vbw, verwies am 22. April 2026 auf nur noch 0,5 Prozent Wachstumsprognose\
    \ für 2026. In stagnierenden Märkten wird operative Marge wichtiger als schönes Wachstum. Für Agenturen heißt das konkret:\
    \ Mehr Geschäft hilft nur dann, wenn Delivery, Projektsteuerung und Auslastung sauber funktionieren. Wenn das nicht der\
    \ Fall ist, macht mehr Vertrieb das Problem oft nur größer. Der Markt bestraft operative Unschärfe dann schneller als\
    \ früher, weil Margenpolster kleiner werden und Nacharbeit direkter auf die Wirtschaftlichkeit drückt."
  "bullets":
  - "Die Marge verschwindet im Alltag — Projekte sehen auf dem Papier gut aus, aber Nacharbeit, Schleifen und operative Sonderfälle\
    \ fressen den Ertrag."
  - "Das Team wächst, aber die Ruhe nicht — Mehr Köpfe bringen mehr Koordinationsaufwand statt mehr Entlastung, weil Rollen\
    \ und Übergaben nicht sauber gebaut sind."
  - "Sales und Delivery ziehen nicht in dieselbe Richtung — Was verkauft wird, passt nicht immer zu dem, was in der Umsetzung\
    \ wirtschaftlich und operativ sauber lieferbar ist."
  - "Der Inhaber bleibt der operative Flaschenhals — Formal ist Verantwortung verteilt. Praktisch gehen Priorisierung, Eskalation\
    \ und Sonderfälle trotzdem wieder nach oben."
