- "type": "prose"
  "heading": "Für Agenturen, die skalieren wollen, ohne sich dabei zu zerstören"
  "content":
  - "Ich war selbst Agenturinhaber. Ich kenne den Moment, wo mehr Kunden mehr Chaos bedeuten statt mehr Ertrag. Die Lösung\
    \ ist fast immer dieselbe: Führungslogik, Projektstruktur und Marge-Tracking sauber aufbauen, bevor der nächste Wachstumsschritt\
    \ kommt. Ich habe eine Digitalagentur von 0 auf 50 Mitarbeitende aufgebaut, erfolgreich übergeben und dabei alle Phasen\
    \ operativ selbst durchlebt."
  "bullets":
  - "Eigene Agentur von 0 auf 50 Mitarbeitende skaliert"
  - "7-stelliger Exit nach sauberem Betriebsaufbau"
  - "Spezialisiert auf dienstleistungsintensive KMU und Agenturen"
- "type": "faq"
  "heading": "Häufige Fragen zur Operations-Beratung für Agenturen"
  "items":
  - "question": "Ab welcher Größe macht Operations-Beratung für Agenturen Sinn?"
    "answer": "Meistens ab fünf bis acht Mitarbeitenden oder sobald du merkst, dass Wachstum mehr Probleme erzeugt als löst.\
      \ Auch kleinere Agenturen profitieren, wenn Projektstruktur und Führungslogik früh aufgebaut werden."
  - "question": "Was ist der typische Einstieg?"
    "answer": "Wir schauen uns drei bis fünf konkrete Engpässe an: Projektsteuerung, Übergaben, Führungslogik, Marge-Tracking,\
      \ Kapazitätsplanung. Dann priorisieren wir, wo zuerst angesetzt wird."
  - "question": "Wie unterscheidet sich das von klassischer Unternehmensberatung?"
    "answer": "Ich arbeite nicht mit Theoriemodellen, sondern mit deinem echten Betriebsalltag. Das bedeutet konkrete Maßnahmen,\
      \ klare Verantwortlichkeiten und Ergebnisse, die du in vier bis acht Wochen spürst."
  - "question": "Gilt das auch für remote oder hybride Agenturen?"
    "answer": "Ja, gerade dort. Remote-Agenturen kämpfen oft mehr mit unklaren Übergaben, Silo-Kommunikation und fehlender\
      \ Führungsstruktur als klassische Vor-Ort-Teams."
