- "type": "prose"
  "heading": "Agentur-Operations aus 13 Jahren eigener Geschäftsführung"
  "content":
  - "Ich habe eins+null von 2005 bis 2022 geführt, von zwei auf fünfzig Mitarbeitende skaliert und 2021 mit 40 Prozent EBITDA\
    \ gearbeitet. 2022 folgte der Exit an die Kraftwerk Holding. Diese Zahlen sind hier nicht Schmuck, sondern der Grund,\
    \ warum ich über Agentur-Operations anders sprechen kann als klassische Berater. Ich kenne die Spannung zwischen Vertrieb\
    \ und Delivery, den Unterschied zwischen Auslastung und Profitabilität und die Frage, wann Reporting wirklich zu einem\
    \ Führungsinstrument wird. Leadtime, das Produkt das ich seit 2023 baue, kommt direkt aus diesem Problemraum: CRM, Projektmanagement,\
    \ Zeiterfassung und operative Übersicht aus dem Agenturalltag heraus."
  "bullets":
  - "eins+null 13 Jahre geführt, von 2 auf 50 Mitarbeitende skaliert"
  - "40 Prozent EBITDA in 2021 als Profitabilitätsbeweis"
  - "Exit 2022 an die Kraftwerk Holding"
  - "Leadtime seit 2023 als Software aus demselben Operations-Problemraum"
- "type": "faq"
  "heading": "Häufige Fragen zur Operations-Beratung für Agenturen"
  "items":
  - "question": "Für welche Agenturen ist das sinnvoll?"
    "answer": "Für Agenturen mit 5 bis 50+ Mitarbeitenden, die merken, dass Delivery, Projektlogik, Führung oder Reporting\
      \ nicht mehr sauber mit dem Wachstum mithalten."
  - "question": "Brauchen wir eher mehr Vertrieb oder bessere Operations?"
    "answer": "Das lässt sich im Erstgespräch oft schnell einordnen. Wenn Marge, Delivery und Steuerung bereits wackeln, verstärkt\
      \ mehr Vertrieb das Problem oft nur."
  - "question": "Geht es hier um Prozessberatung oder um Agenturführung?"
    "answer": "Beides, aber aus dem Agenturalltag heraus. Nicht abstrakte Prozesse, sondern die Frage, wie Sales, Delivery,\
      \ Zeiterfassung und Führung wirtschaftlich zusammenspielen."
  - "question": "Was verbessert sich konkret?"
    "answer": "Mehr Steuerbarkeit, klarere Verantwortungen, frühere Eskalation, bessere Margentransparenz, belastbarere Forecasts\
      \ und weniger operative Last auf der Geschäftsführung. Kurz: weniger Chaos bei gleicher oder höherer Leistung."
  - "question": "Ist das nicht einfach Leadtime-Vertrieb?"
    "answer": "Nein. Leadtime ist aus demselben Problemraum entstanden, aber die Beratung verkauft kein Tool. Erst geht es\
      \ um die Operations-Logik. Ob später Software hilft, ist eine eigene Frage."
  - "question": "Wie startet die Zusammenarbeit?"
    "answer": "Mit einem Erstgespräch. Kein Pitch, keine Tool-Demo. Nur eine ehrliche Einordnung, ob das eigentliche Problem\
      \ gerade bei Operations liegt und welcher Hebel zuerst Wirkung bringt."
  - "question": "Ist das auch für kleinere Agenturen mit unter zehn Leuten sinnvoll?"
    "answer": "Ja. Gerade kleinere Agenturen profitieren früh von klareren Zuständigkeiten, saubereren Übergaben und belastbareren\
      \ Kennzahlen. Wer zu spät strukturiert, bezahlt später teurer für dieselben Probleme."
  - "question": "Woran sehe ich, dass Operations wirklich mein Hauptengpass sind?"
    "answer": "Wenn Projekte wirtschaftlich schlechter laufen als erwartet, Eskalationen spät sichtbar werden, Sales und Delivery\
      \ regelmäßig aneinander vorbeiarbeiten und die Geschäftsführung operative Last nicht loswird, liegt der Engpass meist\
      \ nicht zuerst im Vertrieb, sondern in der Operations-Logik."
"endCTA":
  "heading": "Wenn deine Agentur wachsen soll, ohne dass das Chaos mitwächst"
  "body": "Dann lass uns anschauen, wo Marge, Steuerung und Delivery gerade Reibung erzeugen. Direkt, ohne Agentur-Buzzwords\
    \ und mit Blick auf das, was in deinem Alltag wirtschaftlich wirklich zählt. Das Erstgespräch ist nicht für eine Präsentation\
    \ da, sondern für die ehrliche Sortierung: Liegt euer Engpass bei Vertrieb, Positionierung oder tatsächlich bei Operations?\
    \ Wenn danach klar ist, was zuerst gelöst werden muss, hat sich das Gespräch gelohnt. Und wenn klar wird, dass ihr zuerst\
    \ etwas anderes stabilisieren müsst, ist das genauso wertvoll. Ziel ist nicht, Beratung zu verkaufen. Ziel ist, operative\
    \ Klarheit zu schaffen."
