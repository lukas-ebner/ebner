    entries:
      - period: "2026 – heute"
        role: "Fracto – KI-Plattform für Softwareunternehmen"
        org: "Co-Founder & CTO"
        url: "https://fracto.de"
        description: "Zusammen mit Laurin Gerdes gegründet – wir haben uns im Silicon-Valley-Programm der TH Deggendorf kennengelernt. Ich verantworte Operations, Technik und den Organisationsaufbau. Laurin macht Vertrieb. Das Ziel: eine Plattform, die Software-Dienstleister bei der täglichen Arbeit mit KI unterstützt."
      - period: "2023 – heute"
        role: "Leadtime – die Software, die aus der Praxis kam"
        org: "Founder & Geschäftsführer"
        url: "https://leadtime.app"
        description: "CONNEX war ein internes Tool, das ich bei eins+null entwickelt habe, um die Agentur skalierbar zu machen. Leadtime ist die konsequente Weiterentwicklung – diesmal als eigenständiges SaaS-Produkt: Project Delivery Platform für Software-Dienstleister. Projektmanagement, Zeiterfassung, Controlling, CRM und Rechnungsstellung in einem System."
      - period: "2023 – heute"
        role: "Unternehmensberater & Coach für Skalierung und Exit-Strategie"
        org: "Geschäftsführer, Wachstumscoach GmbH"
        url: "https://lukasebner.de"
        description: "Unternehmensberatung aus Regensburg für Geschäftsführer, die ihr Unternehmen skalieren oder zur Unternehmensnachfolge und Exit vorbereiten wollen. Ich helfe dabei, interne Abläufe zu professionalisieren – Operations, Prozesse, Digitalisierung. Alles, womit man ein System schneller und belastbarer macht. Kein Theoriewissen – sondern 13 Jahre eigene Erfahrung und einen Exit in der Tasche."
      - period: "2012 – 2014"
        role: "MBA in Unternehmensgründung & -führung"
        org: "Technische Hochschule Deggendorf"
        url: "https://www.th-deg.de"
        grade: "1,3"
        description: "Berufsbegleitend neben der Geschäftsführung bei eins+null. Zwei Jahre lang abends und am Wochenende. In einer Seminararbeit über Controlling entstand die Idee für CONNEX – das Tool, aus dem später Leadtime werden sollte. Ein Studium, das direkt in ein Produkt gemündet hat."
      - period: "2009 – 2022"
        role: "eins+null – 13 Jahre Agentur, Unternehmen von 0 auf 50 Leute skaliert"
        org: "Geschäftsführer & Gründer"
        url: "https://einsundnull.de"
        description: "Zusammen mit Michael Zuber im Wohnzimmer gegründet. Was als Freelancer-Duo begann, haben wir bootstrapped auf 4 Mio. Umsatz und 50 Mitarbeiter skaliert – eine echte Unternehmensnachfolge-Story. Über 1.000 Projekte für die Energiewirtschaft – Webportale, Apps, digitale Vertriebsplattformen. 2022 im 7-stelligen Bereich als Exit verkauft."
      - period: "2005 – 2009"
        role: "Nebenbei: Freelance-Webentwicklung während des Studiums"
        org: "Freiberuflich, u. a. für Goldgas"
        description: "Parallel zum Studium an der Hochschule Ansbach habe ich als freiberuflicher Webentwickler gearbeitet – und damit mein Studium komplett selbst finanziert. Der entscheidende Auftrag kam über die Hochschulzeitschrift: Goldgas, ein Energie-Startup, das eine Website brauchte. Daraus wurde ein Portal, dann das Goldgas Cockpit – eine vollständige Vertriebsplattform. Dieser Auftrag war der Grundstein für die Gründung von eins+null."
      - period: "2005 – 2010"
        role: "Studium: Multimedia & Kommunikation"
        org: "Hochschule Ansbach"
        url: "https://www.hs-ansbach.de"
        grade: "1,7"
        description: "Fünf Jahre Multimedia & Kommunikation mit Schwerpunkt IT. Hier habe ich zum ersten Mal richtig programmieren gelernt – Perl, PHP, Java. Und hier ist der Unternehmer in mir entstanden: Statt Werkstudentenjobs habe ich von Tag eins als Freelancer gearbeitet und angefangen, eigene Projekte umzusetzen."
      - period: "2002 – 2005"
        role: "Freiberuflicher Mediengestalter"
        org: "Verschiedene Agenturen & Verlage"
        description: "Direkt nach der Ausbildung selbstständig gemacht. Webentwicklung, Printdesign, Logogestaltung – alles was reinkam. Gutes Geld für Anfang 20, aber irgendwann hat der Kopf mehr gewollt als die Hände liefern konnten. Also: Studium."
      - period: "1999 – 2002"
        role: "Ausbildung zum Mediengestalter"
        org: "Creativ Concept Werbeagentur, Regensburg"
        description: "Drei Jahre Grafikdesign, Typografie und Printproduktion. Das handwerkliche Fundament für alles, was danach kam. Aber schon während der Ausbildung war klar: Das Web ist interessanter als Papier."
      - period: "1998 – 1999"
        role: "Grundwehrdienst"
        org: "Bundeswehr, Bad Reichenhall"
        description: ""

  # ── 3. STORY: Der beste Beruf ───────────────────────
  - template: parallax-story
    image:
      src: /images/fotos/DSC00263.jpg
      alt: "Lukas Ebner"
    signature: /images/signature-new.svg
    sections:
      - headline: "Der beste Beruf."
        body: "Unternehmertum ist pure Kreativität: Es ist deine Kernaufgabe, etwas zu erschaffen – aus dem Nichts. Eine Idee, ein Produkt, eine Strategie, ein Team, ein System, das Wert erzeugt. Und dann hältst du es am Laufen, während sich alles um dich herum verändert. Stressig? Ja, auch. Aber es ist der gute Stress – der, den man sich selbst ausgesucht hat. Zumindest meistens."
      - type: quote
        quote: "Meine Arbeit fühlt sich an wie ein faszinierendes Hobby – eine riesige Spielzeugeisenbahn im Keller – bei der es immer noch was zu pflegen und dranzubauen gibt."
      - body: "Ich habe mit Anfang 20 angefangen, als Freelancer Websites zu bauen. Und ich empfehle jedem, dem das Schicksal oder die Umstände die Gelegenheit geben, ein Leben als Angestellter hinter sich zu lassen: schnell und beherzt zugreifen. Denn der Moment, in dem man seine erste Rechnung ausdruckt, auf eigenem Briefpapier – der ist unvergesslich. Nichts motiviert so, wie sich auf die eigenen Ressourcen und Skills zu besinnen und echte Verantwortung zu übernehmen. Für alles."
      - body: "Was mich an Unternehmertum fasziniert, ist die schiere Bandbreite. An einem Tag verhandelst du einen Vertrag. Am nächsten debuggst du eine API. Dann sitzt du mit jemandem, der kurz davor ist hinzuschmeißen, und versuchst herauszufinden, was wirklich los ist. Und abends liest du ein Buch über Systemtheorie, weil du das Gefühl hast, dass da eine Idee drin steckt, die dein ganzes Unternehmen weiterbringt. Diese Abwechslung – dieses projektbasierte Arbeiten, wo kein Jahr wie das andere ist – das ist kein Nebeneffekt. Das ist der Kern."
      - type: quote
        quote: "Es ist der beste Beruf. Fordernd. Belohnend."
      - body: "Jedes Projekt hinterlässt etwas. Eine Website, die noch läuft. Ein Tool, das ein Problem gelöst hat. Ein Team, das zusammengewachsen ist. Nach über 15 Jahren habe ich in meinem Kopf so etwas wie ein Verzeichnis – für jedes Jahr die Dinge, mit denen ich mich beschäftigt habe, was ich lernen musste, um sie umzusetzen, was am Ende dabei rauskam. Manchmal hatte ich richtig Erfolg damit. Manchmal nicht. Aber es bleibt immer was übrig. Das kann dir ein normaler Beruf nicht geben."
      - body: "Man wird als Unternehmer nicht fertig. Nie. Es gibt immer eine neue Technologie, die alles verändert. Ein neues Buch, das deine Perspektive verschiebt. Feedback von jemandem, das dich zwingt, dich selbst ehrlich zu betrachten. Und es gibt die eigene Entwicklung – die Erkenntnis, dass du vor fünf Jahren Entscheidungen getroffen hast, die du heute anders treffen würdest. Nicht weil sie falsch waren, sondern weil du es einfach noch nicht anders machen konntest – weil ein Teil des Puzzles noch gefehlt hatte."
      - body: "Ich habe ein Unternehmen 13 Jahre lang aufgebaut und dann verkauft. Ich habe drei weitere gegründet. Ich arbeite fast jede Nacht – nicht weil ich muss, sondern weil ich um Mitternacht dieselbe Energie spüre wie um neun Uhr morgens. Für die meisten Menschen klingt das ungesund. Ist es aber nicht. Es ist pures Wachstum. Es ist der Zustand, in dem Arbeit aufhört, Arbeit zu sein."
      - type: quote
        quote: "Es ist pure Kreativität, pure Selbstentwicklung. Und es gibt dir das, was du als Mensch brauchst: eine Biografie."
      - body: "Was ich mir wirklich wünsche – für jeden, der sich auf diese Reise begibt – ist, dass er irgendwann in diese Zone kommt. Wo die Grenze zwischen Beruf und Berufung verschwindet. Wo du morgens nicht aufstehst, weil du musst, sondern weil du es kaum erwarten kannst. Das ist kein Privileg weniger Auserwählter. Das ist eine Frage der Entscheidung – und der Bereitschaft, den Preis dafür zu zahlen."

