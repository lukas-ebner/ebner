  # ── 5. PERSÖNLICH ───────────────────────────────────
  - template: photo-gallery
    headline: "Wenn ich nicht arbeite."
    bg: "#ffffff"
    subtext: "Ich lebe mit meiner Frau Lucretia und meinem Sohn Noah in Regensburg. Lucretia habe ich 2018 in Cluj-Napoca kennengelernt – bei einem Besuch meines Entwicklerteams. Was als Geschäftsreise anfing, wurde ziemlich schnell ziemlich privat. Während Covid haben wir uns entschieden zusammenzuziehen. Ehrlich gesagt gehören 60 % meines Lebens der Arbeit und 40 % der Familie. Manchmal verschwimmt die Grenze – und das ist ok so. Abseits von Bildschirmen bin ich besessen von Kameras und Fotografie. Die meisten Bilder hier habe ich selbst geschossen. Ich fotografiere, unterwegs, auf Reisen oder einfach im Alltag, weil es mich zwingt, etwas langsamer zu machen, genauer hinzuschauen."
    lightbox: true
    randomDir: "/images/privat"
    randomCount: 8

  # ── 6. FAQ ──────────────────────────────────────────
  - template: faq
    headline: "Häufige Fragen"
    bg: "#E6EEEF"
    variant: light
    items:
      - question: "Wer ist Lukas Ebner und was macht er beruflich?"
        answer: "Gründer, Berater, Systemdenker – und immer noch am Bauen. Vier Unternehmen gegründet: eins+null (13 Jahre, 7-stelliger Exit), Leadtime (PM-SaaS), Fracto (AI für MedTech). Jetzt begleite ich andere Gründer beim Skalieren und Exit-Vorbereitung."

      - question: "Was genau macht Lukas Ebner als Unternehmensberater?"
        answer: "Ich arbeite mit IT-Gründern und Geschäftsführern an drei großen Themen: Wie skaliere ich meine Organisation, ohne den Boden unter den Füßen zu verlieren? Wie baue ich Prozesse, die auch ohne mich funktionieren? Und wie bereite ich mein Unternehmen auf einen guten Exit vor? Der Unterschied: Meine Antworten kommen aus 13 Jahren aktiver Geschäftsführung, nicht aus dem Lehrbuch."

      - question: "Für wen ist das Geschäftsführer-Coaching gedacht?"
        answer: "Für die Gründer und GFs, deren Unternehmen schneller wächst als ihre Prozesse – und die gemerkt haben, dass das auf Dauer schmerzhaft wird. Die Zielgruppe: 5 bis 100 Mitarbeiter, Tech-Branche, deutschsprachig, und bereit, an den echten Problemen zu arbeiten."

      - question: "Welche Erfahrung bringt Lukas Ebner als Berater mit?"
        answer: "MBA (Note 1,3), zertifizierter Coach und Organisationsberater, IT-Sicherheitsbeauftragter ISO 27001. Parallel dazu noch zwei aktive Unternehmen, die ich nicht delegieren kann: Leadtime und Fracto. Wenn ich rate, dann weiß ich, wovon ich rede."

      - question: "Was ist Leadtime?"
        answer: "Ein PM-Tool, das ich selbst bräuchte. Entstand über 8 Jahre als internes System bei eins+null, irgendwann wurde aus CONNEX ein eigenständiges Produkt. Projektmanagement, Zeiterfassung, CRM, Abrechnung – alles zusammen, keine Excel-Lösungen. Selbst profitabel, selbst im Einsatz."

      - question: "Was ist Fracto?"
        answer: "Dokumentation wird zu Schulung. MedTech-Geräte erklären sich selbst via QR-Code und AI. Mit Laurin gegründet im Silicon Valley Programm."

      - question: "Was war eins+null und warum wurde das Unternehmen verkauft?"
        answer: "Im Wohnzimmer gegründet (2009), auf 4 Mio. Umsatz und 50 Mitarbeiter skaliert, über 1.000 Projekte für Energieversorger. 2022 verkauft – nicht weil es schlecht lief, sondern weil nach 13 Jahren klar war: Das Unternehmen ist gelernt. Die nächste Phase braucht einen anderen Owner."

      - question: "Arbeitet Lukas Ebner remote oder vor Ort in Regensburg?"
        answer: "Büro in Regensburg, arbeite aber deutschlandweit. Mix aus vor Ort und remote – je nachdem, was gerade dran ist. Intensive Workshops vor Ort, laufendes Coaching per Video."

      - question: "Was kostet eine Zusammenarbeit mit Lukas Ebner?"
        answer: "125 €/h. Pakete ab 4.750 €. Alles Weitere auf der Preise-Seite."

      - question: "Welche Zertifizierungen hat Lukas Ebner?"
        answer: "MBA Unternehmensgründung und -führung (TH Deggendorf, 1,3), Organisationsberater & Change Manager (ICO), systemischer Coach (ICO), IT-Sicherheitsbeauftragter ISO 27001 (TÜV NORD), Silicon Valley Entrepreneurship Program, Multimedia & Kommunikation (Hochschule Ansbach, 1,7)."

      - question: "Wie kann ich ein Erstgespräch mit Lukas Ebner buchen?"
        answer: "Über /erstgespraech. Kurzes Formular, 24h später ein Termin. 30 Minuten, kostenlos, kein Verkauf – nur ehrliche Klarheit, ob es passt."

      - question: "Ist eine Beratung über BAFA möglich?"
        answer: "Ja. Details auf der Preise-Seite."

      - question: "In welchen Branchen berät Lukas Ebner?"
        answer: "Tech, SaaS, IT-Services, MedTech, Agenturen – im Kern überall da, wo schnell skaliert werden muss und die Prozesse mitwachsen müssen. Die meisten Kunden kommen aus Deutschland und Österreich, 5 bis 100 Mitarbeiter."
