"sections":
- "type": "prose"
  "heading": "Typische Change-Situationen im Mittelstand"
  "content":
  - "Bertram Brossardt, Hauptgeschäftsführer der vbw, verwies am 22. April 2026 auf nur noch 0,5 Prozent Wachstumsprognose\
    \ für dieses Jahr. In dieser wirtschaftlichen Lage verliert Beratung, die nicht in konkrete Handlung übersetzt wird, jede\
    \ Legitimation. Für mittelständische Unternehmen ist Change keine abstrakte Frage, sondern eine operative Antwort auf\
    \ konkrete Situationen."
  "bullets":
  - "Wachstum, aber Entscheidungen kommen zurück nach oben — Die Führungsstruktur wächst nicht mit dem Unternehmen mit. Entscheidungen,\
    \ die auf mittlerer Ebene getroffen werden sollten, landen wieder bei der Geschäftsführung."
  - "Führungswechsel erzeugt Reibung statt Klarheit — Neue Führung trifft auf etablierte Kultur. Informelle Erwartungen und\
    \ explizite Strukturen passen nicht zusammen. Vertrauen wird langsam aufgebaut, aber es braucht einen Rahmen."
  - "Digitalisierung läuft, aber operativer Nutzen fehlt — Die Technologie ist da, aber die Betriebslogik darunter ist nicht\
    \ angepasst. Digitalisierung hat nicht entlastet, sondern einen neuen Koordinationsaufwand geschaffen."
  - "Kick-off stark, nach wenigen Wochen versandet das Projekt — Der Start ist gut. Nach einigen Wochen dominiert das Tagesgeschäft\
    \ wieder. Die Verbindlichkeit fehlt. Verantwortlichkeiten sind unklar. Nachsteuerung findet nicht statt."
