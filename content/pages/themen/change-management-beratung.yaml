- "type": "faq"
  "heading": "Häufige Fragen zur Change Management Beratung"
  "items":
  - "question": "Für welche Unternehmen ist das gedacht?"
    "answer": "Für KMU, die Wachstum, Übergabe, Reorganisation oder Digitalisierung sauber umsetzen wollen, ohne dass der\
      \ Veränderungsprozess an der Geschäftsführung hängt."
  - "question": "Wie lange dauert eine typische Begleitung?"
    "answer": "Häufig starten wir mit einem fokussierten acht- bis zwölf-Wochen-Setup und gehen danach in ein Umsetzungssparring."
  - "question": "Wie wird Erfolg gemessen?"
    "answer": "Über wenige, klare Kennzahlen wie Entscheidungsdurchlaufzeit, Eskalationen pro Woche oder Nacharbeitsquote."
  - "question": "Was unterscheidet das von klassischer Change-Beratung?"
    "answer": "Der Schwerpunkt liegt nicht auf Kommunikations- und Workshop-Formaten, sondern auf der Frage: Was muss in Führung,\
      \ Entscheidungslogik und Tagesrhythmus konkret anders werden, damit Veränderung hält?"
"endCTA":
  "heading": "Change darf nicht am Projektplan enden"
  "body": "Wenn ihr Veränderung wirklich im Alltag verankern wollt, braucht ihr klare Führungsroutinen, saubere Entscheidungslogik\
    \ und Umsetzungsdisziplin."
