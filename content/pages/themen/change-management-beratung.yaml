meta:
  title: "Change Management Beratung Regensburg für KMU | Lukas Ebner"
  description: "Change Management Beratung für Mittelstand in Regensburg und Ostbayern. Umsetzung im Alltag statt Folien. BAFA-förderfähiger Einstieg bis 80 % möglich."
  kicker: "Change Management Beratung"
  subtitle: "Veränderung, die im Alltag hält. Nicht nur im Workshop. Für Unternehmen in Regensburg, Oberpfalz und Ostbayern."
  heroImage: "/images/change/change-hero.png"
  heroAlt: "Workshop zur Change Management Beratung mit Führungsteam"
  og_image: "/images/og/change-management-beratung.jpg"
  breadcrumbs:
