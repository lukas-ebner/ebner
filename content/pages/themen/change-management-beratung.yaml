- "type": "prose"
  "heading": "Change Management aus dem eigenen Exit"
  "content":
  - "Ich habe den wahrscheinlich größten Change meines Lebens selbst moderiert: den Verkauf von eins+null nach 13 Jahren an\
    \ die Kraftwerk Holding. Neue Eigentümerstruktur. Veränderte Entscheidungswege. Integrierte Teams. Ich war dabei Change-Manager\
    \ und Veränderungsobjekt. Das ist keine Berater-Geschichte. Das ist gelebte Erfahrung. Davor habe ich eins+null von zwei\
    \ auf fünfzig Mitarbeitende skaliert. Jede Wachstumsstufe hatte ihre eigene Change-Dynamik: was bei fünf Leuten noch informell\
    \ funktioniert, bricht bei zwanzig. Was bei zwanzig trägt, trägt bei fünfzig nicht automatisch mehr. Seit 2025 bin ich\
    \ zudem zertifizierter ICO Organisationsberater und Change Manager sowie zertifizierter systemischer Coach. Diese Qualifikationen\
    \ geben dem gelebten Erleben einen methodischen Rahmen."
