- "type": "faq"
  "heading": "Häufige Fragen zur Change Management Beratung"
  "items":
  - "question": "Für welche Unternehmen ist das gedacht?"
    "answer": "Für KMU, die Wachstum, Führungswechsel, Übernahme, Reorganisation oder Digitalisierung sauber umsetzen wollen.\
      \ Voraussetzung ist, dass Führung bereit ist, am Führungsrhythmus zu arbeiten, und nicht nur das Team."
  - "question": "Was unterscheidet das von klassischer Change-Beratung?"
    "answer": "Schwerpunkt liegt auf Umsetzungsarchitektur, nicht auf Kommunikations- und Workshop-Formaten. Was muss in Führung,\
      \ Entscheidungslogik und Tagesrhythmus konkret anders werden, damit Veränderung hält?"
  - "question": "Wie lange dauert eine typische Begleitung?"
    "answer": "Häufig starten wir mit einem fokussierten acht- bis zwölf-Wochen-Setup und gehen danach in ein Umsetzungssparring,\
      \ abhängig von der Situation."
  - "question": "Wie wird Erfolg gemessen?"
    "answer": "Über wenige, klare Kennzahlen. Typisch sind Entscheidungsdurchlaufzeit, Eskalationen pro Woche oder Nacharbeitsquote.\
      \ Was gemessen wird, legen wir zu Beginn fest."
  - "question": "Was bringt der Exit-Erfahrungswinkel konkret?"
    "answer": "Wer Change nur von außen begleitet hat, weiß nicht, wie es sich anfühlt, selbst Veränderungsobjekt zu sein.\
      \ Ich weiß, wie Widerstand entsteht, obwohl alle intellektuell zustimmen. Wie Führung unter Veränderungsdruck klingt.\
      \ Und warum Umsetzungsarchitektur keine Methode ist, sondern eine Führungsfrage."
  - "question": "Kann Change Management BAFA-gefördert werden?"
    "answer": "Ja, für förderfähige Beratungsthemen wie Führung, Prozesse und Organisationsentwicklung ist BAFA-Förderung\
      \ möglich. Ob und in welchem Umfang das für eure Situation zutrifft, klären wir im Erstgespräch."
"endCTA":
  "heading": "Wenn Veränderung in eurem Unternehmen nicht hält, liegt es selten am Willen"
  "body": "Es liegt fast immer an fehlender Umsetzungsarchitektur. Das Erstgespräch klärt in dreißig Minuten, welche Art von\
    \ Veränderung gerade ansteht, ob der Kontext für strukturiertes Change Management geeignet ist und welcher erste Hebel\
    \ Wirkung bringen würde. Kein Workshop-Versprechen. Kein Konzeptverkauf. Nur Klarheit darüber, was als nächstes sinnvoll\
    \ ist. Manchmal ergibt sich ein fokussiertes Umsetzungs-Setup. Manchmal stellt sich heraus, dass zuerst etwas anderes\
    \ stabilisiert werden muss. Manchmal reicht das Gespräch selbst als Orientierung. Alle drei Ausgänge sind sinnvoll. Der\
    \ einzige, der es nicht ist, ist unklares Weiterarbeiten."
