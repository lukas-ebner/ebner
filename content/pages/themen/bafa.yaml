  description: "So nutzt du die BAFA-Förderung für Unternehmensberatung. Voraussetzungen, Ablauf und nächste Schritte kompakt erklärt."
  kicker: "BAFA-Förderung Unternehmensberatung"
  subtitle: "Wirksame Beratung muss nicht am Budget scheitern. Die BAFA-Förderung macht qualifizierte Unternehmensberatung für KMU finanzierbar."
