sections:
  - type: "prose"
    heading: "Wann BAFA für euch ein echter Hebel ist"
    content:
      - "Viele Geschäftsführer schieben notwendige Veränderungen auf, nicht aus Faulheit, sondern weil Zeit, Budget und Klarheit fehlen. Genau dort setzt BAFA-geförderte Beratung an."
    bullets:
      - "Ihr seid KMU mit bis zu 250 Mitarbeitenden und bis zu 50 Mio € Umsatz."
      - "Es gibt einen konkreten Engpass in Strategie, Prozessen, Führung oder Digitalisierung."
      - "Ihr wollt Ergebnisse umsetzen, nicht nur Präsentationen konsumieren."

  - type: "compare"
    heading: "Was BAFA-geförderte Beratung unterscheidet"
    leftTitle: "Ohne Förderhebel"
    rightTitle: "Mit BAFA-Förderung"
    rows:
      - label: "Einstieg"
        left: "Höhere Investitionshürde, Entscheidungen werden vertagt."
        right: "Niedrigere Einstiegshürde bei gleicher Beratungsqualität."
      - label: "Budget"
        left: "Volle Kosten tragen, oft in kleinen Schritten statt klarer Umsetzung."
        right: "Bis zu 80 % Zuschuss auf förderfähige Kosten."
      - label: "Wirkung"
        left: "Engpass bleibt oft länger bestehen."
        right: "Beratung kann früher starten und schneller wirken."

  - type: "figure"
    image: "/images/bafa/bafa-schmuck.jpg"
    alt: "BAFA-Antragsformular mit Taschenrechner auf einem Schreibtisch, ruhige Morgenatmosphäre"
    caption: "Papierkram mit Wirkung — der Antrag ist machbar, wenn Unterlagen und Ablauf sauber vorbereitet sind."

  - type: "crossref"
    heading: "Ablauf in vier Schritten"
    body: "Erstgespräch, Schwerpunkt definieren, Antrag + Umsetzung, Ergebnisse dokumentieren. Ohne Fördermittel-Theater, mit klaren Zuständigkeiten."
    link:
      label: "Hintergrund im Blog lesen"
      href: "/blog/bafa-foerderung-unternehmensberatung"

  - type: "bafa-calculator"
    heading: "Rechne den BAFA-Effekt auf euren Fall"
    body: "Vergleiche Zuschuss und Eigenanteil direkt auf Basis eurer Beratungskosten."
    cta:
      label: "BAFA-Check vereinbaren"
      href: "/erstgespraech?topic=bafa"

  - type: "faq"
    heading: "Häufige Fragen zur BAFA-Förderung"
    items:
      - question: "Wie hoch ist die Förderung?"
        answer: "Je nach Region sind Zuschüsse bis zu 80 % möglich, auf den förderfähigen Anteil der Beratungskosten."
      - question: "Ist der Antrag kompliziert?"
        answer: "Er ist machbar, wenn Unterlagen und Ablauf sauber vorbereitet sind. Genau dabei unterstütze ich strukturiert."
      - question: "Was passiert, wenn BAFA nicht passt?"
        answer: "Dann sage ich das klar. Ziel ist eine wirtschaftlich sinnvolle Entscheidung, nicht ein Antrag um jeden Preis."

endCTA:
  heading: "Wenn BAFA passt, spart ihr nicht nur Kosten, sondern Zeit bis zur Umsetzung"
  body: "Im Erstgespräch klären wir in kurzer Zeit, ob Förderlogik, Beratungsziel und eure Situation sauber zusammenpassen."
  primary:
