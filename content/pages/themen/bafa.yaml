- "type": "faq"
  "heading": "Häufige Fragen zur BAFA-Förderung für Unternehmensberatung"
  "items":
  - "question": "Wie hoch ist die BAFA-Förderung konkret?"
    "answer": "In Bayern und den alten Bundesländern: Bemessungsgrundlage 3.500 Euro, Fördersatz 50 Prozent, maximaler Zuschuss\
      \ 1.750 Euro. In den neuen Bundesländern und strukturschwachen Gebieten kann der Fördersatz höher sein. Quelle: IHK\
      \ Nürnberg und BAFA, Abruf 2026-04-23."
  - "question": "Wie viele BAFA-Beratungen kann ich beanspruchen?"
    "answer": "Bis zu 5 Beratungen gesamt bis 31. Dezember 2026, jedoch nicht mehr als 2 pro Jahr. Das Jahres-Kontingent gilt\
      \ für das jeweilige Kalenderjahr."
  - "question": "Muss der Antrag vor der Beratung gestellt werden?"
    "answer": "Ja, das ist die wichtigste Regel. Der Antrag muss BAFA-seitig genehmigt sein, bevor die Beratung beginnt. Rückwirkende\
      \ Anträge werden nicht akzeptiert."
  - "question": "Für welche Beratungsthemen ist BAFA förderfähig?"
    "answer": "Strategie, Führung, Prozesse, Digitalisierung, Fachkräftesicherung, Liquidität, Kostenoptimierung, Investitionsplanung.\
      \ Nicht förderfähig: Steuerberatung, reine IT-Entwicklung, Rechtsberatung, Buchhaltung."
  - "question": "Was passiert, wenn BAFA nicht für mich passt?"
    "answer": "Dann sage ich das klar im Erstgespräch. Ziel ist eine wirtschaftlich sinnvolle Entscheidung, nicht ein Förderantrag\
      \ um jeden Preis."
  - "question": "Wie läuft das Erstgespräch für BAFA ab?"
    "answer": "Dreißig Minuten. Kein Pitch, kein Aufwand. Wir klären, ob der Beratungsbedarf förderfähig ist, ob die Voraussetzungen\
      \ erfüllt sind und ob der Antrag jetzt sinnvoll ist. Danach weißt du, wie du weitermachst."
  - "question": "Muss ich Vorsteuerabzugsberechtigt sein, um BAFA zu nutzen?"
    "answer": "Nein. Seit dem 15. November 2025 gilt: Für nicht Vorsteuerabzugsberechtigte wird der Zuschuss auf den Brutto-Rechnungsbetrag\
      \ berechnet. Das macht die Förderung für diese Gruppe günstiger als vorher."
  - "question": "Kann ich BAFA und Digitalbonus gleichzeitig nutzen?"
    "answer": "Grundsätzlich ja, weil BAFA auf Beratungsleistungen zielt und Digitalbonus auf Investitionen in Digitalisierungsmaßnahmen.\
      \ Sie betreffen unterschiedliche Förderbereiche. Im konkreten Fall prüfen wir, ob De-minimis-Grenzen oder andere Ausschlüsse\
      \ greifen."
  - "question": "Gibt es eine Einkommens- oder Umsatzgrenze für BAFA?"
    "answer": "Ja. Antragsberechtigt sind KMU mit bis zu 250 Mitarbeitenden und einem Jahresumsatz von bis zu 50 Millionen\
      \ Euro oder einer Bilanzsumme bis 43 Millionen Euro. Außerdem darf das Unternehmen zum Zeitpunkt der Antragstellung\
      \ nicht als Unternehmen in Schwierigkeiten im EU-Sinne gelten."
"endCTA":
  "heading": "Wenn BAFA für dich sinnvoll ist, lohnt es sich jetzt zu starten"
  "body": "Die Richtlinie läuft Ende 2026 aus. Wer noch Förderung nutzen will, sollte jetzt prüfen ob die Voraussetzungen\
    \ stimmen. Das Erstgespräch ist genau dafür da: keine Verpflichtung, kein Verkaufsgespräch, nur eine ehrliche Einschätzung,\
    \ ob BAFA für deinen Beratungsbedarf gerade der richtige Weg ist. Dreißig Minuten. Konkrete Klarheit darüber, ob Förderantrag\
    \ ja oder nein, und warum. Wenn BAFA nicht das richtige ist, sage ich das. Wenn es passt, starten wir sauber, mit Antrag\
    \ vor Beratungsbeginn, sauberer Dokumentation und einem Ergebnis, das sich rechnet."
