"sections":
- "type": "prose"
  "heading": "BAFA-geförderte Beratung mit ICO-zertifiziertem Berater"
  "content":
  - "Ich bin seit 2025 zertifizierter ICO Organisationsberater und Change Manager sowie zertifizierter systemischer Coach.\
    \ Diese Qualifikationen stehen für die methodischen Voraussetzungen, die BAFA an Berater stellt. Als BAFA-registrierter\
    \ Berater kann ich Beratungsleistungen direkt mit der Förderlogik verbinden. Das bedeutet: Wenn BAFA passt, stellen wir\
    \ den Antrag vor Beginn und arbeiten dann strukturiert. Wenn BAFA nicht passt, sage ich das klar. Ich berate nicht so,\
    \ dass ein Antrag erzwungen wird, sondern so, dass ein Beratungsziel sinnvoll ist, egal ob gefördert oder nicht. Hinter\
    \ beiden Zertifizierungen steckt echte Lernarbeit, keine Briefkastenzertifikate. Das gibt den Beratungsleistungen, die\
    \ BAFA fördert, eine methodische Substanz, die den Verwendungsnachweis trägt."
