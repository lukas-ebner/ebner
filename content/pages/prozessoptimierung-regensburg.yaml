- "type": "prose"
  "heading": "Woran du merkst, dass Prozessoptimierung in Regensburg für dich gerade relevant ist"
  "content":
  - "In vielen Regensburger KMU läuft operativ noch erstaunlich viel über Zuruf. Das funktioniert bis zu einer bestimmten\
    \ Größe. Sobald Teams wachsen oder Projekte komplexer werden, wird aus pragmatischer Flexibilität echte Reibung."
  "bullets":
  - "Zu viele Rückfragen landen bei dir — Das Team arbeitet, aber Entscheidungen, Freigaben und Prioritäten rutschen trotzdem\
    \ immer wieder nach oben."
  - "Übergaben kosten unnötig Tempo — Zwischen Vertrieb, Projekt und Backoffice geht zu viel verloren, weil Prozesse nur halb\
    \ definiert sind und Verantwortung unklar bleibt."
  - "Neue Tools bringen nicht die erwartete Klarheit — Software ersetzt keine Betriebslogik. Wenn der Ablauf nicht sauber\
    \ ist, digitalisierst du nur das Chaos."
  - "Marge und Nerven gehen in Schleifen verloren — Zu viele Sonderfälle, Nacharbeit und Eskalationen fressen Zeit, die eigentlich\
    \ in saubere Umsetzung gehen sollte."
