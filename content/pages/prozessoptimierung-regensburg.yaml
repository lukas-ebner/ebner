- "type": "prose"
  "heading": "Warum ich das in Regensburg anders angehe"
  "content":
  - "Ich habe Eins+Null in Regensburg gegründet, von zwei auf fünfzig Mitarbeitende skaliert und 2022 an die Kraftwerk Holding\
    \ verkauft. In dreizehn Jahren habe ich jede Prozess-Bruchstelle selbst durchlebt. Was bei fünf Leuten noch als Pragmatismus\
    \ läuft, bricht bei zwanzig. Was bei zwanzig trägt, trägt bei fünfzig nicht mehr automatisch. Diese Skalierungs-Erfahrung\
    \ ist das, was operative Prozessberatung von Methoden-Workshops unterscheidet. Seit 2025 bin ich zusätzlich zertifizierter\
    \ ICO Organisationsberater und Change Manager, was den methodischen Rahmen absichert und eine strukturierte Vorgehensweise\
    \ sicherstellt. Und mit 1000+ abgeschlossenen Projekten in der Energiewirtschaft kenne ich Prozessgerüst für Dienstleistungsunternehmen\
    \ nicht aus einer Fallstudie, sondern aus dem Alltag einer wachsenden Digitalagentur, die ich selbst aufgebaut, geführt\
    \ und erfolgreich übergeben habe."
  "bullets":
  - "Eins+Null von 2 auf 50 MA skaliert, 13 Jahre operative Führung in Regensburg"
  - "1000+ Projekte in der Energiewirtschaft, Prozesslogik aus dem echten Dienstleistungsalltag"
  - "ICO Organisationsberater + Change Manager, zertifiziert 2025, methodisch fundiert"
  - "Skalierungs-Erfahrung von 2 auf 50 MA, 13 Jahre in Regensburg gegründet und geführt"
- "type": "faq"
  "heading": "Häufige Fragen zu Prozessoptimierung in Regensburg"
  "items":
  - "question": "Für welche Unternehmen in Regensburg ist das besonders sinnvoll?"
    "answer": "Für wachsende KMU, Dienstleister, Agenturen und projektgetriebene Teams, bei denen zu viele Rückfragen, Abstimmungen\
      \ und Sonderfälle auf der Führungsebene hängen bleiben und das Wachstum mehr Last als Entlastung bringt."
  - "question": "Geht es dabei nur um Software und Automatisierung?"
    "answer": "Nein. Erst kommt die Logik, dann das Tool. Wenn Rollen, Übergaben und Entscheidungswege nicht sauber sind,\
      \ wird Software nur digital teurer. Prozessoptimierung beginnt immer bei der Betriebslogik, nicht beim Tool-Auswahlprozess."
  - "question": "Was verbessert sich durch Prozessoptimierung konkret?"
    "answer": "Entscheidungen werden schneller, Übergaben klarer, Nacharbeit geringer und Führung spürbar entlasteter. Neue\
      \ Mitarbeitende werden produktiver, weil Abläufe dokumentiert und erklärt sind. Und Digitalisierung entlastet tatsächlich,\
      \ weil sie auf saubere Betriebslogik trifft statt auf Unordnung."
  - "question": "Was ist der Unterschied zu klassischer Prozessberatung?"
    "answer": "Ich arbeite nicht mit Lean-Projekten oder BPMN-Modellierungs-Workshops. Im Zentrum steht immer die Frage: Welche\
      \ zwei bis drei Stellen erzeugen gerade am meisten Reibung, und wie baut man das so um, dass es im Alltag trägt?"
  - "question": "Wie startet die Zusammenarbeit?"
    "answer": "Mit einem Erstgespräch und einer ehrlichen Einordnung, wo Abläufe, Rollen und Prioritäten gerade die meiste\
      \ Reibung erzeugen. Danach wird klar, ob ein fokussierter Umsetzungssprint, laufendes Sparring oder zunächst eine breitere\
      \ Diagnose sinnvoll ist. Wenn ich merke, dass Prozessoptimierung gerade nicht das richtige Mittel ist, sage ich das\
      \ auch."
  - "question": "Passt das auch für kleinere Teams unter zehn Mitarbeitenden?"
    "answer": "Ja. Gerade bei Teams unter zehn Mitarbeitenden entstehen oft später Problem-Gespräche, weil alles noch funktioniert.\
      \ Aber wenn jetzt die Weichen falsch gestellt werden, kostet das später mehr. Früh sauber strukturiert ist besser als\
      \ spät teuer umgebaut."
  - "question": "Was ist ein realistisches Ergebnis nach vier bis acht Wochen?"
    "answer": "Typischerweise gibt es in vier bis acht Wochen erste messbare Veränderungen: weniger Eskalationen pro Woche,\
      \ klarere Übergaben, schnellere Entscheidungen auf mittlerer Führungsebene. Keine vollständige Transformation, aber\
      \ spürbare operative Entlastung an den zwei bis drei Stellen, die vorher am meisten Energie gekostet haben."
"endCTA":
  "heading": "Wenn dein Betrieb in Regensburg durch fehlende Prozess-Struktur Energie verliert"
  "body": "Dann lass uns schauen, wo der eigentliche Engpass sitzt und wie du daraus wieder einen Betrieb machst, der sauber\
    \ läuft, ohne ständig an dir zu hängen. Das Erstgespräch ist genau dafür da: nicht für ein Methoden-Versprechen, sondern\
    \ für eine ehrliche Einordnung, wo Prozesse, Übergaben und Entscheidungslogik gerade am meisten kosten. Wenn Prozessoptimierung\
    \ nicht das Richtige ist, sage ich das klar. Wenn sie es ist, fangen wir mit dem konkreten Engpass an, der gerade am meisten\
    \ Zeit, Nerven und Marge kostet. In dreizehn Jahren als Geschäftsführer habe ich jede dieser Entscheidungen selbst getroffen.\
    \ Das macht den Unterschied zu Beratern, die das nur aus Buechern kennen."
