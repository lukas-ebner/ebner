meta:
  title: "Unternehmensberatung Niederbayern | Regionaler Partner"
  description: "Unternehmensberatung für Unternehmen in Niederbayern. Klarer Fokus auf Umsetzung, Effizienz und nachhaltiges Wachstum."
  og_image: "/images/og/geo-landingpage.jpg"
  accent: "#F44900"

variables:
  GEO_CITY: "Niederbayern"
  MAIN_KEYWORD: "Unternehmensberatung"
  LSI_KEYWORDS:
    - "Unternehmensberatung Niederbayern"
    - "Unternehmensberater Straubing"
    - "Unternehmensberater Landshut"
    - "Mittelstandsberatung Niederbayern"
    - "Unternehmensberatung Dingolfing"

slides:
  - template: hero-split
    pill: "Unternehmensberatung Niederbayern"
    headline: "Unternehmensberatung Niederbayern mit regionalem Fokus"
    subtext: "Niederbayern hat starken Mittelstand, viel handwerkliche Substanz und viele Unternehmen, die pragmatisch denken. Genau da passen Konzeptfolien schlecht. Was hilft, ist Klarheit in Führung, Entscheidungen und Prozessen."
    cta:
      text: "Erstgespräch buchen"
      url: "/erstgespraech"
    image:
      src: "/images/geo/unternehmensberatung-niederbayern-hero.jpg"
      alt: "Unternehmer in Niederbayern im Beratungsgespräch"

  - template: symptoms-grid
    imageStyle: panorama
    headline: "Typische Engpässe bei inhabergeführten Unternehmen in Niederbayern"
    body: "Niederbayerische KMU sind oft gut im Aufbauen, stoßen aber in der Skalierungsphase an operative Grenzen. Wenn Wachstum plötzlich mehr Last als Entlastung bringt, lohnt sich ein nüchterner Blick auf Betriebslogik, Führungsroutinen und Entscheidungsstrukturen."
    symptoms:
      - pill: "Engpass 1"
        image: "/images/geo/symptom-1.jpg"
        headline: "Alles läuft trotzdem über dich."
        body: "Formal sind Verantwortlichkeiten verteilt. In der Praxis landen Entscheidungen, Eskalationen und Sonderfälle trotzdem beim Inhaber."
      - pill: "Engpass 2"
        image: "/images/geo/symptom-2.jpg"
        headline: "Mehr Mitarbeiter bringt mehr Koordinationsarbeit."
        body: "Wenn Führungslogik, Übergaben und Prioritäten nicht sauber gebaut sind, skaliert man mit jedem neuen Kopf nur die Komplexität."
      - pill: "Engpass 3"
        image: "/images/geo/symptom-3.jpg"
        headline: "Gute Ideen versanden in der Umsetzung."
        body: "Die Richtung ist klar. Aber Verbindlichkeit, Takt und Nachhalten fehlen, und deshalb holt der Alltag die Strategie immer wieder ein."
      - pill: "Engpass 4"
        image: "/images/geo/symptom-4.jpg"
        headline: "Digitalisierung läuft nebenher statt im System."
        body: "Tools werden eingeführt, aber ohne saubere Betriebslogik dahinter entstehen nur neue Abstimmungsschleifen."

  - template: credibility
    headline: "Kein Einflieger, sondern jemand der die Region kennt"
    body: "Ich habe meinen MBA bewusst an der TH Deggendorf gemacht, nicht in München, nicht in Nürnberg. Das Silicon-Valley-Programm wurde von der Stadt Regensburg gefördert. Ich berate nicht von außen, sondern aus einer Region, die ich über Jahrzehnte selbst als Unternehmer kenne. Deshalb interessiert mich weniger, wie Beratung aussieht, und mehr, was im Betrieb am Montag konkret anders laufen muss."
    proofs:
      - text: "27 Jahre in Ostbayern und Niederbayern verwurzelt"
      - text: "MBA an der TH Deggendorf, bewusste regionale Entscheidung"
      - text: "Eigene Firma aufgebaut und übergeben, kein Theoretiker"
    cta:
      label: "Gespräch vereinbaren"
      href: "/erstgespraech"

  - template: faq
    id: geo-faq
    headline: "Häufige Fragen zur Unternehmensberatung in Niederbayern"
    variant: light
    bg: "#E6EEEF"
    items:
      - question: "Für welche Unternehmen in Niederbayern ist das sinnvoll?"
        answer: "Vor allem für inhabergeführte KMU, Handwerksbetriebe, Dienstleister und Produzenten, die merken, dass Wachstum mehr Reibung als Entlastung bringt."
      - question: "Unterscheidet sich Niederbayern von anderen Regionen als Markt?"
        answer: "Die Betriebe in Niederbayern sind oft bodenständiger und weniger auf externe Beratung ausgerichtet als in Großstädten. Das ist kein Nachteil, es bedeutet nur, dass Beratung unmittelbar praxistauglich und ohne Overhead sein muss."
      - question: "Geht es um Strategie oder um Umsetzung?"
        answer: "Beides, aber Umsetzung hat Vorrang. Die entscheidende Frage ist nicht, wie das Organigramm aussieht, sondern was nächste Woche im Betrieb konkret anders laufen soll."
      - question: "Wie startet die Zusammenarbeit?"
        answer: "Mit einem Erstgespräch. Danach wird klar, ob ein kurzer Umsetzungssprint, laufendes Sparring oder gar keine Beratung sinnvoll ist."

  - template: cta
    headline: "Wenn dein Unternehmen in Niederbayern klarer werden soll"
    body: "Dann lass uns anschauen, wo Führung, Abläufe und Entscheidungen bei dir gerade Reibung erzeugen. Direkt, ohne Berater-Show und mit Blick auf das, was in deinem Alltag wirklich zählt."
    primary:
      label: "Erstgespräch buchen"
      href: "/erstgespraech"
