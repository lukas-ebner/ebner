- "type": "prose"
  "heading": "Kein Einflieger, sondern jemand der die Region kennt"
  "content":
  - "Ich habe meinen MBA bewusst an der TH Deggendorf gemacht, nicht in München, nicht in Nürnberg. Das Silicon-Valley-Programm\
    \ wurde von der Stadt Regensburg gefördert. Ich berate nicht von außen, sondern aus einer Region, die ich über Jahrzehnte\
    \ selbst als Unternehmer kenne. Deshalb interessiert mich weniger, wie Beratung aussieht, und mehr, was im Betrieb am\
    \ Montag konkret anders laufen muss."
  "bullets":
  - "27 Jahre in Ostbayern und Niederbayern verwurzelt"
  - "MBA an der TH Deggendorf, bewusste regionale Entscheidung"
  - "Eigene Firma aufgebaut und übergeben, kein Theoretiker"
- "type": "faq"
  "heading": "Häufige Fragen zur Unternehmensberatung in Niederbayern"
  "items":
  - "question": "Für welche Unternehmen in Niederbayern ist das sinnvoll?"
    "answer": "Vor allem für inhabergeführte KMU, Handwerksbetriebe, Dienstleister und Produzenten, die merken, dass Wachstum\
      \ mehr Reibung als Entlastung bringt."
  - "question": "Unterscheidet sich Niederbayern von anderen Regionen als Markt?"
    "answer": "Die Betriebe in Niederbayern sind oft bodenständiger und weniger auf externe Beratung ausgerichtet als in Großstädten.\
      \ Das ist kein Nachteil, es bedeutet nur, dass Beratung unmittelbar praxistauglich und ohne Overhead sein muss."
  - "question": "Geht es um Strategie oder um Umsetzung?"
    "answer": "Beides, aber Umsetzung hat Vorrang. Die entscheidende Frage ist nicht, wie das Organigramm aussieht, sondern\
      \ was nächste Woche im Betrieb konkret anders laufen soll."
  - "question": "Wie startet die Zusammenarbeit?"
    "answer": "Mit einem Erstgespräch. Danach wird klar, ob ein kurzer Umsetzungssprint, laufendes Sparring oder gar keine\
      \ Beratung sinnvoll ist."
"endCTA":
  "heading": "Wenn dein Unternehmen in Niederbayern klarer werden soll"
  "body": "Dann lass uns anschauen, wo Führung, Abläufe und Entscheidungen bei dir gerade Reibung erzeugen. Direkt, ohne Berater-Show\
    \ und mit Blick auf das, was in deinem Alltag wirklich zählt."
