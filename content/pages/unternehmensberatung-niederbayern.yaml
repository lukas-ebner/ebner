"sections":
- "type": "prose"
  "heading": "Typische Engpässe bei inhabergeführten Unternehmen in Niederbayern"
  "content":
  - "Niederbayerische KMU sind oft gut im Aufbauen, stoßen aber in der Skalierungsphase an operative Grenzen. Wenn Wachstum\
    \ plötzlich mehr Last als Entlastung bringt, lohnt sich ein nüchterner Blick auf Betriebslogik, Führungsroutinen und Entscheidungsstrukturen."
  "bullets":
  - "Alles läuft trotzdem über dich — Formal sind Verantwortlichkeiten verteilt. In der Praxis landen Entscheidungen, Eskalationen\
    \ und Sonderfälle trotzdem beim Inhaber."
  - "Mehr Mitarbeiter bringt mehr Koordinationsarbeit — Wenn Führungslogik, Übergaben und Prioritäten nicht sauber gebaut\
    \ sind, skaliert man mit jedem neuen Kopf nur die Komplexität."
  - "Gute Ideen versanden in der Umsetzung — Die Richtung ist klar. Aber Verbindlichkeit, Takt und Nachhalten fehlen, und\
    \ deshalb holt der Alltag die Strategie immer wieder ein."
  - "Digitalisierung läuft nebenher statt im System — Tools werden eingeführt, aber ohne saubere Betriebslogik dahinter entstehen\
    \ nur neue Abstimmungsschleifen."
