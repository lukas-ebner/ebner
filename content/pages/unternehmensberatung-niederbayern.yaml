"sections":
- "type": "prose"
  "heading": "Typische Engpässe bei inhabergeführten Unternehmen in Niederbayern"
  "content":
  - "Der wirtschaftliche Kontext macht diese Fragen nicht kleiner. Am 22. April 2026 verwies Bertram Brossardt, Hauptgeschäftsführer\
    \ der vbw, auf nur noch 0,5 Prozent Wachstumsprognose für dieses Jahr. Creditreform meldete im Frühjahr 2026 zugleich\
    \ einen Geschäftsklimaindex von 5,3 Punkten, den höchsten Stand seit vier Jahren. Die Botschaft dahinter ist wichtig:\
    \ Die Stimmung kann sich leicht verbessern, aber innere Reibung verschwindet nicht von selbst. Gerade in Niederbayern,\
    \ wo viele Betriebe pragmatisch führen und lange aus eigener Kraft funktionieren, bleiben operative Bremsen oft zu lange\
    \ unsichtbar."
  "bullets":
  - "Alles läuft am Ende doch über dich — Formal sind Verantwortlichkeiten verteilt. In der Praxis landen Entscheidungen,\
    \ Eskalationen und Sonderfälle trotzdem wieder beim Inhaber oder Geschäftsführer. Nicht weil das Team nicht will, sondern\
    \ weil Rollen, Grenzen und Prioritäten nicht sauber genug gebaut sind."
  - "Mehr Mitarbeitende bringen mehr Koordinationsarbeit statt mehr Ruhe — Wenn Führungslogik, Übergaben und Eskalationswege\
    \ unscharf sind, skaliert nicht die Entlastung, sondern die Komplexität. Der Betrieb wächst. Die Steuerbarkeit wächst\
    \ nicht mit."
  - "Gute Ideen versanden in der Umsetzung — Die Richtung ist oft klar. Trotzdem holt der Alltag jede Entscheidung wieder\
    \ ein. Nicht aus mangelndem Willen, sondern weil Rhythmus, Verbindlichkeit und operative Übersetzung fehlen."
  - "Digitalisierung läuft nebenher statt im System — Neue Tools werden eingeführt, aber niemand kann sauber sagen, welche\
    \ Reibung dadurch wirklich verschwindet. Ohne klare Betriebslogik entsteht nur eine zusätzliche digitale Abstimmungsschicht."
