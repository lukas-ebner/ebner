      href: "/preise"

  # ── 9. FAQ (light, 2-spaltig) ─────────────────────────
  - template: faq
    headline: "Häufige Fragen."
    variant: light
    bg: "#E6EEEF"
    items:
      - question: "Was passiert im Erstgespräch?"
        answer: "Du erzählst mir, welche Tools ihr nutzt und wo es hakt. Ich sage dir, ob ein [Tool Audit](/blog/tool-audit) Sinn macht und wo der erste Hebel liegt. 30 Minuten, gratis."
      - question: "Was genau ist ein Tool Audit?"
        answer: "Ich schaue mir an, wie eure Infrastruktur wirklich läuft – nicht wie sie auf dem Papier aussieht. Wo fließen Daten doppelt? Welche Informationen gehen verloren? Welche [Tools](/blog/tool-audit) sind Ballast? Das Ergebnis: eine klare Übersicht eurer digitalen Architektur und der konkrete erste Schritt."
      - question: "Brauchen wir ein ERP-System oder reichen einzelne Tools?"
        answer: "Kommt drauf an. Unter 10 Mitarbeitern genügt meist eine Kombination aus 3–4 sauber integrierten Tools. Danach wird's kritisch: Datensilos entstehen, widersprüchliche Zahlen, Reporting-Chaos. Ein ERP wie Leadtime – vor allem für Agenturen – fasst Projektmanagement, [Zeiterfassung](/blog/zeiterfassung-agentur), Controlling und Rechnungsstellung zusammen. Echte Frage: Habt ihr eine [Single Source of Truth](/blog/single-source-of-truth) oder nicht?"
      - question: "Muss ich Leadtime nutzen?"
        answer: "Nein, klar nicht. Manchmal ist ein anderes System die bessere Antwort. Manchmal brauchst du nur deine bestehenden Tools besser verbunden. Mein Job ist, dir eine funktionierende Architektur zu bauen – nicht ein Produkt zu verkaufen."
      - question: "Was, wenn wir schon Tools haben, die wir behalten wollen?"
        answer: "Dann behalten wir sie. Der Punkt ist nicht, alles wegzuwerfen, sondern herauszufinden, was echten Wert bringt und was nur noch da ist, weil es immer da war. Eine straffe, verbundene Architektur schlägt immer einen Flickenteppich."
      - question: "Wie läuft die digitale Transformation im Mittelstand konkret ab?"
        answer: "Drei Phasen. Phase 1: Ich analysiere, wie eure Tools wirklich genutzt werden, wo der Datenchaos entsteht. Phase 2: Wir entwerfen die Ziel-Architektur – welches System wird Zentrale, was wird angebunden, was raus? Phase 3: Migration und Enablement. Nach 2–3 Monaten habt ihr ein System, das arbeitet. Nicht nur existiert."
      - question: "Wie lange dauert so ein Projekt?"
        answer: "Das Basis-Setup ist meist 2–3 Monate. Wie lange genau hängt davon ab, wie viele Tools ihr habt und wie verstrickt eure Daten sind. Nach der Implementierung kann noch ein halbes Jahr Optimierung folgen – dann tauschen wir uns monatlich aus und tweaken nach. Die meisten merken den Effekt schon nach 4–6 Wochen, wenn die ersten Automatisierungen greifen."
      - question: "Was bringt Automatisierung von Geschäftsprozessen im KMU?"
        answer: "Zeit. Fehlerfreiheit. Nachdenken statt Datenpflege. Ein echtes Beispiel: Monatsabschluss. Vorher zwei Tage Excel-Frickelei, nachher ein Klick. Projekt-Reporting statt Wochenlange Vorbereitung – ein Dashboard, das live ist. Ihr unterschätzt, wie viel Stunden in stupider Datenmigration zwischen Tools verbrannt werden, die [Automatisierung](/blog/automatisierung) in Sekunden erledigt."
      - question: "Was kostet die Zusammenarbeit?"
        answer: "Je nach Größe: 4.750 € für 5–15 Leute, 7.000 € für 15–40, 9.500 € für 40–100. Drin: komplette Analyse, Architektur, Implementierung, Migration, Schulung. Budget zu knapp? Fangen wir mit einem fokussierten [Tool Audit](/blog/tool-audit) an – vielleicht fünf, sechs Stunden, dann sehen wir."
      - question: "Arbeitest du vor Ort oder remote?"
        answer: "Vor Ort für Audit und Analyse – sehe dann, wie euer Team wirklich mit Tools umgeht. Remote für den Rest. Funktioniert genauso gut."
      - question: "Gibt es eine BAFA-Förderung für Digitalisierungsberatung?"
        answer: "Ja. Bis zu 50 % Zuschuss, in den neuen Bundesländern sogar 80 %. Digitalisierungsberatung fällt voll rein. Ich kümmere mich um den Papierkram – von Antrag bis Abrechnung."
      - question: "Muss ich wirklich alles neu machen?"
        answer: "Nein. Wir ersetzen nur, was kaputt ist. Oft sind eure bestehenden Tools völlig ok – sie sind nur nicht verbunden. Konsolidierung ist nicht das Gleiche wie Kahlschlag."
