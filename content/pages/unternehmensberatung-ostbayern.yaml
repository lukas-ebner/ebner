"sections":
- "type": "prose"
  "heading": "Typische Engpässe bei inhabergeführten Unternehmen in Ostbayern"
  "content":
  - "Am 22. April 2026 halbierte die Bundesregierung ihre Wachstumsprognose auf nur noch 0,5 Prozent. Bertram Brossardt, Hauptgeschäftsführer\
    \ der vbw, forderte daraufhin tiefgreifende Reformen ohne weiteren Aufschub. Creditreform meldete im Frühjahr 2026 einen\
    \ Geschäftsklimaindex von 5,3 Punkten, höchster Stand seit vier Jahren, aber fragil. Patrik-Ludwig Hantzsch, Leiter der\
    \ Creditreform Wirtschaftsforschung, ordnete ein: Wer nur auf staatliche Impulse setzt, steht unsicher. Für Unternehmen\
    \ in Ostbayern bedeutet das, dass externe Märkte nicht die Betriebslogik reparieren. Die innere Robustheit muss selbst\
    \ aufgebaut werden."
  "bullets":
  - "Der Betrieb läuft zu stark über eine Person — Formal sind Verantwortlichkeiten verteilt. In der Praxis landen Entscheidungen\
    \ und Eskalationen trotzdem wieder beim Inhaber. Nicht weil das Team nicht will, sondern weil Rollen, Grenzen und Prioritäten\
    \ nicht sauber genug gebaut sind."
  - "Wachstum bringt mehr Koordinationsaufwand — Wenn Führungslogik und Prozesse nicht mitwachsen, skaliert nicht die Entlastung,\
    \ sondern die Komplexität. Mehr Mitarbeitende erzeugen mehr Abstimmungsschleifen statt mehr Ruhe."
  - "Gute Ideen versanden in der Umsetzung — Die Richtung ist oft bekannt, die Entscheidung gefallen. Trotzdem steht man drei\
    \ Monate später noch am gleichen Punkt. Nicht aus mangelndem Willen, sondern weil Verbindlichkeit und Rhythmus im Alltag\
    \ fehlen."
  - "Digitalisierung läuft nebenher ohne echten Effekt — Neue Tools werden eingeführt, aber niemand kann sauber sagen, welche\
    \ Reibung dadurch wirklich verschwunden ist. Ohne saubere Betriebslogik entsteht nur eine neue Abstimmungsschicht."
