- "type": "prose"
  "heading": "27 Jahre Ostbayern, nicht als Slogan, sondern als Arbeitserfahrung"
  "content":
  - "Ich bin kein Berater, der Ostbayern auf seiner Zielgebietsliste hat. Ich habe hier meine Berufsjahre verbracht, mein\
    \ Unternehmen aufgebaut, über dreizehn Jahre geführt und meine operative Erfahrung in echten Betriebssituationen gesammelt.\
    \ Das Silicon Valley Program der TH Deggendorf und das BITZ Oberschneiding in Niederbayern haben meinen Blick für Skalierung\
    \ und internationale Perspektiven geschärft, ohne die regionale Bodenhaftung zu verlieren. Genau deshalb interessiert\
    \ mich weniger, wie Beratung aussieht, und mehr, was in deinem Betrieb nächste Woche konkret anders laufen muss. Mein\
    \ Ziel ist nicht, deinen Alltag mit Konzepten zu komplizieren, sondern ihn mit Klarheit zu entlasten und deinen Betrieb\
    \ weniger von Einzelpersonen abhängig zu machen."
  "bullets":
