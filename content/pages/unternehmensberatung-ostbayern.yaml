  "title": "Unternehmensberatung Ostbayern | Praxisnah & messbar"
  "description": "Unternehmensberatung in Ostbayern für Wachstum, Prozesse und Digitalisierung. Regional verankert, datengetrieben,\
    \ umsetzbar."
  "kicker": "Unternehmensberatung Ostbayern"
  "subtitle": "Ostbayern ist wirtschaftlich breiter aufgestellt als es von außen wirkt: Oberpfalz-Industrie, regionaler Mittelstand,\
    \ Handwerk, wachsende Techunternehmen in Regensburg und Amberg. Was alle verbindet: Wenn Wachstum kommt, hängt zu viel\
    \ zu lange an einer Person. Entscheidungen, die eigentlich das Team treffen sollte, landen wieder oben. Neue Mitarbeitende\
    \ bringen mehr Abstimmung als Entlastung. Digitalisierung läuft nebenher, ohne spürbaren Entlastungseffekt. Ich habe meine\
    \ ersten Berufsjahre bei der Mittelbayerischen gemacht und meine Firma in Regensburg aufgebaut, skaliert und 2022 an die\
    \ Kraftwerk Holding verkauft. 27 Jahre in Ostbayern sind kein Vertrauensversprechen, sondern eine Arbeitserfahrung. Genau\
    \ deshalb ist diese Beratung keine Folienstrategie von außen, sondern ein operativer Blick aus dem Inneren der Region."
