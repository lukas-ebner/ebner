"sections":
- "type": "prose"
  "heading": "Typische Engpässe bei inhabergeführten Unternehmen in Ostbayern"
  "content":
  - "Ob in Cham, Amberg, Weiden oder Schwandorf: Die Engpässe in wachsenden KMU sind regionübergreifend ähnlich. Entscheidungen,\
    \ die nicht delegiert werden können. Mehr Team, aber nicht mehr Ruhe. Und eine Digitalisierung, die noch nicht wirklich\
    \ ins System integriert ist."
  "bullets":
  - "Der Betrieb läuft zu stark über eine Person — Je größer das Unternehmen wird, desto teurer wird das. Nicht dramatisch,\
    \ aber dauerhaft."
  - "Wachstum bringt mehr Koordinationsaufwand — Wenn Führungslogik und Prozesse nicht mitwachsen, erzeugt jeder neue Mitarbeiter\
    \ oder Auftrag neue Abstimmungsschleifen."
  - "Entscheidungen dauern länger als sie sollten — Meistens liegt das nicht am Team, sondern daran, dass Eskalationswege,\
    \ Verantwortlichkeiten und Prioritäten nicht klar geregelt sind."
  - "Digitalisierung läuft ohne sichtbaren Effekt — Neue Tools werden eingeführt, aber solange Prozesse und Verantwortung\
    \ unscharf bleiben, entsteht kein echter Betriebsvorteil."
