meta:
  title: "Operations & Führung – Lukas Ebner"
  description: "Dein Unternehmen soll laufen – nicht an dir hängen. Strategisches Sparring für Geschäftsführer, die aufhören wollen, der Engpass zu sein."
  og_image: /images/og/operations.jpg

slides:
  # ── 1. HERO-SPLIT ──────────────────────────────────────
  - template: hero-split
    pill: "Operations & Führung"
    headline: "Ein Unternehmen, das läuft – auch wenn du nicht da bist."
    subtext: "Du bist Geschäftsführer, nicht Feuerwehrmann. Ich helfe dir, aufzuhören der Engpass zu sein – und anzufangen, dein Unternehmen zu führen statt es zu betreiben."
    cta:
      text: "Gespräch vereinbaren"
      url: "/kontakt"
    image:
      src: /images/paintings/Leadtime_A_very_stressed_out_octopus_in_a_suit_in_an_office_c_d1bbb691-ca1e-4755-98a3-1239d2ef540e_3.png
      alt: "Octopus im Anzug jongliert Telefone – der überlastete Geschäftsführer"

  # ── 2. PROBLEM-BEREICH (thefutur-Style) ───────────────
  - template: problem
    headline: "Jedes Unternehmen kommt an den Punkt, an dem der Gründer zum Engpass wird."
    body: "Du merkst es an kleinen Dingen. An den Sonntagabenden am Laptop. An den Meetings, in denen nur du entscheidest. An dem Gefühl, dass mehr Mitarbeiter nicht weniger Arbeit bedeuten.\n\nDas ist kein persönliches Versagen. Das ist ein Muster. Und es hat einen Namen: Du arbeitest in deinem Unternehmen – statt daran."
    symptoms:
      - pill: "Symptom 1"
        headline: "Ohne dich läuft nichts."
        body: "Du bist der Engpass. Nicht weil du schlecht bist. Sondern weil alles durch dich muss.\n\n'Ohne mich läuft nichts' klingt nach Wichtigkeit. Ist aber eine Falle. Je wichtiger du bist, desto weniger skaliert dein Business."
        image:
          src: /images/fotos/DSC00263.jpg
          alt: "Geschäftsführer allein am Schreibtisch"
      - pill: "Symptom 2"
        headline: "Krank werden? Geht nicht."
        body: "Letzte Grippe: durchgearbeitet. Letzter Urlaub: Laptop dabei. Letzter freier Kopf: keine Ahnung.\n\nDas ist kein Einsatz. Das ist ein Warnsignal. Wenn du nicht mal krank werden kannst, hast du kein Business – du hast einen Job."
        image:
          src: /images/fotos/DSC00321.jpg
          alt: "Laptop am Küchentisch – nie wirklich frei"
      - pill: "Symptom 3"
        headline: "60 Stunden. Null Wachstum."
        body: "60-Stunden-Wochen. Keine Wochenenden. Ständig am Limit. Und der Umsatz? Stagniert.\n\nDas Hamsterrad dreht sich schneller. Du rennst schneller. Aber du kommst nicht vom Fleck. Das ist kein Fleiß-Problem. Das ist ein System-Problem."
        image:
          src: /images/fotos/DSC00270.jpg
          alt: "Spät abends im Büro – Hamsterrad"
      - pill: "Symptom 4"
        headline: "Mehr Mitarbeiter. Mehr Arbeit."
        body: "Mitarbeiter #5 eingestellt: Mehr Arbeit. Mitarbeiter #10 eingestellt: Noch mehr Arbeit. Mitarbeiter #15 eingestellt: Burnout.\n\nJede Einstellung sollte dich entlasten. Aber du erklärst jetzt nur mehr Leuten mehr Dinge. Wachstum ohne System funktioniert nicht."
        image:
          src: /images/fotos/DSC00277.jpg
          alt: "Team-Meeting – mehr Leute, mehr Chaos"

  # ── 3. CREDIBILITY (thefutur-Style, orange Fullscreen) ─
  - template: credibility
    headline: "Ich kenne das. Weil es mir genauso ging."
    body: "15 Jahre lang habe ich ein Unternehmen aufgebaut – von null auf 50 Mitarbeiter und 4 Mio Umsatz. Ich kenne jede Phase, jeden Engpass und jede schlaflose Nacht.\n\nIch bin kein Berater, der Frameworks erklärt. Ich bin jemand, der das alles selbst durchgemacht hat – und dir zeigt, was funktioniert."
    proofs:
      - text: "15 Jahre Geschäftsführer einer Digitalagentur"
      - text: "Von 0 auf 50 Mitarbeiter skaliert"
      - text: "7-stelliger Exit nach erfolgreichem Unternehmensverkauf"
    cta:
      label: "Gespräch vereinbaren"
      href: "/kontakt"
    image:
      src: /images/test3-a.png
      alt: "Lukas Ebner – Freisteller"

  # ── 4. NUMBERED FEATURES: Woran wir arbeiten ─────────
  - template: numbered-features
    headline: "Woran wir arbeiten."
    body: "Je nachdem, wo dein größter Hebel liegt. Kein starres Programm – wir arbeiten an dem, was den Unterschied macht."
    features:
      - headline: "Strategie, die trägt."
        body: "Die meisten Unternehmen haben keine tragfähige Strategie. Ob das Unternehmen wächst oder stagniert, wird dem Zufall überlassen.\n\nWir entwickeln eine Strategie, die dein Team versteht, an die es glaubt und nach der es handelt."
        image:
          src: /images/fotos/DSC00263.jpg
          alt: "Strategie-Workshop"
      - headline: "Prozesse, die funktionieren."
        body: "Klar definiert, dokumentiert, nicht zu verkopft. Dein Unternehmen soll auch laufen, wenn du zwei Wochen nicht da bist.\n\nWir bauen Abläufe, die dein Team entlasten statt es zu beschäftigen."
        image:
          src: /images/fotos/DSC00270.jpg
          alt: "Prozesse dokumentieren"
      - headline: "Führung, die skaliert."
        body: "Ein Führungs-Framework für den Alltag: Wie du delegierst, Feedback gibst, Performance misst – und deine besten Leute hältst.\n\nWir machen aus Einzelkämpfern ein Führungsteam."
        image:
          src: /images/fotos/DSC00277.jpg
          alt: "Team-Meeting"
      - headline: "Zahlen, die stimmen."
        body: "Welche Projekte verdienen Geld, welche verbrennen es? Ohne echte Zahlen steuerst du blind.\n\nWir schaffen Transparenz über EBIT, Projektmargen und Unternehmenswert."
        image:
          src: /images/fotos/DSC00321.jpg
          alt: "Finanzanalyse"

  # ── 5. ICON CIRCLES: Drei Hebel (dark) ────────────────
  - template: icon-circles
    headline: "Drei Hebel. In dieser Reihenfolge."
    subtext: "Kein 200-Seiten-Konzept. Drei klare Phasen."
    items:
      - icon: search
        title: "Diagnose"
        body: "Ich schaue mir an, wie dein Unternehmen wirklich funktioniert – nicht wie es auf dem Organigramm aussieht. Wer entscheidet was? Wo bleiben Dinge hängen? Wo verlierst du Marge, ohne es zu merken?"
      - icon: wrench
        title: "System bauen"
        body: "Wir definieren Prozesse, Rollen und Verantwortlichkeiten. Pragmatisch, so dass dein Team es auch lebt. Führungsstruktur, Kennzahlen, Meeting-Rhythmen, Entscheidungsprozesse."
      - icon: message-circle
        title: "Laufendes Sparring"
        body: "Wenn die Grundstruktur steht, wechseln wir ins Sparring. Regelmäßige Sessions, in denen wir strategische Fragen durcharbeiten. Wie ein Beirat, nur ehrlicher und operativer."

  # ── 6. PRICING TEASER (fullscreen) ────────────────────
  - template: pricing-teaser
    headline: "Transparent. Ab 125 €/h."
    body: "Kein Pauschalpreis. Ein klarer Stundensatz und ein bedarfsgerechter Plan – je nach Unternehmensgröße."
    hourlyRate: "125 €"
    tiers:
      - label: "S"
        employees: "5–15 Mitarbeiter"
        price: "4.750 €"
        suffix: "3-Monats-Setup"
      - label: "M"
        employees: "15–40 Mitarbeiter"
        price: "7.000 €"
        suffix: "3-Monats-Setup"
      - label: "L"
        employees: "40–100 Mitarbeiter"
        price: "9.500 €"
        suffix: "3-Monats-Setup"
    footnote: "Richtwerte. Im Erstgespräch entwickeln wir einen individuellen Plan."
    cta:
      label: "Alle Preise & Details"
      href: "/preise"

  # ── 7. FAQ (light, 2-spaltig) ─────────────────────────
  - template: faq
    headline: "Häufige Fragen."
    variant: light
    bg: "#E6EEEF"
    items:
      - question: "Was passiert im Erstgespräch?"
        answer: "30 Minuten, kein Pitch. Wir klären, wo dein größter Hebel liegt, was du bisher versucht hast – und ob eine Zusammenarbeit Sinn macht. Danach bekommst du ein konkretes Angebot."
      - question: "Wie läuft das Setup-Projekt ab?"
        answer: "In den ersten zwei Monaten arbeiten wir intensiv: wöchentliche Workshops, Analyse deiner Prozesse, Entwicklung konkreter Lösungen. Ab Monat 3 wechseln wir ins laufende Sparring mit weniger Stunden."
      - question: "Muss ich mich langfristig binden?"
        answer: "Nein. Das Setup-Projekt läuft über 3 Monate. Danach ist die laufende Begleitung monatlich kündbar. Kein Abo, kein Lock-in."
      - question: "Arbeitest du vor Ort oder remote?"
        answer: "Beides. Workshops und Diagnose-Termine mache ich gerne vor Ort. Laufendes Sparring funktioniert hervorragend remote – per Video-Call und asynchron über Slack oder E-Mail."
      - question: "Was, wenn ich ein kleineres Budget habe?"
        answer: "Dann passen wir den Umfang an. Weniger Stunden pro Woche, fokussiert auf den einen Hebel, der gerade am meisten bringt. Lieber klein starten und sehen, ob es funktioniert."
      - question: "Gibt es eine Förderung?"
        answer: "Ja. Viele KMUs können über die BAFA-Förderung bis zu 50% (alte Bundesländer) bzw. 80% (neue Bundesländer) der Beratungskosten bezuschussen lassen. Ich unterstütze dich bei der Antragstellung."
