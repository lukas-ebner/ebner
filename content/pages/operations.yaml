meta:
  title: "Unternehmen skalieren & Prozessoptimierung – Lukas Ebner"
  description: "Dein Unternehmen soll laufen – nicht an dir hängen. Sparring für Geschäftsführer, die Engpässe auflösen wollen."
  og_image: /images/og/operations.jpg
  accent: "#F44900"

slides:
  # ── 1. HERO-SPLIT ──────────────────────────────────────
  - template: hero-split
    pill: "Operations & Führung"
    headline: "Ein Unternehmen, das läuft – auch wenn du nicht da bist."
    subtext: "Du bist Geschäftsführer, nicht Feuerwehrmann. Ich helfe dir, aufzuhören der Engpass zu sein – und anzufangen, dein Unternehmen zu führen statt es zu betreiben."
    cta:
      text: "Gespräch vereinbaren"
      url: "/erstgespraech"
    image:
      src: /images/paintings/Leadtime_A_very_stressed_out_octopus_in_a_suit_in_an_office_c_d1bbb691-ca1e-4755-98a3-1239d2ef540e_3.png
      alt: "Octopus im Anzug jongliert Telefone – der überlastete Geschäftsführer"

  # ── 2. SYMPTOME (2×2 Grid wie ki-readiness) ───────────────
  - template: symptoms-grid
    imageStyle: panorama
    headline: "Jedes Unternehmen kommt an den Punkt, an dem der Gründer zum Engpass wird."
    body: "Du merkst es an kleinen Dingen. Sonntagabend am Laptop. Meetings, in denen nur du entscheidest. Das Gefühl, dass mehr Mitarbeiter nicht weniger Arbeit bedeuten.\n\nKein persönliches Versagen — ein Muster, das fast jeder Gründer durchläuft. Du arbeitest in deinem Unternehmen, statt es zu skalieren."
    symptoms:
      - pill: "Symptom 1"
        image: /images/operations/symptome-1.png
        headline: "Ohne dich läuft nichts."
        body: "Du bist der Engpass. Nicht weil du schlecht bist. Sondern weil alles durch dich muss.\n\n'Ohne mich läuft nichts' klingt nach Wichtigkeit. Ist aber eine Falle. Je wichtiger du bist, desto weniger skaliert dein Business."
      - pill: "Symptom 2"
        image: /images/operations/symptome-2.png
        headline: "Selbstständig, aber nicht raus aus dem Tagesgeschäft."
        body: "Letzte Grippe: durchgearbeitet. Letzter Urlaub: Laptop dabei. Letzter freier Kopf: keine Ahnung.\n\nDas ist kein Einsatz. Das ist ein Warnsignal. Wenn du nicht mal krank werden kannst, hast du kein Business – du hast einen Job."
      - pill: "Symptom 3"
        image: /images/operations/symptome-3.png
        headline: "60 Stunden. Null Wachstum."
        body: "60-Stunden-Wochen. Keine Wochenenden. Ständig am Limit. Und der Umsatz? Stagniert.\n\nDas Hamsterrad dreht sich schneller. Du rennst schneller. Aber du kommst nicht vom Fleck. Das ist kein Fleiß-Problem. Das ist ein System-Problem."
      - pill: "Symptom 4"
        image: /images/operations/symptome-4.png
        headline: "Mehr Mitarbeiter. Mehr Arbeit."
        body: "Mitarbeiter #5 eingestellt: Mehr Arbeit. Mitarbeiter #10 eingestellt: Noch mehr Arbeit. Mitarbeiter #15 eingestellt: Burnout.\n\nJede Einstellung sollte dich entlasten. Aber du erklärst jetzt nur mehr Leuten mehr Dinge. Ohne System funktioniert Wachstum nicht."

  # ── 3. CREDIBILITY (thefutur-Style, orange Fullscreen) ─
  - template: credibility
    headline: "Ich kenne das. Weil es mir genauso ging."
    body: "13 Jahre Geschäftsführung, von null auf 50 Mitarbeiter und 4 Mio Umsatz. Jede Phase durchgemacht – vom ersten Mitarbeiter bis zum Exit. Jeder Engpass, jede schlaflose Nacht.\n\nIch erkläre dir keine Frameworks aus dem Lehrbuch. Ich zeige dir, was bei mir funktioniert hat – und was nicht."
    proofs:
      - text: "15 Jahre Geschäftsführer einer Digitalagentur"
      - text: "Von 0 auf 50 Mitarbeiter skaliert"
      - text: "7-stelliger Exit nach erfolgreichem Unternehmensverkauf"
    cta:
      label: "Gespräch vereinbaren"
      href: "/erstgespraech"
    image:
      src: /images/test3-a.png
      alt: "Lukas Ebner – Freisteller"

  # ── 4. PARALLAX STORY: Woran wir arbeiten ────────────
  - template: parallax-story
    image:
      src: /images/operations/lukas-meeting-bw.jpg
      alt: "Lukas Ebner im Meeting"
    sections:
      - headline: "Woran wir arbeiten."
        body: "Je nachdem, wo dein größter Hebel liegt. Kein starres Programm – wir arbeiten an dem, was den Unterschied macht."
      - headline: "Strategie, die trägt."
        body: "Die meisten Unternehmen haben keine tragfähige Strategie. Ob das Unternehmen wächst oder stagniert, wird dem Zufall überlassen.\n\nWir entwickeln eine Strategie, die dein Team versteht, an die es glaubt und nach der es handelt. Das ist die Grundlage für [Unternehmen skalieren](/blog/unternehmen-skalieren) – ohne Strategie sind Prozesse nur Blabla."
      - headline: "Prozesse, die funktionieren."
        body: "Klar definiert, dokumentiert, nicht zu verkopft. Dein Unternehmen soll auch laufen, wenn du zwei Wochen nicht da bist.\n\nWir bauen Abläufe, die dein Team entlasten statt es zu beschäftigen. [Prozessoptimierung im KMU](/blog/prozessoptimierung-kmu) ist oft der erste praktische Schritt, um raus aus dem Tagesgeschäft zu kommen."
      - headline: "Führung, die skaliert."
        body: "Ein Führungs-Framework für den Alltag: Wie du delegierst, Feedback gibst, Performance misst – und deine besten Leute hältst.\n\nWir machen aus Einzelkämpfern ein Führungsteam. [Führungskräfteentwicklung im KMU](/blog/fuehrungskraefteentwicklung-kmu) ist nicht optional – das ist der entscheidende Punkt beim Wachstum."
      - headline: "Zahlen, die stimmen."
        body: "Welche Projekte verdienen Geld, welche verbrennen es? Ohne echte Zahlen steuerst du blind.\n\nWir schaffen Transparenz über EBIT, Projektmargen und Unternehmenswert. Das ist die Grundlage für [Unternehmenswert steigern](/blog/unternehmenswert-steigern) und für erfolgreiches [Sparring für deinen Exit](/blog/exit-strategie)."

  # ── 5. ICON CIRCLES: Drei Hebel (dark) ────────────────
  - template: icon-circles
    headline: "Drei Hebel. In dieser Reihenfolge."
    subtext: "Kein 200-Seiten-Konzept. Drei klare Phasen."
    items:
      - icon: search
        title: "Diagnose"
        body: "Ich schaue mir an, wie dein Unternehmen wirklich funktioniert – nicht wie es auf dem Organigramm aussieht. Wer entscheidet was? Wo bleiben Dinge hängen? Wo verlierst du Marge, ohne es zu merken?"
      - icon: wrench
        title: "System bauen"
        body: "Wir definieren Prozesse, Rollen und Verantwortlichkeiten. Pragmatisch, so dass dein Team es auch lebt. Führungsstruktur, Kennzahlen, Meeting-Rhythmen, Entscheidungsprozesse."
      - icon: message-circle
        title: "Laufendes Sparring"
        body: "Wenn die Grundstruktur steht, wechseln wir ins Sparring als dein Sparring Partner Geschäftsführer. Regelmäßige Sessions, in denen wir strategische Fragen durcharbeiten. Wie ein Beirat, nur ehrlicher und operativer."

  # ── 6. PRICING TEASER (fullscreen) ────────────────────
  - template: pricing-teaser
    headline: "Transparent. Ab 125 €/h."
    body: "Kein Pauschalpreis. Ein klarer Stundensatz und ein bedarfsgerechter Plan – je nach Unternehmensgröße."
    hourlyRate: "125 €"
    tiers:
      - label: "S"
        employees: "5–15 Mitarbeiter"
        price: "4.750 €"
        suffix: "3-Monats-Setup"
      - label: "M"
        employees: "15–40 Mitarbeiter"
        price: "7.000 €"
        suffix: "3-Monats-Setup"
      - label: "L"
        employees: "40–100 Mitarbeiter"
        price: "9.500 €"
        suffix: "3-Monats-Setup"
    footnote: "Richtwerte. Im Erstgespräch entwickeln wir einen individuellen Plan."
    cta:
      label: "Alle Preise & Details"
      href: "/preise"

  # ── 7. FAQ (light, 2-spaltig) ─────────────────────────
  - template: faq
    headline: "Häufige Fragen."
    variant: light
    bg: "#E6EEEF"
    items:
      - question: "Was passiert im Erstgespräch?"
        answer: "Kurz und knackig: 30 Minuten, ich stelle Fragen statt zu reden, du kriegst ne ehrliche Antwort, ob's passt."
      - question: "Für wen ist die Beratung gedacht?"
        answer: "KMU-Geschäftsführer von 5 bis 100 Köpfen. IT, Agenturen, SaaS, Handwerk. Kurz: Du brauchst Unternehmen skalieren, statt ständig jeden Quark selbst zu entscheiden. Wenn du merkst, dass dein Unternehmen nicht wächst, weil du der Engpass bist – genau dann passt's."
      - question: "Was genau macht ein Sparring Partner für Geschäftsführer?"
        answer: "Ich bin nicht der Berater mit 150-Seiten-Report. Ich bin jemand, der selbst 15 Jahre Geschäftsführer war und weiß, wie's läuft. Regelmäßig zusammen: strategische Entscheidungen durcharbeiten, operative Hebel finden, Team-Themen klären. Ehrlich, pragmatisch, fokussiert auf dein Business."
      - question: "Wie komme ich als Selbstständiger raus aus dem Tagesgeschäft?"
        answer: "Erste Wahrheit: Du kommst nicht raus, wenn jede Entscheidung durch dich muss. Zweite Wahrheit: Das Problem ist nicht dein Team, sondern fehlende Prozesse und Delegation. Wir bauen ein System, bei dem Dinge auch ohne dich erledigt werden – wirklich, nicht nur auf dem Papier. Ziel: zwei Wochen Urlaub ohne Laptop-Stress."
      - question: "Was bringt Prozessoptimierung im KMU konkret?"
        answer: "Ehrlich? Ohne Prozesse ist jeder Mitarbeiter ein Wildwest-Cowboy. Das kostet dich Geld, Zeit und Nerven. Bei [Prozessoptimierung KMU](/blog/prozessoptimierung-kmu) geht's darum, die 20 Prozesse rauszufiltern, die 80 Prozent deiner Probleme verursachen – und die dann einfach und wiederholbar zu machen. Deine Marge steigt, dein Kopf wird freier, dein Team verlässt sich aufeinander statt auf dich."
      - question: "Wie läuft das Setup-Projekt ab?"
        answer: "Monat 1: Diagnose – wie funktioniert dein Unternehmen wirklich? Monat 2–3: Systeme bauen, implementieren, testen. Dann: wöchentliche Workshops, wir bauen Prozesse, Rollen, Kennzahlen. Ab Monat 4 Sparring statt Vollgas – weniger Stunden, du steuerst allein. Fertig."
      - question: "Muss ich mich langfristig binden?"
        answer: "Nein. Das Setup-Projekt ist 3 Monate, danach monatlich kündbar. Punkt. Die meisten bleiben im Sparring, weil sie den Spiegel brauchen – freiwillig, nicht gezwungen."
      - question: "Kann die Beratung auch bei einem Unternehmensverkauf helfen?"
        answer: "Absolut. Ein Unternehmen, das ohne dich funktioniert, ist zehnmal wertvoller. Wir arbeiten an den harten Faktoren: Prozesse, Führungsteam, Zahlen, Strategie. Das Ergebnis: Du könntest morgen verkaufen – oder einfach nur entspannter leben. Beides gut."
      - question: "Arbeitest du vor Ort oder remote?"
        answer: "Vor-Ort-Diagnose, Remote-Sparring. Bei Workshops bin ich lieber physisch da – man sieht Sachen, die im Video nie auffallen. Der laufende Austausch funktioniert top remote, die meisten sitzen in Bayern/Österreich, aber ich arbeite bundesweit."
      - question: "Was kostet die Zusammenarbeit?"
        answer: "125 €/h, Setup je nach Größe von 4.750 bis 9.500 Euro über drei Monate. Kleineres Budget? Kleinere Pakete, gleich fokussiert. Im Gespräch schneiden wir's auf deine Situation zu."
      - question: "Gibt es eine BAFA-Förderung für Unternehmensberatung?"
        answer: "Ja. 50 % in den alten, bis 80 % in den neuen Bundesländern. Ich mach den Antrag mit – kein Extrahonorar."
