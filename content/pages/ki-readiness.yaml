meta:
  title: "KI-Readiness – Lukas Ebner"
  description: "Von der Idee zum Prototyp. In Tagen, nicht Monaten. KI-Strategie, Workflow-Automatisierung und Rapid Prototyping."
  og_image: /images/og/ki-readiness.jpg

slides:
  # ── 1. HERO-SPLIT ──────────────────────────────────────
  - template: hero-split
    pill: "KI-Readiness"
    headline: "Von der Idee zum Prototyp. In Tagen, nicht Monaten."
    subtext: "KI-Strategie, Workflow-Automatisierung und Rapid Prototyping für Unternehmen, die aufhören wollen zu warten – und anfangen wollen zu bauen."
    cta:
      text: "Gespräch vereinbaren"
      url: "/kontakt"
    video: /videos/race.mp4

  # ── 2. PERSONA-SZENARIEN (Headline + 2×2 Grid) ────────
  - template: symptoms-grid
    headline: "Alle reden über KI. Du willst sie einsetzen."
    body: "Aber zwischen 'ChatGPT ausprobieren' und 'KI systematisch nutzen' liegt eine Welt. Die Frage ist nicht ob, sondern wie – und mit wem."
    symptoms:
      - pill: "Szenario 1"
        image: /images/ki-szenario/KI-szenario-1.png
        headline: "Deine Entwicklungskosten explodieren."
        body: "Outsourcing hat die Burn-Rate nur verlagert, nicht gesenkt. Jedes Feature dauert Wochen und kostet fünfstellig.\n\nMit der richtigen KI-Infrastruktur baut dein bestehendes Team in Tagen, wofür du heute Monate einplanst."
      - pill: "Szenario 2"
        image: /images/ki-szenario/KI-szenario-2.png
        headline: "Du hast vibe-gecodet. Jetzt muss es halten."
        body: "Der Prototyp steht, aber das Repository ist fragil. Keine Tests, keine Architektur, kein Plan für Skalierung.\n\nWir machen aus dem Schnellschuss eine tragfähige Codebasis – bevor der technische Schuldenstand das Projekt killt."
      - pill: "Szenario 3"
        image: /images/ki-szenario/KI-szenario-3.png
        headline: "Du willst aus der Idee raus – rein in den Prototyp."
        body: "Du hast eine Produktidee, ein internes Tool oder ein neues Feature im Kopf. Aber zwischen Idee und erstem funktionierendem Build liegt ein Graben.\n\nWir überbrücken ihn. In Tagen, nicht Quartalen."
      - pill: "Szenario 4"
        image: /images/ki-szenario/KI-szenario-4.png
        headline: "Dein Team soll 10× liefern. Nicht 10% mehr."
        body: "Du willst nicht noch ein KI-Seminar. Du willst, dass Support-Tickets sich selbst lösen, Reports sich selbst bauen und Entwickler doppelt so viel Code shippen.\n\nWir bauen die Workflows, die das möglich machen – und bringen die Entwickler mit, die sie betreiben."

  # ── 4. IMAGE-OVERLAY (TEAL): Mein Ansatz ──────────────
  - template: image-overlay
    headline: "Ich benutze KI nicht. Ich baue damit."
    body: "Leadtime, mein SaaS-Produkt, nutzt KI im Kern. Mein Content-Marketing läuft über KI-Agenten, die ich selbst gebaut habe. Diese Website ist mit KI-Unterstützung entstanden.\n\nDas ist keine Theorie. Ich lebe jeden Tag, was ich dir anbiete."
    variant: teal
    gradient: full
    align: left
    image:
      src: /images/paintings/Leadtime_abstract_impressionist_oil_painting_A_software_team__5697ae5d-8666-4c0b-bec8-8c5d5472bb53_2.png
      alt: "Team um leuchtende Kristallkugel"
      opacity: 0.35

  # ── 5. CARDS-GRID: Drei Schichten ──────────────────────
  - template: cards-grid
    headline: "KI-Readiness hat drei Schichten."
    subtext: "Die meisten bleiben bei Schicht 1 stecken."
    cards:
      - icon: sparkles
        title: "Schicht 1: KI im Alltag"
        body: "Dein Team nutzt KI als persönlichen Assistenten – für E-Mails, Recherche, Texte, Zusammenfassungen. Klingt trivial, spart aber 5–10 Stunden pro Woche pro Person."
      - icon: workflow
        title: "Schicht 2: KI in den Prozessen"
        body: "KI wird Teil deiner Wertschöpfungskette: Angebote, die sich selbst kalkulieren. Support-Tickets, die automatisch kategorisiert werden. Reports, die sich selbst bauen."
      - icon: rocket
        title: "Schicht 3: KI als Produkt"
        body: "Du baust mit KI neue Produkte, Features oder Services für deine Kunden. Prototypen in Tagen statt Monaten. Validieren, iterieren, launchen."

  # ── 6. FEATURE-LIST: Deliverables ──────────────────────
  - template: feature-list
    headline: "Was wir konkret bauen"
    subtext: "Keine PowerPoint-Strategie. Funktionierende Systeme."
    columns: 2
    items:
      - icon: scan
        title: "KI-Audit"
        body: "In 2–3 Sessions analysieren wir deine Wertschöpfungskette und identifizieren die 3–5 Stellen mit dem größten KI-Hebel."
      - icon: workflow
        title: "Workflow-Automatisierung"
        body: "Wiederkehrende Aufgaben, die dein Team Zeit kosten: Angebote, Reports, E-Mails, Datenaufbereitung. Wir automatisieren was automatisierbar ist."
      - icon: bot
        title: "KI-Agenten"
        body: "Nicht nur Chatbots. Autonome Agenten, die mehrstufige Aufgaben erledigen – von Recherche über Aufbereitung bis Ausführung."
      - icon: graduation-cap
        title: "Team-Enablement"
        body: "Maßgeschneiderte Prompts und Workflows für dein Team. Kein Seminar, sondern Werkzeuge die sofort funktionieren."
      - icon: rocket
        title: "Rapid Prototyping"
        body: "Du hast eine Produktidee? Wir bauen einen funktionierenden Prototyp – mit KI-Agenten und modernem Tech-Stack. In Tagen, nicht Monaten."
      - icon: shield
        title: "Governance & Sicherheit"
        body: "Welche Daten dürfen in welche Modelle? Wo liegen die Risiken? Ein pragmatisches Framework, das KI ermöglicht ohne Compliance-Probleme."

  # ── 7. PARALLAX: Visueller Break ──────────────────────
  - template: parallax-image
    height: "50vh"
    image:
      src: /images/paintings/Leadtime_abstract_impressionist_oil_painting_a_steam_train_ac_4d78e5b6-548d-475e-be91-d4c9465be583_0.png
      alt: "Dampflok bei Nacht – unstoppable momentum"

  # ── 8. STATEMENT (LARGE): Provokation ─────────────────
  - template: statement
    variant: dark
    size: large
    headline: "Die Kosten, ein digitales Produkt zu bauen, sind um den Faktor 10 gefallen. Die meisten haben es noch nicht gemerkt."

  # ── 9. SPLIT: Pricing ──────────────────────────────────
  - template: split
    direction: right
    headline: "Was es kostet"
    body: "KI-Audit (Schicht 1 + 2): Ab 3.000 €. Du bekommst eine Analyse, einen priorisierten Maßnahmenplan und die ersten funktionierenden Workflows.\n\nImplementierung & Agenten: Projektbasiert, typischerweise 5.000–20.000 € je nach Umfang.\n\nRapid Prototyping / Co-Building (Schicht 3): Ab 10.000 € für einen funktionierenden MVP.\n\nLaufende KI-Begleitung: Ab 2.000 €/Monat."
    image:
      src: /images/paintings/Leadtime_httpss.mj.runKE_olqB1sjU_impressionist_oil_painting__64ce814c-492e-4c67-ae22-c7b1f408dc47_3.png
      alt: "Person klettert durch Wolken – Aufstieg und Ambition"

  # ── 10. CTA ────────────────────────────────────────────
  - template: cta-dark
    headline: "30 Minuten. Kein Pitch."
    subtext: "Lass uns in einem kurzen Gespräch klären, wo KI bei dir den größten Hebel hat – und ob jetzt der richtige Zeitpunkt ist."
    cta:
      text: "Termin vereinbaren"
      url: "/kontakt"
    image:
      src: /images/slides/cta-bg.png
      alt: ""
      opacity: 0.3
