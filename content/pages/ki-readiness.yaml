meta:
  title: "KI-Beratung für Mittelstand – Lukas Ebner"
  description: "KI Strategie für KMU von Idee zum Prototyp in Tagen. Rapid Prototyping, MVP-Entwicklung und KI für Agenturen."
  og_image: /images/og/ki-readiness.jpg
  accent: "#1B1464"

slides:
  # ── 1. HERO-SPLIT ──────────────────────────────────────
  - template: hero-split
    pill: "KI-Readiness & Prototyping"
    headline: "Von der Idee zum Prototyp. In Tagen, nicht Monaten."
    subtext: "KI Beratung und KI Strategie mit Rapid Prototyping, MVP Entwicklung für Unternehmen – besonders KI für Agenturen – die aufhören wollen zu warten."
    cta:
      text: "Gespräch vereinbaren"
      url: "/erstgespraech"
    video: /videos/race.mp4

  # ── 2. PERSONA-SZENARIEN (Headline + 2×2 Grid) ────────
  - template: symptoms-grid
    imageStyle: panorama
    headline: "Alle reden über AI. Du willst ernst machen."
    body: "Zwischen 'mal ChatGPT ausprobieren' und 'KI als echten Geschäftshebel nutzen' liegt mehr als ein Plugin. Die Frage ist nicht ob, sondern wo – und mit wem du das angehst."
    symptoms:
      - pill: "Szenario 1"
        image: /images/aiready/ai-szenario-1.png
        headline: "Deine Entwicklungskosten explodieren."
        body: "Outsourcing hat die Burn-Rate nur verlagert, nicht gesenkt. Jedes Feature dauert Wochen und kostet fünfstellig.\n\nMit der richtigen KI-Infrastruktur baut dein bestehendes Team in Tagen, wofür du heute Monate einplanst."
      - pill: "Szenario 2"
        image: /images/aiready/ai-szenario-2.png
        headline: "Du hast vibe coding betrieben. Jetzt muss es halten."
        body: "Der Prototyp steht, aber das Repository ist fragil. Keine Tests, keine Architektur, kein Plan für Skalierung.\n\nWir machen aus dem Schnellschuss eine tragfähige Codebasis – bevor der technische Schuldenstand das Projekt killt."
      - pill: "Szenario 3"
        image: /images/aiready/ai-szenario-3.png
        headline: "Du willst MVP Entwicklung und Rapid Prototyping."
        body: "Du hast eine Produktidee, ein internes Tool oder ein neues Feature im Kopf. Aber zwischen Idee und erstem funktionierendem Build liegt ein Graben.\n\nWir überbrücken ihn mit Rapid Prototyping und MVP-Entwicklung. In Tagen, nicht Quartalen."
      - pill: "Szenario 4"
        image: /images/aiready/ai-szenario-4.png
        headline: "Dein Team soll 10× liefern. Nicht 10% mehr."
        body: "Du willst nicht noch ein KI-Seminar. Du willst, dass Support-Tickets sich selbst lösen, Reports sich selbst bauen und Entwickler doppelt so viel Code shippen.\n\nWir bauen die Workflows, die das möglich machen – und bringen die Entwickler mit, die sie betreiben."

  # ── 4. CREDIBILITY (Deep Indigo): Mein Ansatz ─────────
  - template: credibility
    bg: "#1B1464"
    headline: "Wir experimentieren nicht. Wir shippen."
    body: "Ich zeige dir keine ChatGPT-Tricks. Ich bin Geschäftsführer und Entwickler – 15 Jahre Software gebaut, vier Firmen hochgezogen, und ja, auch ein paar gegen die Wand gefahren.\n\nStas Persianenko und ich bauen seit über 12 Jahren zusammen Software. Ich mache den schnellen Prototyp, er macht den Code produktionsreif. Wenn wir was shippen, dann hält das – weil Stas als Senior Engineer keine halben Sachen akzeptiert."
    proofs:
      - text: "Fracto: AI-gestützte Schulungsplattform für MedTech – KI im Produktkern"
      - text: "Leadtime: KI-Agenten in Projektmanagement, Forecasting und Automatisierung verbaut"
      - text: "15 Jahre Softwareunternehmen geführt – 50 Mitarbeiter beim Exit"
    cta:
      label: "Gespräch vereinbaren"
      href: "/erstgespraech"
    chat:
      enabled: true
      ctaHref: "/erstgespraech"

  # ── 5. STAS – Der technische Rückhalt ───────────────
  - template: credibility
    bg: "#0F0F0F"
    headline: "Mein Partner Stas – 20 Jahre Code, keine Kompromisse."
    body: "Stas ist kein zugekaufter Freelancer. Er ist mein Co-Founder bei Leadtime, mein technischer Partner seit über 12 Jahren – und der Grund, warum unser Code in Produktion hält.\n\n20 Jahre Softwareentwicklung. PHP, JavaScript, Android, komplexe Systemarchitekturen. Seit 2015 Senior Engineer, davor StableFlow und MrLens. Bachelor in Mechanical Engineering – der Mann denkt in Systemen, nicht in Features.\n\nWenn ich den schnellen Prototyp baue, macht Stas daraus eine Codebasis, die skaliert. Tests, Architektur, CI/CD – das ist sein Revier. Das ist der Unterschied zwischen 'es funktioniert' und 'es hält'."
    proofs:
      - text: "Co-Founder & CTO bei Leadtime – KI-Agenten in Projektmanagement und Forecasting"
      - text: "Senior Engineer seit 10+ Jahren – PHP, JS, Android, komplexe Systemarchitekturen"
      - text: "12 Jahre Zusammenarbeit mit Lukas – von eins+null über Fracto bis Leadtime"
    image:
      src: /images/stas.png
      alt: "Stanislav Persiianenko"

  # ── 6. PARALLAX STORY: Woran wir arbeiten ──────────
  - template: parallax-story
    image:
      src: /images/aiready/lukas-dev.jpg
      alt: "Lukas Ebner beim Co-Building"
    sections:
      - headline: "Woran wir arbeiten."
        body: "Drei Leistungsbereiche – wir fangen da an, wo der größte Impact liegt. Kein Standardprogramm."
      - headline: "KI-Beratung & KI-Readiness."
        body: "Wir analysieren deine Wertschöpfungskette, identifizieren die Stellen mit dem größten KI-Hebel und entwickeln einen konkreten Fahrplan. Von der Tool-Auswahl über Governance bis zum Kulturwandel – damit dein Team künstliche Intelligenz selbstständig und sicher einsetzt.\n\nAbrechnung auf Stundenbasis. Typisches Engagement: 3-Monats-Setup mit laufendem Sparring. Mehr Hintergrund: [KI-Beratung für den Mittelstand](/blog/ki-beratung-mittelstand)."
      - headline: "Rapid Prototyping & Co-Building."
        body: "Du hast eine Produktidee, ein internes Tool oder ein Feature im Kopf? Wir bauen einen funktionierenden Prototyp – in Tagen, nicht Monaten. Webseiten, Web-Apps, MVPs, Automatisierungen.\n\nIch baue den ersten Wurf, Stas macht ihn produktionsreif. Tagessatz-basiert, transparent kalkulierbar. Genau das Thema von [MVP-Entwicklung](/blog/mvp-entwicklung) – schnell testen, schnell lernen, schnell skalieren."
      - headline: "Refactoring & Hardening."
        body: "Du hast [vibe-gecodet](/blog/vibe-coding) oder einen Prototyp, der funktioniert – aber nicht hält. Keine Tests, keine Architektur, kein Plan für Skalierung.\n\nWir machen aus dem Schnellschuss eine tragfähige Codebasis. Code-Review, Architektur-Refactoring, Test-Coverage, CI/CD. Tagessatz-basiert."

  # ── 8. PRICING CALCULATOR ─────────────────────────────
  - template: pricing-calculator
    headline: "10x schneller. Zum Bruchteil."
    body: "Schieb den Regler und sieh, was KI-gestützte Entwicklung möglich macht – und was es dich bei einer klassischen Agentur kosten würde."
    cta:
      label: "Erstgespräch vereinbaren"
      href: "/erstgespraech"

  # ── 10. FAQ ───────────────────────────────────────────
  - template: faq
    headline: "Häufige Fragen."
    variant: light
    bg: "#E6EEEF"
    items:
      - question: "Was ist KI-Beratung für Unternehmen – und was bringt sie konkret?"
        answer: "KI-Beratung trennt Signal von Hype. Es geht nicht um die tollste Technologie, sondern um: Wo lohnt sich KI für dein Business wirklich? Wir schauen auf deine Vertriebsprozesse, deine Support-Tickets, deine Reportings – und dann bauen wir konkret. Nicht PowerPoint-Strategien, sondern funktionierende Workflows, die dein Team sofort nutzen kann. Der Unterschied zu ChatGPT-Tutorials: Wir denken in deinen Geschäftsprozessen, nicht in Use-Case-Listen."

      - question: "Was passiert im kostenlosen Erstgespräch zur KI-Beratung?"
        answer: "30 Minuten, kein Verkaufsgespräch. Ich stelle Fragen, du erzählst, wo der Schuh drückt. Dann gebe ich dir ehrlich eine Einschätzung: Bringt KI dir etwas oder nicht? Manche Geschäftsführer erkennen im Gespräch, dass sie erst ihre Prozesse aufräumen müssen, bevor KI Sinn macht. Das ist auch ein wichtiges Ergebnis. Danach weißt du, ob es weitergehen sollte oder nicht."

      - question: "Brauche ich eigene Entwickler für KI-Projekte?"
        answer: "Für den Anfang nicht. Bei den ersten KI-Audits und Workflows brauchst du nur Zeit und Zugang zu den Prozessen, die du automatisieren willst. Wenn es später in Richtung größerer KI-Prototypen oder maßgeschneiderter Systeme geht, kommen Stas und ich ins Spiel – aber dein Team sitzt im Gespräch dran und versteht, was gebaut wird."

      - question: "Wie lange dauert ein KI-Audit für mein Unternehmen?"
        answer: "Zwei bis drei Wochen. In dieser Zeit schaue ich mir an, wie dein Team arbeitet, welche Prozesse manuelle repetitive Arbeit sind – und dann bauen wir parallel die ersten Lösungen. Am Ende hast du kein 200-Seiten-PowerPoint, sondern drei bis fünf funktionierende Workflows, die dein Team bereits einsetzt."

      - question: "Was unterscheidet euch von einer KI-Agentur?"
        answer: "Agenturen haben 50 Leute, du redest mit einem Junior-Berater, der dein Projekt an fünf andere Agenturen weiterleitet. Bei mir sprichst du mit mir – und ich baue selbst Code, wenn es nötig ist. Mit Stas dahinter, der architektonisch denkt und Production-Standards setzt. Wir sind kein Dienstleister, der nach Stunden abrechnet – wir sind Unternehmer, denen dein Erfolg nützt. Wenn dein KI-System nicht läuft, schlafen wir schlechter als du."

      - question: "Welche KI-Modelle und Technologien nutzt ihr?"
        answer: "Wir sind agnostisch. GPT-4 wenn nötig, Claude für nuancierte Aufgaben, Mistral wenn es low-latency sein muss, Open-Source-Modelle auf deinen Servern wenn Datenschutz kritisch ist. Kein Vendor-Lock-in, keine Ideologie. Für jeden Use Case die beste technische Entscheidung – nicht die beste für unser Geschäft."

      - question: "Was kostet KI-Beratung für KMU?"
        answer: "125 € Stundensatz netto. Ein typisches KI-Audit läuft auf 2.000 bis 4.000 € hinaus. Dann variiert es je nach Komplexität und Umfang der Prototypen. Details auf der Preise-Seite, und ja – BAFA-Förderung bis 50 % ist möglich."

      - question: "Gibt es eine BAFA-Förderung für KI-Beratung?"
        answer: "Ja, bis zu 50%. Details auf der Preise-Seite."

      - question: "Ist KI-Readiness auch für kleine Unternehmen relevant?"
        answer: "Besonders für kleine. Mit 5 bis 15 Leuten kannst du schneller experimentieren und Änderungen durchsetzen als ein Konzern mit Governance-Bürokratie. Wenn dein Team durch KI-Automatisierung 20 % produktiver wird, ist das wie zwei neue Mitarbeiter – ohne Gehalt, ohne Onboarding. Die Falle: Nicht das erste Shiny-Tool nehmen, sondern die echten Bottlenecks lösen."

      - question: "Arbeitet ihr nur in Regensburg oder auch deutschlandweit?"
        answer: "Remote funktioniert blendend für KI-Beratung. Video-Calls, Screen-Sharing, wir schauen dir über die Schulter – macht keinen Unterschied, ob du in München oder Hamburg sitzt. Zum initialen Deep-Dive komme ich gerne vorbei, unabhängig von der Region. Danach asynchron übers Netz."

      - question: "Wie starte ich am besten mit KI in meinem Unternehmen?"
        answer: "Erstgespräch mit mir, dann ein 2-3 Wochen KI-Audit. Keine langen Strategieprojekte, sondern schnell zu echten Workflows, die dein Team übermorgen einsetzt. Viele unterschätzen, wie schnell sich was bewegt, wenn man nicht auf IT-Abteilungen warten muss und die Entscheider selbst am Tisch sitzen."

      - question: "Was ist, wenn KI für mein Unternehmen noch nicht sinnvoll ist?"
        answer: "Dann sage ich dir das. Manchmal brauchst du erst saubere Prozesse, dann KI. Manchmal ist eine bessere Projektmanagement-Struktur der Hebel, nicht Technologie. Ich verdiene nur, wenn dir meine Beratung nützt – nicht, indem ich dir etwas andrehe."
