meta:
  title: "Preise Unternehmensberatung Regensburg – Lukas Ebner"
  description: "Transparente Preise für Unternehmensberatung, Sparring und Begleitung in Regensburg. Mit BAFA-Förderung."
  og_image: /images/og/preise.jpg

slides:
  # ── 1. HERO ──────────────────────────────────────────
  - template: hero-split
    pill: "Preise"
    headline: "Was es kostet. Und was du dafür bekommst."
    subtext: "Keine versteckten Kosten, keine Überraschungen. Ein Stundensatz, transparente Pakete – zugeschnitten auf die Größe und Komplexität deines Unternehmens."
    cta:
