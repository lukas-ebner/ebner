  # ── 2. PRICING TABLE ─────────────────────────────────
  - template: pricing-table
    headline: "Stundensatz & Richtwerte."
    body: "Ich rechne nach Stunden ab – transparent und nachvollziehbar. Alle Preise netto. Je nach Unternehmensgröße ergibt sich ein unterschiedlicher Beratungsbedarf. Die Tabelle zeigt Erfahrungswerte als Orientierung. Das typische Engagement ist ein 3-Monats-Setup: In den ersten beiden Monaten arbeiten wir intensiv an Analyse, Strategie und den ersten Umsetzungen. Ab Monat 3 wechseln wir in eine laufende Begleitung mit weniger Stunden – monatlich kündbar. Im Erstgespräch entwickeln wir gemeinsam einen Plan, der zu deiner Situation passt."
    hourlyRate: "125 €"
    prototypingTab: true
    tiers:
      - label: "S"
        employees: "5–15 Mitarbeiter"
        setup:
          hoursWeek: "~4h"
          hoursMonth: "~16h"
          price: "2.000 €"
        ongoing:
          hoursMonth: "~6h"
          price: "750 €"
        package3m: "4.750 €"
      - label: "M"
        employees: "15–40 Mitarbeiter"
        setup:
          hoursWeek: "~6h"
          hoursMonth: "~24h"
          price: "3.000 €"
        ongoing:
          hoursMonth: "~8h"
          price: "1.000 €"
        package3m: "7.000 €"
      - label: "L"
        employees: "40–100 Mitarbeiter"
        setup:
          hoursWeek: "~8h"
          hoursMonth: "~32h"
          price: "4.000 €"
        ongoing:
          hoursMonth: "~12h"
          price: "1.500 €"
        package3m: "9.500 €"
    footnote: "Das sind Richtwerte, keine starren Pakete. Jedes Unternehmen ist anders. Im Erstgespräch entwickeln wir einen bedarfsgerechten Plan, der sich an diesem Modell orientiert – aber immer an deine konkrete Situation angepasst ist."
    bafa: "Viele KMU können über die **[BAFA-Förderung Unternehmensberatung](/bafa)** bis zu 50 % (alte Bundesländer) bzw. 80 % (neue Bundesländer) ihrer Beratungskosten bezuschussen lassen. Ich begleite dich durch Antrag und Umsetzung – Details, Ablauf und Rechenbeispiel: [/bafa](/bafa)."
    cta:
      label: "Erstgespräch vereinbaren"
      href: "/erstgespraech"

  # ── 3. TEXT + FREISTELLER: Was im Setup passiert ─────
  - template: text-image
    headline: "Was im Setup passiert."
    body: "In der Setup-Phase (Monat 1–2) arbeiten wir typischerweise mit wöchentlichen Workshops. Je nach Unternehmensgröße sind das 2–4 Stunden pro Termin, plus Vor- und Nachbereitung sowie asynchrone Verfügbarkeit zwischen den Terminen.\n\nWir starten mit einer Diagnose: Wie funktioniert dein Unternehmen wirklich? Wo sind die Engpässe? Dann entwickeln wir konkrete Lösungen – Prozesse, Führungsstruktur, Kennzahlen – und beginnen direkt mit der Umsetzung.\n\nAb Monat 3 wechseln wir in den Sparring-Modus: kürzere, regelmäßige Sessions, in denen wir strategische Fragen durcharbeiten und die Umsetzung begleiten. Monatlich kündbar."
    imagePosition: right
    freisteller: true
    compact: true
    image:
      src: /images/lukas-mit-brille.png
      alt: "Lukas Ebner"

  # ── 5. FAQ ──────────────────────────────────────────
  - template: faq
    headline: "Häufige Fragen."
    variant: light
    bg: "#E6EEEF"
    items:
      - question: "Was kostet eine Unternehmensberatung pro Stunde?"
        answer: "125 € netto – das ist dein Satz, egal ob Workshop, Diagnose oder Sparring. Die großen Häuser rechnen dir 2.000–4.000 € Tagessatz in Rechnung und schicken dir noch Junior-Berater dazu, die das Projekt als Trainingsfeld nutzen. Bei mir sitzen dir 20 Jahre operative Erfahrung gegenüber, kein Makro-Lehrbuch-Wissen."

      - question: "Was passiert im kostenlosen Erstgespräch?"
        answer: "30 Minuten, unverbindlich, kein Pitch. Ich stelle dir blöde Fragen – wo tut's weh, was hast du schon probiert, wer sitzt mit dir im Steering Committee – und sage dir danach ehrlich, ob das zusammenpasst oder nicht. Wenn nicht, sag ich dir das auch."

      - question: "Wie läuft das 3-Monats-Setup-Projekt ab?"
        answer: "Monat 1–2: wöchentliche Workshops (2–4 Stunden je nach Größe), Diagnose, dann direkt in die Umsetzung. Nicht erst ein 100-seitiges Konzept, sondern messbare Dinge. Monat 3: Wir fahren die Intensität runter, wechseln in Sparring. Das Ziel ist nicht ein schönes Papier, sondern dass dein Unternehmen anders tickt."

      - question: "Muss ich mich langfristig an eine Unternehmensberatung binden?"
        answer: "Nein. Nach dem Setup kannst du mir monatlich per E-Mail kündigen. Fertig. Wenn die Zusammenarbeit gut ist, bleiben die Kunden trotzdem – weil der Wert offensichtlich ist."

      - question: "Was unterscheidet dich von klassischen Unternehmensberatungen?"
        answer: "Erstens: Ich bin selbst Unternehmer, keine Karriere-Consultant. Ich habe vier Firmen aufgebaut und das auch gründlich in die Wand gefahren. Zweitens: Du redest mit mir, nicht mit einem Junior, der auswendig gelernte Frameworks herunterleiert. Drittens: Ich kenne die echten Probleme von 5–100-Personen-Unternehmen, nicht von Konzernen. Ich weiß, wie eng das Geld sitzt, wie sehr die Geschäftsführer im Daily-Business stecken, warum Prozessarbeit gegen Widerstände läuft."

      - question: "Für welche Unternehmen ist die Beratung geeignet?"
        answer: "5 bis 100 Mitarbeiter, du willst wachsen und strukturieren statt zu zerfasern, und du bist bereit, unangenehmen Wahrheiten ins Auge zu schauen. Tech, SaaS, Dienstleistung, Produktion – Branche egal. Wenn du jemandem suchst, der dir sagt, dass alles super läuft und du nur noch optimieren musst – bin ich falsch besetzt."

      - question: "Arbeitest du vor Ort in Regensburg oder auch remote?"
        answer: "Ich komme für die erste Phase gerne vor Ort – das ist wichtig, um dein Team zu spüren und die Abläufe zu sehen. In Regensburg ohnehin, deutschlandweit nach Absprache. Das laufende Sparring läuft remote per Video, ich bin zwischen den Terminen über Slack oder E-Mail erreichbar."

      - question: "Was, wenn ich ein kleineres Budget für Beratung habe?"
        answer: "Dann verkleinern wir das Setup. Vier bis sechs Stunden im Monat, konzentriert auf den einen Hebel, der gerade passt. Besser klein anfangen und sehen, ob es taugt, als ein Paket zu zahlen, bei dem die Hälfte liegen bleibt."

      - question: "Gibt es eine BAFA-Förderung für Unternehmensberatung?"
        answer: "Ja – je nach Bundesland 50 bis 80 % Zuschuss, maximal 2.240 € pro Antrag (auf 2.800 € förderfähige Beratungskosten). Die Antragstellung ist lästig, aber die Förderung rechnet sich. Ich begleite dich durch den kompletten Prozess – Ablauf, Rechenbeispiel und BAFA-Check findest du unter [lukasebner.de/bafa](/bafa)."

      - question: "Wie schnell sehe ich Ergebnisse?"
        answer: "Sofort und später gleichzeitig. Ein besseres Führungsmeeting, ein dokumentierter Kernprozess – das wirkt ab Woche eins. Strategische Neupositionen brauchen 6–8 Wochen, bis sie greifen. Wir arbeiten von Tag 1 an Umsetzung, nicht erst wochen lang Analysen. Nach vier bis sechs Wochen berichten fast alle Kunden von Bewegung – bei der eigenen Klarheit, in der Teamdynamik, in der Effizienz."

      - question: "Welche Themen deckt die Beratung ab?"
        answer: "Strategie, Führung, Prozesse – das ist mein Spielfeld. Konkret: Positionierung, Geschäftsmodell, Führungsstrukturen, Skalierung, KPIs, Digitalisierung, Change. Was ich nicht bin: Steuerberater, IT-Infrastruktur-Spezialist, Buchhaltungs-Consultant. Für alles andere, das mit strategischer und operativer Weiterentwicklung zu tun hat – ja."

      - question: "Kann ich auch nur einzelne Beratungsstunden buchen?"
        answer: "Punktuelle Fragen ja, Tickets ja. Aber echte Transformation braucht Serie. Deshalb starten die meisten mit dem 3-Monats-Setup – das ist der Zeitraum, in dem sich Dinge wirklich verändern, nicht nur oberflächlich bewegen."
