meta:
  title: "BAFA-Förderung Unternehmensberatung Regensburg – bis 80 % Zuschuss | Lukas Ebner"
  description: "BAFA-Förderung für Unternehmensberatung in Regensburg und Ostbayern. Bis 80 % Zuschuss auf förderfähige Beratungskosten. Ehrliche Einschätzung, strukturierte Antragsbegleitung, Umsetzung mit Wirkung."
  og_image: /images/og/bafa.jpg
  accent: "#F44900"
slides:
  - template: hero-split
    pill: "BAFA-Förderung Unternehmensberatung"
    headline: "Bis 80 % Zuschuss auf deine Beratung. Wenn der richtige Berater daneben steht."
    subtext: "Du willst bessere Entscheidungen, klare Prozesse und mehr Marge – aber das Budget bremst. Die BAFA-Förderung für Unternehmensberatung macht wirksame Beratung für KMU finanzierbar. Ich begleite dich von der Einschätzung bis zur Umsetzung – ohne Fördermittel-Floskeln."
    cta:
      text: "BAFA-Check vereinbaren"
      url: "/erstgespraech?topic=bafa"
    image:
      src: /images/bafa/bafa-hero.png
      alt: "Lukas Ebner erklärt den Ablauf der BAFA-Förderung für Unternehmensberatung am Whiteboard"
  - template: symptoms-grid
    imageStyle: panorama
    headline: "Kein weiterer Vortrag. Ein Hebel, der sich rechnet."
    body: "Viele Geschäftsführer wissen, dass etwas geändert werden muss – und schieben es auf. Nicht aus Faulheit, sondern weil Zeit, Budget und Klarheit fehlen. Genau dort setzt BAFA-geförderte Unternehmensberatung an."
    symptoms:
      - pill: "Szenario 1"
        image: /images/bafa/bafa-szenario-1.png
        headline: "Marge frisst sich Monat für Monat auf."
        body: "Umsatz ist da, hängenbleiben tut wenig. Zu viele Reibungsverluste, zu wenig Steuerung. Wir analysieren, wo Wert entsteht und wo Geld versickert – und priorisieren die Maßnahmen mit dem größten Ergebnishebel."
      - pill: "Szenario 2"
        image: /images/bafa/bafa-szenario-2.png
        headline: "Beratung wäre nötig. Budget blockiert sie."
        body: "Das Team ist am Limit, Entscheidungen werden vertagt – ein großes Beratungsprojekt will aktuell niemand finanzieren. Mit dem BAFA-Zuschuss sinkt die Einstiegshürde deutlich, ohne dass du auf Substanz verzichten musst."
      - pill: "Szenario 3"
        image: /images/bafa/bafa-szenario-3.png
        headline: "Früher lief es über Zuruf. Heute nicht mehr."
        body: "Was bei 5 Leuten funktioniert hat, bricht bei 15 auseinander. Rollen sind unklar, Entscheidungen hängen, Übergaben kosten Zeit. Wir bauen ein belastbares Betriebsmodell, das nicht am Inhaber hängt."
      - pill: "Szenario 4"
        image: /images/bafa/bafa-szenario-4.png
        headline: "Ihr redet über Veränderung. Passiert ist wenig."
        body: "Es gibt Ideen und Meetings, aber kein sauberes Umsetzungsgerüst mit Verantwortlichkeiten und Takt. Wir gehen in die operative Umsetzung – mit klaren Prioritäten, Zuständigkeiten und messbaren Ergebnissen."
  - template: credibility
    bg: "#1B1464"
    headline: "Kein Fördermittel-Vertrieb. Unternehmerische Beratung mit BAFA-Hebel."
    body: "Ich verspreche dir kein „geschenktes Geld“. Ich sage dir, ob BAFA in deinem Fall sinnvoll ist – und wenn ja, wie ihr die Förderung in echte Ergebnisarbeit übersetzt. Status aktuell: BAFA-Listung ist in Prüfung. Bis zur finalen Freischaltung kommuniziere ich bewusst transparent und ohne Übertreibung."
    proofs:
      - text: "15 Jahre Unternehmerpraxis in digitalen Geschäftsmodellen – Exit 2022"
      - text: "Fokus auf Strategie, Prozesse, Führung und Umsetzungsfähigkeit"
      - text: "Klarer Blick auf Wirtschaftlichkeit statt Berater-PowerPoint"
    cta:
      label: "BAFA-Check vereinbaren"
      href: "/erstgespraech?topic=bafa"
    chat:
      enabled: true
      topic: "bafa"
      ctaHref: "/erstgespraech?topic=bafa"
  - template: parallax-story
    image:
      src: /images/bafa/bafa-parallax.png
      alt: "Workshop-Situation zur BAFA-geförderten Unternehmensberatung"
    sections:
      - headline: "Wann BAFA für dich Sinn macht."
        body: "Wenn drei Punkte zusammenkommen, ist die BAFA-Förderung ein echter Hebel."
      - body: "**1. Du bist KMU** – bis 250 Mitarbeitende, bis 50 Mio € Umsatz."
      - body: "**2. Du hast einen konkreten Engpass** – Prozesse, Strategie, Führung, Digitalisierung oder [KI-Readiness](/ki-readiness)."
      - body: "**3. Du bist bereit zu arbeiten** – in der Beratung wirklich anpacken, nicht nur zuhören. BAFA ist ein Zuschuss auf wirksame Beratung, kein Selbstzweck."
      - headline: "So läuft der BAFA-Antrag ab."
        body: "Vier saubere Schritte, ohne Fördermittel-Theater."
      - body: "**1. Erstgespräch** – Förderfähigkeit grob einordnen, Passung prüfen."
      - body: "**2. Beratungsschwerpunkt definieren** – was genau gefördert werden soll."
      - body: "**3. Antrag und Umsetzung** – strukturiert begleitet, Fristen eingehalten."
      - body: "**4. Ergebnisse dokumentieren** – sauberer Verwendungsnachweis. Mehr Hintergrund: [BAFA-Förderung für Unternehmensberatung](/blog/bafa-foerderung-unternehmensberatung)."
      - headline: "Was euch das wirklich kostet."
        body: "Rechenbeispiel bei 3.500 € Beratungskosten brutto und 80 % Förderquote:"
      - body: "**Förderfähige Beratungskosten** (Obergrenze): 2.800 €"
      - body: "**Zuschuss** (80 %): 2.240 €"
      - body: "**Euer Eigenanteil**: 1.260 €"
      - body: "Entscheidend ist nicht die Förderquote allein, sondern ob die Beratung danach spürbar bessere Entscheidungen, Prozesse und Ergebnisse liefert. Kompletter Preisrahmen: [Preise & BAFA-Förderung](/preise)."
  - template: bafa-calculator
    headline: "Rechne den BAFA-Effekt auf euren Fall."
    body: "Schieb den Regler, vergleiche Eigenanteil mit Zuschuss und entscheide auf Basis von Zahlen, nicht Bauchgefühl."
    cta:
      label: "BAFA-Check vereinbaren"
      href: "/erstgespraech?topic=bafa"
  - template: faq
    headline: "Häufige Fragen zur BAFA-Förderung."
    variant: light
    bg: "#E6EEEF"
    items:
      - question: "Was ist das BAFA-Programm für Unternehmensberatung?"
        answer: "Das Programm heißt 'Förderung von Unternehmensberatungen für KMU'. Es bezuschusst externe Beratung für kleine und mittlere Unternehmen unter definierten Bedingungen."
      - question: "Wie hoch ist die Förderung?"
        answer: "Je nach Region sind Zuschüsse bis zu 80 % möglich. Maßgeblich sind die jeweils gültigen BAFA-Vorgaben."
      - question: "Wie viele Anträge sind möglich?"
        answer: "Bis 31.12.2026 sind laut Programmangaben bis zu 5 Anträge je Unternehmen möglich, maximal 2 pro Jahr."
      - question: "Gibt es eine Obergrenze bei den förderfähigen Beratungskosten?"
        answer: "Ja. Aktuell liegt der maximal förderfähige Beratungsbetrag bei 2.800 €."
      - question: "Ist der BAFA-Antrag kompliziert?"
        answer: "Er ist machbar, wenn Unterlagen und Ablauf sauber vorbereitet sind. Genau dabei unterstütze ich strukturiert."
      - question: "Wie schnell weiß ich, ob BAFA für uns passt?"
        answer: "In einem kurzen Erstgespräch lässt sich meist schnell klären, ob Förderlogik, Beratungsziel und Unternehmenssituation zusammenpassen."
      - question: "Kann ich BAFA nutzen, wenn wir mitten im Tagesgeschäft feststecken?"
        answer: "Gerade dann ist es oft sinnvoll. Förderung hilft, die notwendige Beratung trotz knapper Budgets umzusetzen."
      - question: "Was passiert, wenn BAFA in unserem Fall nicht passt?"
        answer: "Dann sage ich das klar. Ziel ist eine sinnvolle Entscheidung für dein Unternehmen, nicht ein Antrag um jeden Preis."
      - question: "Kann ich vor der offiziellen Listung schon mit BAFA-Claims werben?"
        answer: "Nein. Solange die Listung in Prüfung ist, muss die Kommunikation transparent bleiben."
      - question: "Wo finde ich mehr Hintergrund zur BAFA-Förderung?"
        answer: "Hier: [BAFA-Förderung für Unternehmensberatung](/blog/bafa-foerderung-unternehmensberatung). Dort findest du Ablauf, Einordnung und Praxisfragen im Detail."
