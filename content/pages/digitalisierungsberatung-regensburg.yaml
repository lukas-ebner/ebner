- "type": "prose"
  "heading": "Digitalisierungsberatung aus dem Betriebsalltag, nicht aus dem Beratungsbuch"
  "content":
  - "Ich habe Digitalisierung nicht theoretisch gelernt. Bei eins+null habe ich dreizehn Jahre Unternehmen in der Energiewirtschaft\
    \ durch alle Digitalisierungsgrade begleitet, von Papierablage bis ERP-Integration. Aus einer Controlling-Seminararbeit\
    \ am MBA der TH Deggendorf entstand 2013 die erste Idee für ein besseres Steuerungssystem. Was damals CONNEX hieß, wurde\
    \ Grundlage für Leadtime, das SaaS das ich seit 2023 baue. Leadtime löst PM, Zeiterfassung, CRM und Abrechnung aus einem\
    \ echten Betriebsproblem heraus, nicht aus einer Demo. Seit 2016 bin ich IT-Sicherheitsbeauftragter (ISO 27001, TÜV NORD\
    \ zertifiziert). Digitalisierung ohne Sicherheitslogik ist für mich unvollständig."
  "bullets":
  - "eins+null 13 Jahre, 1000+ Projekte, alle Digitalisierungsgrade erlebt"
  - "Leadtime 2023 selbst gebaut: PM, Zeiterfassung, CRM, Abrechnung"
  - "CONNEX-Idee 2013 aus MBA-Seminararbeit Controlling TH Deggendorf"
  - "IT-Sicherheitsbeauftragter ISO 27001 TÜV NORD 2016"
- "type": "faq"
  "heading": "Häufige Fragen zu Digitalisierungsberatung in Regensburg"
  "items":
  - "question": "Für wen ist Digitalisierungsberatung in Regensburg sinnvoll?"
    "answer": "Für KMU, Dienstleister und wachsende Teams, die bereits Tools nutzen oder KI testen, aber noch keine klare\
      \ Linie für Prozesse, Verantwortlichkeiten und Prioritäten haben."
  - "question": "Geht es bei dir eher um Strategie oder eher um Umsetzung?"
    "answer": "Beides, aber in der richtigen Reihenfolge. Erst wird der echte Engpass geklärt. Dann entsteht eine sinnvolle\
      \ Reihenfolge für Systeme, Automatisierung und KI-Use-Cases."
  - "question": "Was ist der häufigste Fehler bei Digitalisierung?"
    "answer": "Zu früh in Tools oder KI einsteigen, ohne vorher Betriebslogik, Entscheidungswege und Prozessverantwortung\
      \ sauber zu klären. Dann digitalisiert man nur Unordnung."
  - "question": "Wie kann der Digitalbonus Bayern helfen?"
    "answer": "Standard bis 7.500 Euro, Plus bis 30.000 Euro, je 50 Prozent Zuschuss. Die April-Runde ist erschöpft, neue\
      \ Anträge ab 4. Mai 2026. Ob dein Vorhaben förderfähig ist, klärt das Erstgespräch vor dem Antrag."
  - "question": "Was unterscheidet deine Beratung von klassischer IT-Beratung?"
    "answer": "Ich komme aus dem Betrieb, nicht aus der IT-Dienstleistung. Leadtime habe ich selbst gebaut, weil keine PM-Software\
      \ passte. Ich kenne Tool-Chaos von innen und berate daher mit anderer Substanz als jemand, der Tools von außen empfiehlt."
  - "question": "Wie startet die Zusammenarbeit?"
    "answer": "Mit einem Erstgespräch. Kein Pitch, keine Demo. Nur eine ehrliche Einordnung, welche Digitalisierungsmaßnahmen\
      \ für deinen Betrieb gerade wirklich sinnvoll sind und welcher Hebel zuerst Wirkung bringt."
  - "question": "Welche Rolle spielt IT-Sicherheit bei Digitalisierungsberatung?"
    "answer": "Eine wichtige. Als ISO-27001-zertifizierter IT-Sicherheitsbeauftragter (TÜV NORD 2016) denke ich bei Tool-Empfehlungen\
      \ und Cloud-Integrationen automatisch mit, was bei Ausfällen oder Datenverlust passiert. Sicherheit gehört zum Fundament,\
      \ nicht zum optionalen Zusatz. Das gilt für jede Digitalisierungsempfehlung."
  - "question": "Gibt es gute Förderangebote für Digitalisierung in Regensburg?"
    "answer": "Ja. Digitalbonus Standard bis zu 7.500 Euro, Plus bis zu 30.000 Euro, je 50 Prozent Zuschuss. Die April-Runde\
      \ ist erschöpft, neue Anträge ab 4. Mai 2026 möglich. KI-Transfer Plus OTH Regensburg läuft ebenfalls. Wichtig: Förderung\
      \ löst keine Frage, die noch nicht gestellt wurde. Erst den sinnvollen Schritt klären, dann den Antrag stellen."
"endCTA":
  "heading": "Wenn Digitalisierung in Regensburg endlich Wirkung statt Zusatzlast bringen soll"
  "body": "Dann lass uns klären, was in deinem Unternehmen wirklich sinnvoll ist, was nur nach Fortschritt aussieht und wie\
    \ daraus ein umsetzbarer Plan wird. Das Erstgespräch ist nicht für eine Software-Präsentation da, sondern für die ehrliche\
    \ Einordnung: Welcher Digitalisierungsschritt lohnt sich für deinen Betrieb gerade am meisten? Wenn klar ist, was zuerst\
    \ kommt, folgen Förderoptionen, Tool-Empfehlungen und konkrete Umsetzungsschritte. Ich habe nicht gelernt, wie Digitalisierung\
    \ in Büchern funktioniert. Ich habe gelernt, warum sie im Betrieb scheitert und wie man es dann richtig macht. Genau das\
    \ ist der Unterschied."
