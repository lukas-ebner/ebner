"sections":
- "type": "prose"
  "heading": "Woran du merkst, dass du Digitalisierungsberatung brauchst, nicht noch ein Tool"
  "content":
  - "Bertram Brossardt, Hauptgeschäftsführer der vbw, verwies am 22. April 2026 auf nur noch 0,5 Prozent Wachstumsprognose\
    \ für 2026. Effizienz gewinnt damit an Gewicht. Digitalisierung ist einer der wenigen Hebel, der ohne großen Kapitalaufwand\
    \ spürbar etwas verändern kann, wenn der Anwendungsfall stimmt. Das Problem: In vielen Regensburger KMU entsteht mit jedem\
    \ neuen Tool mehr Koordinationsaufwand statt mehr Entlastung. Nicht weil die Technologie schlecht ist, sondern weil die\
    \ Betriebslogik darunter noch nicht klar war."
  "bullets":
  - "Ihr habt Tools, aber keinen sauberen Stack — Neue Systeme kommen dazu, alte bleiben bestehen. Eine klare Betriebslogik,\
    \ die alle verbindet, fehlt. Das Ergebnis ist Parallelarbeit und Informationsverlust."
  - "KI wird getestet, aber nicht geführt — Einzelne Pilotprojekte laufen, aber eine belastbare Linie für Nutzen, Risiken\
    \ und Verantwortlichkeiten fehlt. Niemand weiß, was KI im Betrieb darf und was nicht."
  - "Digitalisierung frisst mehr Aufmerksamkeit als sie gibt — Statt Reibung zu reduzieren entsteht neuer Abstimmungsaufwand,\
    \ weil parallel zu viel angefangen und zu wenig sauber abgeschlossen wird."
  - "Use Cases klingen gut, kommen aber nicht im Betrieb an — Dann fehlt meistens keine Idee, sondern eine Umsetzungsarchitektur:\
    \ klare Priorisierung, Verantwortlichkeiten und ein realistischer erster Schritt."
