  "title": "Digitalisierungsberatung Regensburg | Prozesse modernisieren"
  "description": "Digitalisierungsberatung in Regensburg für bessere Abläufe, weniger Reibung und mehr Skalierbarkeit im Tagesgeschäft."
  "kicker": "Digitalisierungsberatung Regensburg"
  "subtitle": "Zehn Jahre lang habe ich bei eins+null jede PM-Software ausprobiert. Asana, Monday, Notion, diverse ERP-Systeme.\
    \ Irgendwann habe ich aufgehört zu suchen und selbst gebaut, was fehlte. Leadtime ist das Ergebnis. Ich erwähne das nicht,\
    \ um Leadtime zu verkaufen. Ich erwähne es, weil es zeigt, wie ich über Digitalisierung denke: nicht als Feature-Frage,\
    \ sondern als Betriebslogikfrage. Für Unternehmen in Regensburg bedeutet das: erst wird geklärt, welche Prozesse stabil\
    \ und sauber genug für Digitalisierung sind und welche noch nicht. Dann kommen Tool-Empfehlungen. Nicht andersrum."
