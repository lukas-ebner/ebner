"sections":
- "type": "prose"
  "heading": "Woran du merkst, dass du Digitalisierungsberatung brauchst, nicht noch ein Tool"
  "content":
  - "In Regensburg ist das Thema spürbar präsent. Förderprogramme, KI-Initiativen, Digitalbonus Bayern, KI-Transfer Plus mit\
    \ Bewerbungsschluss Ende April 2026. Genau deshalb entsteht in vielen Betrieben der Druck, etwas zu machen. Die eigentliche\
    \ Schwierigkeit liegt fast nie im Kaufen eines Tools, sondern in Priorisierung, Verantwortlichkeit und Umsetzung."
  "bullets":
  - "Ihr habt Tools, aber keinen sauberen Stack — Neue Systeme kommen dazu, alte bleiben bestehen. Eine klare Betriebslogik\
    \ dahinter fehlt oft."
  - "KI wird getestet, aber nicht geführt — Einzelne Pilotprojekte laufen, aber eine belastbare Linie für Nutzen, Risiken\
    \ und Verantwortlichkeiten fehlt."
  - "Digitalisierung frisst Aufmerksamkeit statt zu entlasten — Statt Reibung zu reduzieren entsteht neuer Abstimmungsaufwand,\
    \ weil parallel zu viel angefangen und zu wenig sauber abgeschlossen wird."
  - "Use Cases klingen gut, kommen aber nicht im Betrieb an — Dann fehlt meistens keine Idee, sondern eine Umsetzungsarchitektur\
    \ mit klarer Priorisierung und einem realistischen Einstieg."
- "type": "figure"
  "image": "/images/geo/digital-regensburg-schmuck.jpg"
  "alt": "Zwei Monitore mit Dashboards in einem Mittelstandsbüro"
  "caption": "Digitalisierung heißt nicht mehr Tools. Sie heißt: eine Infrastruktur, die mitdenkt."
- "type": "prose"
  "heading": "Digitalisierung ohne Berater-Hype"
  "content":
  - "Ich verbinde Strategie, Prozesse und Alltag. Das heißt: erst verstehen, wo der Betrieb heute Reibung erzeugt. Dann entscheiden,\
    \ welche Systeme, Automatisierungen oder KI-Use-Cases wirklich sinnvoll sind. Nicht andersrum. Ich habe in meinen eigenen\
    \ Unternehmen seit Jahren Systeme gebaut, die im Tagesgeschäft tragen, nicht nur im Pitch."
  "bullets":
  - "15 Jahre operative Geschäftsführung mit Systemaufbau"
  - "Eigene KI-Implementierung und Automatisierung seit 2022"
  - "Co-Founder Fracto, AI-Anwendungen in MedTech"
- "type": "faq"
  "heading": "Häufige Fragen zu Digitalisierungsberatung in Regensburg"
  "items":
  - "question": "Für wen ist Digitalisierungsberatung in Regensburg sinnvoll?"
    "answer": "Für KMU, Dienstleister und wachsende Teams, die bereits Tools nutzen oder KI testen, aber noch keine klare\
      \ Linie für Prozesse, Verantwortlichkeiten und Prioritäten haben."
  - "question": "Geht es eher um Strategie oder eher um Umsetzung?"
    "answer": "Beides, aber in der richtigen Reihenfolge. Erst wird der echte Engpass geklärt, dann entsteht eine sinnvolle\
      \ Reihenfolge für Systeme, Automatisierung und KI-Use-Cases."
  - "question": "Was ist der häufigste Fehler bei Digitalisierung?"
    "answer": "Zu früh in Tools oder KI springen, ohne vorher Betriebslogik, Entscheidungswege und Prozessverantwortung sauber\
      \ zu klären. Dann digitalisiert man nur Unordnung."
  - "question": "Gibt es in Regensburg spezifische Förderprogramme für Digitalisierung?"
    "answer": "Ja. Digitalbonus Bayern, KI-Transfer Plus und BAFA-geförderte Beratungsleistungen sind für Regensburger KMU\
      \ zugänglich. Ob das für dich passt, klärt das Erstgespräch."
"endCTA":
  "heading": "Wenn Digitalisierung in Regensburg endlich Wirkung statt Zusatzlast bringen soll"
  "body": "Dann lass uns klären, was in deinem Unternehmen wirklich sinnvoll ist, was nur nach Fortschritt aussieht und wie\
    \ daraus ein umsetzbarer Plan wird."
