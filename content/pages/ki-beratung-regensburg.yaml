- "type": "prose"
  "heading": "KI-Beratung aus dem Betrieb heraus, nicht aus dem Methodenbuch"
  "content":
  - "Ich habe über zwanzig Jahre Software entwickelt: HS Ansbach Multimedia und IT, Note 1,7, dann eins+null mit 1000+ Projekten\
    \ in der Energiewirtschaft, dann Leadtime als SaaS mit KI-Integration, bootstrapped profitabel seit 2023. Seit 2026 baue\
    \ ich mit Laurin Fracto, AI Voice Bots für MedTech-Geräte. Technische Dokumentation wird zu einem KI-System, das am Gerät\
    \ in Echtzeit antwortet. Das Silicon Valley Entrepreneurship Program der TH Deggendorf, gefördert durch die Stadt Regensburg,\
    \ hat 2025 meinen Blick für internationale KI-Skalierungsmodelle geschärft. Leadtime nutzt KI nicht als Feature-Versprechen,\
    \ sondern als produktives Betriebswerkzeug: automatische Statusberichte, KI-gestützte Projektzusammenfassungen, Textvorschläge\
    \ in der Kommunikation. Alles im laufenden Betrieb. Dieser Hintergrund ist kein Imageclaim. Er macht den Unterschied,\
    \ wenn es darum geht, KI-Use-Cases für Regensburger Betriebe realistisch zu bewerten statt nur zu demonstrieren."
  "bullets":
  - "Fracto Co-Founder + CTO: AI Voice Bot für MedTech, aktiv in Entwicklung"
  - "Leadtime SaaS mit KI-Integration, bootstrapped profitabel seit 2023"
  - "Silicon Valley Program TH Deggendorf 2025, gefördert Stadt Regensburg"
  - "20+ Jahre Code und Systementwicklung in produktiven Betrieben"
- "type": "faq"
  "heading": "Häufige Fragen zur KI-Beratung in Regensburg"
  "items":
  - "question": "Für welche Betriebe in Regensburg ist KI-Beratung sinnvoll?"
    "answer": "Für KMU, Dienstleister und Agenturen, bei denen Routinearbeit, Recherchen, Dokumentation oder Kommunikation\
      \ regelmäßig viel Zeit fressen und eine KI-Unterstützung realistisch umsetzbar wäre."
  - "question": "Was unterscheidet das von KI-Transfer Plus an der OTH Regensburg?"
    "answer": "KI-Transfer Plus ist ein gefördertes Neun-Monats-Programm mit Hochschulrahmen. Das ist für manche genau richtig.\
      \ Wer schneller konkrete Use Cases identifizieren und umsetzen will, braucht ein direkteres Gespräch ohne Programm-Struktur."
  - "question": "Welche KI-Tools empfiehlst du konkret?"
    "answer": "Erst werden die Anwendungsfälle geklärt, dann kommen die passenden Tools. Tool-First ist der häufigste Fehler.\
      \ Zuerst der Prozess, dann das Werkzeug."
  - "question": "Was kostet KI-Einführung in einem kleinen Betrieb?"
    "answer": "Einfache Einstiegsanwendungen kosten oft wenig: Einige hundert Euro Tool-Kosten, zehn bis zwanzig Stunden Implementierungsarbeit.\
      \ Der ROI zeigt sich schnell, wenn der Anwendungsfall stimmt."
  - "question": "Was bedeutet der EU AI Act für meinen Betrieb in Regensburg?"
    "answer": "Für die meisten KMU ist es kein akutes Risiko, aber ein Argument für strukturierte KI-Einführungen. Wer jetzt\
      \ Grundlagen legt, hat es später deutlich leichter. Wer unstrukturiert einführt, muss oft nachrüsten."
  - "question": "Wie startet die Zusammenarbeit?"
    "answer": "Mit einem dreißigminütigen Erstgespräch. Kein Pitch, keine Demo. Nur eine ehrliche Einschätzung, welche zwei\
      \ bis drei KI-Use-Cases in deinem Betrieb realistisch sind und was der sinnvollste nächste Schritt ist."
  - "question": "Regensburg hat KI-Transfer Plus, RCAI und DiNO — warum noch externe Beratung?"
    "answer": "Weil Förderinfrastruktur keinen Use Case ersetzt. Das RCAI bündelt Forschung, KI-Transfer Plus bietet ein gefördertes\
      \ Programm. Beides ist gut. Wer aber schnell herausfinden will, welche zwei konkreten Prozesse sich in seinem Betrieb\
      \ jetzt automatisieren lassen, braucht ein direktes Gespräch, kein Semesterprogramm."
  - "question": "Gilt das auch für Agenturen und Dienstleister ohne klassische Produktion?"
    "answer": "Ja. Gerade Agenturen profitieren oft am stärksten von KI, weil sie viel Routinekommunikation, Dokumentation\
      \ und Textarbeit haben. Das sind genau die Bereiche, wo KI schnell echten Hebel zeigt. Ich kenne das selbst: eins+null\
      \ war eine Digitalagentur, ich weiß wie Agenturalltag funktioniert."
"endCTA":
  "heading": "Wenn du in Regensburg wissen willst, was KI für deinen Betrieb wirklich bringt"
  "body": "Dann lass uns dreißig Minuten reden. Kein Technologie-Pitch, keine Demo. Nur ein ehrlicher Blick auf deine Prozesse\
    \ und konkrete Use Cases, die in deinem Betrieb realistisch sind. Ich baue KI in eigenen Unternehmen, von Leadtime mit\
    \ KI-Integration bis Fracto mit AI Voice Bots, und weiß, was hält und was nur in der Präsentation gut aussieht. Wenn du\
    \ nach dem Gespräch weißt, mit welchem Schritt du anfangen solltest, hat es sich gelohnt. Wenn klar wird, dass KI gerade\
    \ nicht das Richtige ist, sage ich das klar. Das ist mehr wert als eine Demo, die alles verspricht."
