  "subtitle": "Die meisten KI-Berater erklären, was KI kann. Ich baue KI. Fracto, mein Unternehmen, entwickelt AI Voice Bots\
    \ für MedTech-Geräte: Technische Dokumentation wird zu einem Echtzeit-KI-System am Gerät. Ich weiß dadurch genau, was\
    \ zwischen Idee und funktionierendem KI-System passiert, welche Betriebslogik nötig ist und was in Unternehmen hängen\
    \ bleibt. Für Regensburger KMU heißt das: keine Theorie, sondern eine ehrliche Einschätzung, welche zwei bis drei Prozesse\
    \ sich bei dir wirklich lohnen. Die IHK Regensburg hatte Bewerbungsschluss am 30. April 2026 für KI-Transfer Plus mit\
    \ der OTH Regensburg, ein gefördertes Neun-Monats-Programm. Wer schneller konkrete Use Cases braucht, ohne Programmrahmen\
    \ und ohne lange Vorlaufzeit, braucht eine andere Gesprächsgrundlage."
