"sections":
- "type": "symptoms"
  "heading": "Wann KI-Beratung in Regensburg gerade sinnvoll wird"
  "body": "Die IHK Regensburg hat KI-Transfer Plus gerade neu ausgeschrieben, Bewerbungsschluss war Ende April 2026. Das zeigt:\
    \ Das Thema ist in der Region real präsent. Wer einen klaren ROI-orientierten Einstieg sucht statt eines 9-Monats-Programms,\
    \ braucht eine andere Gesprächsgrundlage."
  "items":
  - "pill": "Symptom 1"
    "image": "/images/geo/symptom-1.jpg"
    "headline": "Dein Team verliert Zeit in Routinearbeit."
    "body": "Recherchen, Zusammenfassungen, Standardkommunikation, Vorlagenpflege. Vieles davon ließe sich mit KI beschleunigen.\
      \ Noch passiert es manuell."
  - "pill": "Symptom 2"
    "image": "/images/geo/symptom-2.jpg"
    "headline": "KI-Experimente laufen, aber nichts wird skaliert."
    "body": "ChatGPT wird einzeln genutzt, aber eine Linie für sinnvolle Anwendungsfälle, Verantwortlichkeiten und Qualitätssicherung\
      \ fehlt."
  - "pill": "Symptom 3"
    "image": "/images/geo/symptom-3.jpg"
    "headline": "Du weißt, dass KI hilft, aber nicht wo anfangen."
    "body": "Die Tool-Landschaft ist unübersichtlich. Ohne klaren Einstieg bleiben es Versuche, die nicht in den Betrieb integriert\
      \ werden."
  - "pill": "Symptom 4"
    "image": "/images/geo/symptom-4.jpg"
    "headline": "KI-Projekte haben bisher nicht gezündet."
    "body": "Weil Technologie ohne klare Betriebslogik dahinter selten etwas verändert. KI muss in echte Abläufe eingebaut\
      \ werden, nicht danebenstehen."
- "type": "credibility"
  "heading": "KI-Beratung die im Betrieb ankommt"
  "body": "Ich schaue mit dir auf die konkreten Stellen, wo KI in deinem Betrieb wirklich etwas entlasten kann. Kein Hype-Pitch,\
    \ keine Technologie-Begeisterung als Selbstzweck. Ich habe KI in meinen eigenen Unternehmen seit 2022 eingesetzt und kenne\
    \ die Differenz zwischen dem, was in Demos gut klingt, und dem, was im Alltag trägt."
  "proofs":
  - "text": "Eigene KI-Implementierung seit 2022 in laufenden Betrieben"
  - "text": "Fokus auf Use Cases mit echtem ROI, nicht auf Technologie-Faszination"
  - "text": "Co-Founder Fracto, AI-Anwendung in MedTech"
- "type": "faq"
  "heading": "Häufige Fragen zur KI-Beratung in Regensburg"
  "items":
  - "question": "Für welche Betriebe in Regensburg ist KI-Beratung sinnvoll?"
    "answer": "Vor allem für KMU, Dienstleister und Agenturen, bei denen Routinearbeit, Recherchen, Dokumentation oder Kommunikation\
      \ viel Zeit fressen und eine sinnvolle Automatisierung möglich wäre."
  - "question": "Welche Tools empfiehlst du konkret?"
    "answer": "Das hängt vom Anwendungsfall ab. Erst wird geklärt, welchen Prozess wir entlasten wollen, dann kommen die passenden\
      \ Tools. Tool-First funktioniert fast nie."
  - "question": "Was kostet KI-Einführung in einem kleinen Betrieb?"
    "answer": "Einstiegsanwendungen kosten oft wenig. Einige hundert Euro Tool-Kosten, zehn bis zwanzig Stunden Implementierungsarbeit.\
      \ Der ROI zeigt sich schnell, wenn der Anwendungsfall stimmt."
  - "question": "Warum ist das Thema in Regensburg gerade besonders relevant?"
    "answer": "Weil Programme wie KI-Transfer Plus zeigen, dass die Region den Mittelstand bei KI-Einführungen gezielt unterstützen\
      \ will. Wer einen fokussierteren Einstieg sucht, findet ihn außerhalb solcher Förderprogramme."
"endCTA":
  "heading": "Wenn du in Regensburg wissen willst, was KI für deinen Betrieb wirklich bringt"
  "body": "Dann lass uns dreißig Minuten reden. Kein Pitch, keine Demo. Nur ein ehrlicher Blick auf deine Abläufe und konkrete\
