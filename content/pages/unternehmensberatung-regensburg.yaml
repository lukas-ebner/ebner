      label: "BAFA-Check"
      href: "/erstgespraech?topic=bafa"

  - template: faq
    id: geo-faq
    headline: "Häufige Fragen zu Unternehmensberatung in Regensburg"
    variant: light
    bg: "#E6EEEF"
    items:
      - question: "Für welche Unternehmen in Regensburg ist das sinnvoll?"
        answer: "Vor allem für inhaber- oder geschäftsführergetriebene KMU, Agenturen, Dienstleister und wachsende Tech-Teams, bei denen operative Last, unklare Verantwortungen und zu viele Rückfragen Wachstum ausbremsen."
      - question: "Warum ist das in Regensburg oft ein Thema?"
        answer: "Weil Regensburg einen Mix aus starkem Mittelstand, Technologieunternehmen und projektgetriebenen Organisationen hat. Genau dort entstehen schnell Entscheidungsstau, Tool-Chaos und Führungsengpässe, wenn das Unternehmen schneller wächst als die Betriebslogik."
      - question: "Wie startet die Zusammenarbeit konkret?"
        answer: "Mit einem kurzen Erstgespräch. Danach wird klar, ob ein Strategie-Call, ein fokussierter Umsetzungssprint oder erstmal gar kein Projekt sinnvoll ist."
      - question: "Wie wird Erfolg gemessen?"
        answer: "Nicht über schöne Folien, sondern über operative Kennzahlen: weniger Eskalationen, schnellere Entscheidungen, stabilere Übergaben und mehr Luft auf Führungsebene."

  - template: cta
    headline: "Wenn du in Regensburg nicht noch mehr reden, sondern endlich sauber umsetzen willst"
    body: "Dann lass uns anschauen, wo dein größter Hebel liegt und wie wir ihn in deinen Alltag übersetzen, ohne neues Berater-Chaos aufzubauen."
    primary:
      label: "Erstgespräch buchen"
      href: "/erstgespraech"
    secondary:
      label: "Preise ansehen"
      href: "/preise"
