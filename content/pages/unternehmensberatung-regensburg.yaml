- "type": "prose"
  "heading": "Warum ich das in Regensburg anders angehe"
  "content":
  - "Ich kenne die Region nicht aus der Außensicht. Ich bin seit 27 Jahren Teil dieser Stadt. Meine ersten Jobs hatte ich\
    \ bei der Mittelbayerischen Zeitung. Meine Ausbildung war von 1999 bis 2002 bei Creativ Concept in Regensburg. 2009 habe\
    \ ich hier Eins+Null gegründet und 2022 an die Kraftwerk Holding verkauft. Dazu kommen der MBA an der TH Deggendorf und\
    \ das Silicon-Valley-Programm mit Förderung aus Regensburg. Das ist keine Hochglanzvita. Es ist ein anderer Blick auf\
    \ Beratung. Ich kenne Regensburg nicht als Ort, über den man auf Konferenzen spricht, sondern als Ort, an dem man Firmen\
    \ gründet, Teams aufbaut, Kunden gewinnt, Systeme umbaut und Entscheidungen treffen muss, die am nächsten Morgen tragen.\
    \ Deshalb interessiert mich weniger, wie Beratung klingt, und mehr, ob sie in deinem Betrieb spürbar etwas verändert."
  "bullets":
  - "27 Jahre Regensburg, nicht nur Marktkenntnis von außen und vom Hörensagen"
  - "Eins+Null 2009 in Regensburg gegründet, 2022 an Kraftwerk verkauft"
  - "Ausbildung bei Creativ Concept, MBA an der TH Deggendorf, regional verankert"
- "type": "faq"
  "heading": "Häufige Fragen zu Unternehmensberatung in Regensburg"
  "items":
  - "question": "Für welche Unternehmen in Regensburg ist das sinnvoll?"
    "answer": "Vor allem für inhabergeführte KMU, Agenturen, Dienstleister und wachsende Teams, bei denen operative Last,\
      \ unklare Verantwortung und zu viele Rückfragen das Wachstum ausbremsen."
  - "question": "Was ist in Regensburg gerade der häufigste Engpass?"
    "answer": "Oft nicht der Markt, sondern die innere Betriebslogik. Regensburg hat Mittelstand, Tech und viel Bewegung.\
      \ Genau deshalb fällt zu spät auf, wenn Entscheidungen, Prioritäten und Umsetzung zu stark am Geschäftsführer hängen."
  - "question": "Geht es eher um Strategie oder eher um Umsetzung?"
    "answer": "Beides, aber mit Vorrang für Umsetzung. Die entscheidende Frage ist nicht, wie die Folien aussehen, sondern\
      \ was nächste Woche im Betrieb konkret anders laufen soll."
  - "question": "Ist das auch für Agenturen und projektgetriebene Teams sinnvoll?"
    "answer": "Ja. Gerade dort entstehen operative Engpässe oft früh, weil Übergaben, Scope, Führung und Auslastung komplexer\
      \ werden, als der alte Bauchgefühl-Modus tragen kann."
  - "question": "Wie startet die Zusammenarbeit?"
    "answer": "Mit einem Erstgespräch. Danach wird klar, ob du gerade einen fokussierten Umsetzungssprint, laufendes Sparring\
      \ oder erstmal keine Beratung brauchst. Entscheidend ist nicht, möglichst schnell ein großes Beratungsprogramm zu verkaufen,\
      \ sondern zuerst sauber zu verstehen, wo die operative Last tatsächlich entsteht."
  - "question": "Was unterscheidet das von klassischer Unternehmensberatung in Regensburg?"
    "answer": "Ich arbeite nicht mit Standardpaketen und Leistungslisten. Im Zentrum stehen Führung, Entscheidungen, Prozesse\
      \ und eine Digitalisierung, die den Betrieb wirklich entlastet. Es geht nicht darum, dir dein Unternehmen theoretisch\
      \ zu erklären, sondern die wenigen Hebel zu finden, die im Alltag spürbar Tempo, Ruhe und Steuerbarkeit zurückbringen."
"endCTA":
  "heading": "Wenn dein Unternehmen in Regensburg weniger an dir hängen soll"
  "body": "Dann lass uns sortieren, wo dein eigentlicher Engpass sitzt und wie daraus ein führbarer Betrieb wird. Ohne Berater-Show.\
    \ Ohne erfundene Cases. Mit einem klaren Blick auf das, was in deinem Alltag wirklich bremst. Das Erstgespräch ist genau\
    \ dafür da: nicht für eine Hochglanz-Präsentation, sondern für eine ehrliche Einordnung, ob gerade Führung, Prozesse,\
    \ Entscheidungslogik oder Digitalisierung der eigentliche Flaschenhals sind. Wenn wir sprechen, geht es nicht um perfekte\
    \ Theorie, sondern darum, was in deinem Betrieb in den nächsten Wochen real anders laufen muss, damit mehr Ruhe, Klarheit\
    \ und Tempo zurückkommen."
