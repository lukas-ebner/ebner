  - template: symptoms-grid
    imageStyle: panorama
    headline: "Typische Engpässe bei Unternehmen in Regensburg"
    body: "Regensburg ist stark in Mittelstand, Technologie und projektgetriebenen Unternehmen. Genau dort entstehen oft dieselben Probleme: zu viele Themen gleichzeitig, zu viele Entscheidungen beim Chef, zu wenig operative Klarheit. Unternehmensberatung Regensburg, Digitalisierung Mittelstand Regensburg und Prozessoptimierung Regensburg werden oft genau dann gesucht, wenn Wachstum mehr Last als Entlastung produziert."
    symptoms:
      - pill: "Symptom 1"
        image: "/images/geo/symptom-1.jpg"
        headline: "Ohne dich bleibt zu viel liegen."
        body: "Entscheidungen stauen sich, weil Rollen, Verantwortlichkeiten und Eskalationswege nicht sauber geklärt sind."
      - pill: "Symptom 2"
        image: "/images/geo/symptom-2.jpg"
        headline: "Mehr Team, aber nicht mehr Tempo."
        body: "Neue Leute bringen nur dann Entlastung, wenn Übergaben, Prioritäten und Führungsrhythmen funktionieren."
      - pill: "Symptom 3"
        image: "/images/geo/symptom-3.jpg"
        headline: "KI wird getestet, aber nicht geführt."
        body: "Tools und Ideen sind da, aber niemand würde behaupten, dass daraus schon ein belastbares System geworden ist."
      - pill: "Symptom 4"
        image: "/images/geo/symptom-4.jpg"
        headline: "Zu viele Projekte, zu wenig Steuerbarkeit."
        body: "Gerade in wachsenden Dienstleistungs- und Tech-Teams kippen Marge, Fokus und Verantwortung schneller, als man es sich eingesteht."

  - template: credibility
    headline: "Unternehmerische Beratung statt Standardfolie"
    body: "Ich arbeite nicht mit generischen Konzepten, sondern mit deinem realen Alltag in Regensburg: Entscheidungen, Prozesse, Führungsroutinen, Umsetzung. Nicht Coaching-Theater, sondern operative Beratung mit Blick auf das, was im Unternehmen hängen bleibt."
    proofs:
      - text: "15 Jahre Geschäftsführer-Praxis"
      - text: "Skalierung von 0 auf 50 Mitarbeitende"
      - text: "Operativer Fokus auf Strategie, Prozesse und Führung"
    cta:
      label: "Gespräch vereinbaren"
      href: "/erstgespraech"

  - template: bafa-calculator
    headline: "Förderfähigkeit direkt grob einordnen"
    body: "Wenn BAFA passt, kann das helfen. Entscheidend bleibt trotzdem, dass die Arbeit im Betrieb spürbar etwas verändert, nicht nur auf dem Papier gut aussieht."
