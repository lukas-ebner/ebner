"sections":
- "type": "prose"
  "heading": "Woran du merkst, dass dein Unternehmen in Regensburg an dir hängt"
  "content":
  - "Die IHK Regensburg meldete zum Jahresbeginn 2026 einen Konjunkturklimaindikator von 110,4 Punkten. Klingt ordentlich.\
    \ Gleichzeitig stagniert die Wirtschaftslage in der Region weiter. Genau in solchen Phasen kippt das Problem in vielen\
    \ Betrieben nach innen: nicht fehlende Bewegung im Markt, sondern zu viele Entscheidungen auf zu wenigen Schultern."
  "bullets":
  - "Zu viele Entscheidungen landen wieder bei dir — Rollen sind formal verteilt, aber in der Praxis wartet das Team trotzdem\
    \ auf dich. Nicht aus Bequemlichkeit, sondern weil Verantwortung und Eskalationswege nicht sauber genug gebaut sind."
  - "Mehr Team bringt mehr Abstimmung, aber nicht mehr Entlastung — Wenn jeder neue Mitarbeiter neue Rückfragen produziert,\
    \ wächst nicht dein Unternehmen. Es wächst nur die Komplexität, die bei dir zusammenläuft."
  - "Digitalisierung und KI laufen nebenher — In Regensburg ist das Thema sichtbar, nicht zuletzt durch Programme wie KI-Transfer\
    \ Plus mit Bewerbungsschluss am 30. April 2026. Tools helfen trotzdem nur dann, wenn Führung, Prioritäten und Prozesse\
    \ mitgebaut werden."
  - "Du arbeitest viel, aber der Betrieb wird nicht robuster — Dann fehlt meistens keine Energie. Es fehlt eine Betriebslogik,\
    \ die Entscheidungen schneller macht, Übergaben stabilisiert und das Tagesgeschäft von deiner Person entkoppelt."
