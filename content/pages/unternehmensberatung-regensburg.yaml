"sections":
- "type": "prose"
  "heading": "Woran du merkst, dass dein Unternehmen in Regensburg an dir hängt"
  "content":
  - "Die IHK Regensburg meldete zum Jahresbeginn 2026 einen Konjunkturklimaindikator von 110,4 Punkten. Das klingt erst einmal\
    \ solide. Gleichzeitig stagniert die Wirtschaftslage in der Region laut IHK weiter. Genau diese Kombination ist in vielen\
    \ Betrieben tückisch. Außen wirkt der Standort gesund, innen laufen Rollen, Entscheidungen und Abläufe oft längst auf\
    \ Verschleiß. Das Problem ist dann nicht fehlende Nachfrage, sondern zu viele Entscheidungen auf zu wenigen Schultern."
  "bullets":
  - "Zu viele Entscheidungen landen wieder bei dir — Formal sind Verantwortlichkeiten verteilt. In der Praxis wartet das Team\
    \ trotzdem auf dich. Nicht aus Bequemlichkeit, sondern weil Verantwortung, Eskalationswege und Entscheidungskompetenzen\
    \ nicht sauber genug gebaut sind. Die Folge ist kein spektakulärer Crash, sondern tägliche operative Reibung."
  - "Mehr Team bringt mehr Abstimmung, aber nicht mehr Entlastung — Wenn jeder neue Mitarbeiter neue Rückfragen produziert,\
    \ wächst nicht dein Unternehmen. Es wächst nur die Komplexität, die bei dir zusammenläuft. Genau hier kippt Wachstum von\
    \ etwas Gutem in etwas Teures."
  - "Digitalisierung und KI laufen nebenher — In Regensburg ist das Thema sichtbar, nicht zuletzt durch Programme wie KI-Transfer\
    \ Plus mit Bewerbungsschluss am 30. April 2026. Tools helfen trotzdem nur dann, wenn Führung, Prioritäten und Prozesse\
    \ mitgebaut werden. Ohne System dahinter wird Digitalisierung nur ein zusätzlicher Layer auf bestehende Unordnung."
  - "Du arbeitest viel, aber der Betrieb wird nicht robuster — Dann fehlt meistens keine Energie. Es fehlt eine Betriebslogik,\
    \ die Entscheidungen schneller macht, Übergaben stabilisiert und das Tagesgeschäft von deiner Person entkoppelt. Solange\
    \ diese Logik fehlt, bleibt das Unternehmen abhängig von deiner ständigen Verfügbarkeit."
