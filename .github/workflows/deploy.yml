name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          response=$(curl -s -X POST https://coolify.fracto.live/api/v1/deploy \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"uuid": "r14lf1fiek8jne0b1yle1b6h", "force": false}')
          echo "$response"
          echo "$response" | grep -q "deployment_uuid" && echo "Deploy queued" || (echo "Deploy failed" && exit 1)
